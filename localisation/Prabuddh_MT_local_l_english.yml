l_english:
 leo_restoration_of_light_title:0 "The Guptan Rebellion"
 leo_restoration_of_light_desc:0 "The people of Gupta have rallied against us in the past and the Empire could not stop them. We can no longer allow their declared indipendence."

 leo_showing_of_light_title:0 "Showing Strenght"
 leo_showing_of_light_desc:0 "A proper show of true strenght from the Emperor to properly restore the greatest Empire in History."

 leo_empire_making_title:0 "Never Fallen"
 leo_empire_making_desc:0 "The fruits of the Empire and our work have finally grown for us to gather. The Empire of Light has never fallen, it merely rested."

 leo_great_temples_title:0 "Palaces of Spirit"
 leo_great_temples_desc:0 "The people of the Faith have made their homes nearby the temples and the providence they ensure, perhaps the people should give back for those who have yet to join the faith?"

 leo_light_the_sun_title:0 "A Light in the Darkness"
 leo_light_the_sun_desc:0 "The might of our Empire is not only measured in its people, its armies and its power, but in the Light it can share."

 leo_light_religion_title:0 "The Faithful Shall Prosper"
 leo_light_religion_desc:0 "A faith marches on the souls of its followers, but where do the followers march to and fro? A proper road, signs of stone and temples of worships will be erected to aid the spirit and the body, wherever they are needed."

 leo_defending_the_empire_title:0 "Defenders of Light"
 leo_defending_the_empire_desc:0 "The Empire's expansion was not followed by engineers and constructors, but we will mend this mistake by building a mighty road network among our defensive perimeters."

 leo_armies_of_light_title:0 "Reinforce the Army"
 leo_armies_of_light_desc:0 "Our armies will surely beat the rebels, but securing the victory through sheer power will also ensure our prestige does not falter."

 leo_restoration_title:0 "Mend the Empire"
 leo_restoration_desc:0 "The war started on the pretense that we are not the legitimate rulers of all that Light touches. They are wrong, of course, and the proof is in our inevitable victory."

 leo_light_expansion_title:0 "The Ways of the Faith"
 leo_light_expansion_desc:0 "The Hindu believe that they cannot be convinced of the true word of Mani and maybe they are right, despite this convinction, we will try and try again."

 leo_light_empire_restored_title:0 "The Beacon"
 leo_light_empire_restored_desc:0 "It is undeniable that the Empire of Light is a beacon of enlighted thought and immense power, who can deny our claims? The broken Mandate or the fallen Phoenix?"

 leo_masters_of_india_title:0 "Avatar of Arjuna"
 leo_masters_of_india_desc:0 "The historians have said that the land of the Hindus and below could not be united, many have tried and only We succeeded."

 leo_artist_work_title:0 "Work of the Faithful"
 leo_artist_work_desc:0 "Perhaps a more practical approach to our religious domination should be the creation of temples, structures and works of art to compel the non-believer."

 leo_grand_army_title:0 "The Imperial Herald"
 leo_grand_army_desc:0 "The chosen herald for the Empire is the mighty Elephant, a creature of fortitude and intelligence. Their power will be harnessed to our advantage, in time."

 leo_reforming_empire_title:0 "Reforming the Empire"
 leo_reforming_empire_desc:0 "The Empire of Light must be reformed if it meant to stand the test of time and not commit the errors of the past."

 leo_works_of_art_title:0 "A Wheel Within Wheels"
 leo_works_of_art_desc:0 "Scriptures from the Prophet Mani himself are stored and collected, to be used in particular rituals and studies. Creating new and proper ways to deliver the message is our upmost priority."

 leo_lenghty_works_title:0 "Lenghty Works"
 leo_lenghty_works_desc:0 "Despite the quantity of our artists, workers and makers, quality still requires time and the proper education as to not create heretical problems that will need to be solved with fire."

 leo_temples_for_all_title:0 "Map of the Temples"
 leo_temples_for_all_desc:0 "Once the temple is made and the icons placed, one must find them. Perhaps a proper map of the Empire will help find the most beautiful and intricate art, the more decorate and well-kept temples, with a rating system to ensure the proper respect to the faith."

 leo_ultimate_temple_complex_title:0 "The Light is Cast"
 leo_ultimate_temple_complex_desc:0 "Each and every temple will be given exactly the same reward for their works, where the meekest and proudest will meet to recieve the other own merit."


