# generic jewish ideas
 gen_jew_ideas_start:0 "Jewish Traditions"
 gen_jew_ideas_bonus:0 "Jewish Ambitions"
 gen_jew_ideas:0 "Jewish Ideas"
 gen_jew1:0 "Diaspora Diplomacy"
 gen_jew1_desc:0 "By working closely with the diaspora we'll be able to sway foreign opinion to our advantage, maybe get some intel along the way."
 gen_jew2:0 "Jewish Multiculturalism"
 gen_jew2_desc:0 "The jewish people are rather adept at adapting to and adopting the customs of their neighbors."
 gen_jew3:0 "Mercantile History"
 gen_jew3_desc:0 "The jewish people have spread far and wide by following new opportunities along trade routes, these far flung connections will help us better access and control said trade routes."
 gen_jew4:0 "Jewish Scholarship"
 gen_jew4_desc:0 "Our scholars and rabbis are costantly at work writing and studying foreign works and debating, this flow of ideas will surely bear fruit."
 gen_jew5:0 "Industrious Spirit"
 gen_jew5_desc:0 "We must work hard to ensure a prosperous future for the Chosen People."
 gen_jew6:0 "A most Zealous Army"
 gen_jew6_desc:0 "Our faith is unshakable and our armies unmovable."
 gen_jew7:0 "Fire the Slings!"
 gen_jew7_desc:0 "Like David against Goliath our firepower will be unmatched in the field of battle."

#hikinan ideas

 hikinan_ideas:0 "Hikinan Ideas"
 hikinan_ideas_start:0 "Hikinan Traditions"
 hikinan_ideas_bonus:0 "Hikinan Ambitions"
 hikinan_ideas1:0 "Colony-Builders"
 hikinan_ideas1_desc:0 "We inherit our ancestor's ability to settle quickly in new lands."
 hikinan_ideas2:0 "Expanded Bureaucracy"
 hikinan_ideas2_desc:0 "As we expand so too must our administration so that we may better govern our country."
 hikinan_ideas3:0 "Developing Hikina"
 hikinan_ideas3_desc:0 "We'll make better use of this land than those who lived here before."
 hikinan_ideas4:0 "Horsing Around"
 hikinan_ideas4_desc:0 "The people east of the Great Mountains ride strange four legged animals, the Lio, we have seen the advantage it gives them and we ought to acquire them for ourselves."
 hikinan_ideas5:0 "Faith and Country"
 hikinan_ideas5_desc:0 "Many heathens and heretics find themselves under our pious rule. We must officialise and regiment our traditions to stamp out any dissenting movements."
 hikinan_ideas6:0 "Gunboat Diplomacy"
 hikinan_ideas6_desc:0 "Our guns will convince even the most stubborn countries to accept our demands."
 hikinan_ideas7:0 "World's Factory"
 hikinan_ideas7_desc:0 "The products of our factories will be sold across the globe."
