#####CUSTOM

#####EVENTS
 wuuevent.1.t: "The Delta's Legend"
 wuuevent.1.d: "Duke Zhan of Wu, Our Ancestor, saved the Delta of Yangtze. Both from the destructive flood and endless tide of men, he shrewdly sworn fealty to King of Song and Chu. Under the rule of Zhan and Zhuge Clan, the land basked under warm light and all enjoyed at least five peck of rice a day. But in old age, he goes on and on about 'Mighty Lord of The Sky' who shall descend and wipe the earth clean with his burning blade. \nCenturies after Zhan's demise, we still got not a single clue who is the supposed Sky Lord that shall guide us toward victory. Among the Chronicler arise a two leading theory. \nFirst, the Lord of the Sky is none other than us Zhuge. The Scholar had gathered evidence that our ancestor Zhuge Liang received mandate from the Heaven to guide Jongwa out of dark age, but rejected the heaven's call due to his humility. \nThe Second theory, is that Lord Zhan received a revealation from Jesus and attempted to spread the gospel but was put into house arrest by his blasphemous retainers who labelled his word a 'mad rambling'...."
 wuuevent.1a: "Proceed."


