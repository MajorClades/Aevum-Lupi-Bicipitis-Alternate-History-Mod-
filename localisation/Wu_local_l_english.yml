#####EVENTS
 wuuevent.1.t:0 "The Delta's Legend"
 wuuevent.1.d:0 "The tome states that Duke Zhan of Wu, our ancestor, saved the delta of Yangtze. He saved it both from the destructive flood and endless tide of men, shrewdly swearing fealty to the Kings of Song and Chu. Under the rule of Zhan, the land basked under warm light and all enjoyed at least five pecks of rice a day. \n\nHowever, the tone shifted during the later years of his reign. It stated that once sagely Zhan now rambled on and on about the 'Mighty Lord of The Sky' who shall descend and cleave the earth with a burning blade. Even centuries after Zhan's demise, not a single soul knows who that Lord is. Students of the Zhuge clan comb through every scripture and letter that has yet to crumble due to age. \n\nStranger things emerged throughout the study, they find the record incomplete, as if something was struck out with the purpose of concealing the truth. Passages describing places that are not places, doors that open where none stood before, and a wellspring of shadowy substances awaiting someone or something to harness it. Some copies refer to these as fountains, though the term is never explained. \n\nKept within the masoleum of Zhuge Zhan was his hidden ledger - the record was impeccable, almost as if it was written by an expert mathematician and not a dying madman as we have been led to believe he was.\n\nYet a strange relic were found used as bookmark, a tiny jade fish attached to a prayer bead. Who was he praying to? Two major theories arise from this perplexing discovery. \n\nThe opinion held by most is that the bead was representation of Zhuge Zhan, who saw his ascendency from mere gentry to ruler of Wu as equivalence to a fish that turned into a dragon. Supporter of this theory also make mentions of his ancestor, Zhuge Liang, who faced many auspicious events throughout his service of Zhong-era warlord Zhang Fei. They believed that Zhuge Liang was instructed by the Heavens to unify Jongwa, but had ignored the signs due to his overwhelming humility. \n\nProponent of second theory see the fish as representation of the deity worshipped by the fringe sect of Ming Cult as 'Lord Disho the Redeemer'. They believed that Zhuge Zhan opted to rebel against The Liu not out of strategic necessity or opportunity but due to his devotion to Lord Disho and faithful of Jingjiao (Mingjiao splinter group worshipping Jesus instead of Mani). \n\nEnraged by blatant disrespect of virtue and tradition of Jongwa, his advisors put Zhuge Zhan in house arrest and altered all record that mentions the Jingjiao. As if it was alive, some simply refuse to be altered and made it way to the present as 'Lord of The Sky' for us to debates Zhan's true intention.  \n\nWhatever theory is right, truth still prevails, and we are on our way to unify Jongwa. We can figure out the detail later."
 wuuevent.1a:0 "Proceed."
 wuuevent.2.t:0 "Luminous Realm"
 wuuevent.2.d:0 "Since we embraced Lord Zhan's true message, we have earnestly enacted his vision and faith. While other warlords were misled by shaman and aristocrat into spilling blood, we sought to end it and enforce God's will upon Jongwa. \n\nTo this end, we have repurposed the old study hall into the Ministry of The Faithful where foodstuffs and wisdom convene and the seed of faith shall grow."
 wuuevent.2a:0 "And thus, the children learned of the chaos which must not be repeated."
 wuuevent.3.t:0 "Taking Flight"
 wuuevent.3.d:0 "While we are one of the strongest realms in Jongwa, able to fend off Yan by ourselves, our right to rule seems weaker than most other warlords. The Yan have the heartland to themselves, the Song claim lineage from the old Han Dynasty, The Chu say they are the least corrupt and even the Cuan and Liqian have begun to seriously refer to themselves as Son of Heaven. \n\nIt is time we stop idling and figure out that on what right should we lay claim upon Jongwa."
 wuuevent.3a:0 "We may be of humble origin, but we can become noble by tearing the corrupt apart."
 wuuevent.3b:0 "There is Light inside Our Soul."
 wuuevent.4.t:0 "Jongwa Under Our Heels"
 wuuevent.4.d:0 "Long divided must unite, it had been a millenia and more since Jongwa saw unity. Nevertheless, we ended the era of bloodshed and instability. All the warlords were put to sword and capable men were relived of their guilts, for now it is us who they shall serves."
 wuuevent.4.a:0 "The dragon's roar shall shatter the sky!"
 wuuevent.6.t:0 "Song to be Remembered"
 wuuevent.6.d:0 "With the capture of Kaifeng, the dream of Jongwan unification is one or two steps closer than before. Still, we allowed the Liu to live in lavish luxury. Because was it not Liu Bei who convinced Zhuge Liang to make his mark upon Jongwa instead of staying at the pond in solitude? \nSeeing how well we treated the Liu, other generals and governors from Northern Jongwa pledged to us secretly. Should we seize this momentum and attack Yan, many of them shall side with us!"
 wuuevent.6a:0 "The people of Jongwa yearn for liberation!"
 wuuevent.6b:0 "Patience is a virtues."

 wuuevent.7.t:0 "Taming the Steppe"
 wuuevent.7.d:0 "Our realm has expanded into the vile land of the barbarians north of the Great Wall. The peoples of Siyi find themselves subjugated underneath our boot - yet they yearn for freedom. We are in need of a strategy to easily control them, lest they once more shake free of our grasp. One man from the north fo Jongwa has brought forth a solution: the Xiuchu of Shanxi are descended from the ancient Xiongnu confederation. He wants to bring his people back to the steppes to rule as conquerers over the Khalka and Chile tribes of the north."
 wuuevent.7a:0 "The Xiongnu shall be reborn!"
 wuuevent.7b:0 "It's mad, the lot of it."


