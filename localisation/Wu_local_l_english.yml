#####EVENTS
 wuuevent.1.t: "The Delta's Legend"
 wuuevent.1.d: "The Tome stated that Duke Zhan of Wu, Our Ancestor, saved the Delta of Yangtze. Both from the destructive flood and endless tide of men, he shrewdly sworn fealty to King of Song and Chu. Under the rule of Zhan and Zhuge Clan, the land basked under warm light and all enjoyed at least five peck of rice a day. \n\nHowever, the tone shifted during later year of his reign. It stated that once sagely Zhan now ramble on and on about the 'Mighty Lord of The Sky' who shall descend and cleave the earth with a burning blade. \n\nEven centuries after Zhan's demise, not a single soul know who that Lord is. Student of Zhuge clan comb through every scripture and letter that had yet to crumble due to age. \n\nStranger things emerged throughout the study, they find the record incomplete, as if something were struck out with purpose of concealing the truth. Passages describing places that are not places, doors that open where none stood before, and wellspring of shadowy substances awaiting someone or something to harness it. Some copies refer to these as fountains, though the term is never explained. \n\nKept within the masoleum of Zhuge Zhan was his hidden ledger, the record was impeccable, almost as if it was written by Expert Mathematician and not dying madman as we have been led to believe he was. \n\nYet a strange relic were found used as bookmark, a tiny jade fish attached with prayer bead. Who was he praying to? Two Major Theories arise from this perpexling discovery. \n\nOpinion held by most is that the bead was representation of Zhuge Zhan, who saw his ascendency from mere gentry to ruler of Wu as equivalence to fish that turned into dragon. Supporter of this theory also make mentions of his ancestor, Zhuge Liang, who faced many auspicious events throughout his service of Zhong-era Warlord Zhang Fei. They believed that Zhuge Liang was instructed by the Heaven to unify Jongwa, but had ignored the signs due to his overwhelming humility. \n\nProponent of Second theory, see the fish as representation of Foriegn deity worshipped by the fringe sect of Ming Cult as 'Lord Disho the Redeemer'. They believed that Zhuge Zhan opted to rebels against The Liu not out of strategic necessity or opportunity but due to his devotion to Lord Disho and faithful of Jingjiao (Mingjiao splinter group that worshipped Jesus instead of Mani). \n\nEnraged by blatant disrespect of virtue and tradition of Jongwa, his advisors put Zhuge Zhan in house arrest and altered all record that mentions the Jingjiao. As if it was alive, some simply refuse to be altered and made it way to the present as 'Lord of The Sky' for us to debates Zhan's true intention.  \n\nWhatever theory is right, truth still prevails, we are on our way to unify Jongwa. We can figure out the detail later."
 wuuevent.1a: "Proceed."
 wuuevent.2.t: "Luminous Realm"
 wuuevent.2.d: "Since We embraced deciphered Lord Zhan's true message, We have earnestly enacted his vision and faith. While other warlords were misled by shaman and aristocrat into spilling blood, We sought to end it and enforce God's will upon Jongwa. \n\nTo this end, We have repurposed the old study hall into Ministry of The Faithful where foodstuff and wisdom convened and seed of faith shall grow."
 wuuevent.2a: "And Thus, The Children learned of the chaos which must not be repeated."
 wuuevent.3.t: "Taking Flight"
 wuuevent.3.d: "While We are One of The Strongest Realm in Jongwa, able to fend off Yan by ourselves. Our Right to Rule seem weaker than most other warlord, The Yan had Heartland to themselves, The Song claimed lineage from the Old Han Dynasty, The Chu says they are the least corrupt and even The Cuan and Liqian begun to seriously refer to themselves as Son of Heaven. \n\nIt is time We stop idling and figure out that on what right should we lay claim upon Jongwa."
 wuuevent.3a: "We may be of humble origin, but we can become noble by tearing the corrupt apart."
 wuuevent.3b: "There is Light inside Our Soul."


