 aust_rho.4.test:0 "Destiny Broken"
 aust_rho.4.desc:0 "'My granfather once ruled Egypt until the Kongolese bastard took Memphis, since then my dynasty has been shamed to rule over this island. Far away from all that is sacred or important, sorrounded by criminals and heathens, conspirators and sickness.\nHow can I govern this island when my own son is ill and any funds may be lost in the ocean?'\n- Diary of Gregorios Nikephoros, 1444."
 aust_rho.4a:0 "Ask for any help."
 aust_rho.4b:0 "Focus on what I can do."

