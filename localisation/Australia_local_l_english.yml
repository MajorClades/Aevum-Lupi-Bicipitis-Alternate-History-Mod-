# Apoktitheí Michanikós Adeptus Mechanicus

#####EVENTS
 aust_rho.1.test:0 "A Library In Flames"
 aust_rho.1.desc:0 "Escaping by ship, these scholars have arrived at our shores, tired from the long voyage we welcomed them as guests to the governor's palace.\nThey speak of the heathen's war against our Caliph and the siege of Alexandria, which they managed to escape from; but we know why they are here and not somewhere safer.\nThis band of heretics were found guilty against the laws of the Faith and they tried to escape to the farthest land they knew, to find someone who could allow them to make use of their knowledge."
 aust_rho.1a:0 "You can stay, for now."
 aust_rho.1b:0 "Return them to the homeland."

