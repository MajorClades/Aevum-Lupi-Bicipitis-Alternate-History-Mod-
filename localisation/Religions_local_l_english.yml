 icon_jesus_farming: "Depiction of Jesus the Farmer"
 icon_jesus_farming_desc: "In Impotian imagery, Jesus is represented in situations in the daily life of the common man. One of the most common depictions is of Him farming."
 icon_jesus_fishing: "Depiction of Jesus the Fisherman"
 icon_jesus_fishing_desc: "In the bible, Jesus often interacts with fisherman often, and in Impotian imagery Jesus is depicted in these situations often, or even fishing Himself. These images being espoused across our nation shall truly inspire our sailors and seamen."
 icon_jesus_carpentry: "Depiction of Jesus the Carpenter"
 icon_jesus_carpentry_desc: "Jesus the carpenter, as told of in the bible, shall inspire our citizens to work harder in the construction of our nation as they see themselves working in the footsteps of Jesus Himself"
 icon_jesus_dinner: "Depiction of Jesus at Supper"
 icon_jesus_dinner_desc: "In the bible, Jesus often dined with the common folk, and we shall follow in His footsteps to dine with the peasants and foreign diplomats, to connect with our own citizens and foreign nations"
 icon_jesus_cleansing_temple: "Depiction of Jesus Cleansing the Temple"
 icon_jesus_cleansing_temple_desc: "Jesus expelled the tax collectors from the temple in the name of righteousess and God, and we too shall work against sin and evil in the name of The Lord"
