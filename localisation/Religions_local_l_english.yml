#####GUPTAKA
 turan_buddha: "Guptaka"
 turan_buddha_religion_desc:1 "Guptaka is the most liberal branch of Buddhism. Originated by disciples of Moksadeva, a Jongwa buddhist monk of legendary renown whom traversed from Windelia to Serica long before Guo Hong ever walk the earth in his misguided search of Buddha's birthplace, his liberal teachings of dharma have convinced the most ferocious horselord to abandon their evil path. Adherent of Guptaka does not shy away from violence if it ensure the survival of the Sangha, believing that protecting the monk is enough merit to ascend into heaven or even achieving nirvana and be freed from circle of reincarnation."
