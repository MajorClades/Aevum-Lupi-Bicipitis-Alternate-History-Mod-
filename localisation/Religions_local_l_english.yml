 ###jyotisastra

 jyotisastra: "Jyotisastra"
 jyotisastra_religion_desc: "State religion of the Arjuna Samrajya, centered in India but carried by merchants to Southeast Serica and Jongwa. Led by the Lekha-nayaka, chosen through testing his bond with the Syzygos, Mani's spiritual twin. Upon his recognition, the Prabuddh Seminar relocates to his domain, making it the new spiritual center.\n\n Society is divided into three groups, the Elect, Hearers, and Catechumens. The Elect live ascetic lives but don't need to wander like the Denawar, keeping the sect more contained. Hearers support them, abstain from meat, and strive for rebirth as Elect. Catechumens (non-Manichaeans under the Lekha-nayaka's authority) are bound to the cycle of rebirth: the sinful reborn to suffering as animals and the virtuous as plants, destined to be consumed and spiritually freed by the Elect.\n\n The faith teaches that the cosmic war of Light and Darkness still rages, and the Elect's purity liberates trapped light. They venerate Mani as the last and greatest Prophet, as well as Jesus, Buddha, Zoroaster, and Narayana. Although there is a clear set of orthodox believes, syncretism is quite common. In some areas the faithful resemble hindus, in other places they resemble buddhists, in other superficial Jyotisastra beliefs have merely been adopted."
 NOTMANICH: "Infidels"
 jyotisastra_rebels_demand: "Convert $COUNTRYNAME$"
 jyotisastra_rebels_demand_desc: "The religious rebels fight for the $RELIGION$ religion. They demand that we recognize its supremacy or at the very least cease our efforts to convert them and let them worship in peace."

