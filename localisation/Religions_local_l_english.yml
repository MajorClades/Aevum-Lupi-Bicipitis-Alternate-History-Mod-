 #####Daoism religion
 daoism: "Daoist"
 daoism_religion_desc: "Once, Zhuang Zhou dreamed he was a butterfly, a butterfly flitting and fluttering about, happy with himself and doing as he pleased. He didn't know that he was Zhuang Zhou. Suddenly he woke up and there he was, solid and unmistakable Zhuang Zhou. But he didn't know if he was Zhuang Zhou who had dreamt he was a butterfly, or a butterfly dreaming that he was Zhuang Zhou. Between Zhuang Zhou and the butterfly there must be some distinction! This is called the Transformation of Things."
 daoism_rebels_name: "$RELIGION$ Zealots"
 daoism_rebels_desc: "Religious fanatics tend to rise up in provinces controlled by nations of a different faith. They seek to spread their faith and smite all unbelievers."
 daoism_rebels_army: "$RELIGION$ Army"
 daoism_rebels_demand: "Convert $COUNTRYNAME$"
