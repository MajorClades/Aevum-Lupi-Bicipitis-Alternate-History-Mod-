##MIDEWIWIN
 midewiwin: "Midewiwin"
  midewiwin_religion_desc: "Since the arrival of the 'Dawn-men' from across the Great Sea, their plagues and steel killed most of the elders and almost erased our traditions and faith, almost. Those dark days are long past and the Midew have taken it upon themselves to keep our stories alive by writing down and archiving what litte is left, traveling the courts as diplomats and physicians, singing legends of the past, so that the tales of our forefathers may never be forgotten again."
