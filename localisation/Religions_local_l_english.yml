####Impotian 

 impotian: "Impotian"
 impotian_religion_desc: "The Impotian Church, also known as Soxon Church or Church of the West, is a schism of the Lucanian church. The creation of depictions of Christ is very common and usually features situations from daily life, as opposed to Jesus on the Cross. In 1444 it can be found in Western Europe"
