#Sofieri
 sofieri: "Šofierism"
 sofieri_religion_desc: "Fueled by a rather unique interpretation of Turkic mythology, Gnostic texts, Ancient Greek mythos and plays as a single unified canon, the Šofieri seek an understanding of God Alitayma, 'Truth', and the beginning of the Grand Contradiction: Existence, caused by a long forgotten debate between Alitayma and Lete, 'The First Lie'. The Šofieri societies, first born among the Turkish upper classes, believe in the search for knowledge both for self-improvement and to reach what lies beyond Existence, where they will return to God."
