#RELIGON
#####Tantraism
 mantramarga: "Mantramarga"
 mantramarga_religion_desc: "This is a term used to refer to multiple Hindu and folk sects that share only the concept of ‘tantra’. Tantrics believe in extensive use of mantra, yantra, dhyana, puja and mudra to obtain siddhi (supernatural might and enlightenment) and bhoga (pleasure). They idolize Shiva (the divine masculine) and Mahadevi (the divine feminine) most among all the gods, and do not necessarily believe the Vedas to be the supreme authority.\n\nTantrics are present mainly in the more isolated parts of India, such as Kashmir and the dense forests of Eastern Vanga."
 mantramarga_rebels_demand: "Convert $COUNTRYNAME$"
 mantramarga_rebels_demand_desc: "The religious rebels fight for the $RELIGION$ religion. They demand that we recognize its supremacy or at the very least cease our efforts to convert them and let them worship in peace."
 mantramarga_rebels_title: "Religious"
 mantramarga_rebels_name: "$RELIGION$ Zealots"
 mantramarga_rebels_desc: "Religious fanatics tend to rise up in provinces controlled by nations of a different faith. They seek to spread their faith and smite all unbelievers."
 mantramarga_rebels_army: "$RELIGION$ Army"
#####SANATANISM/Hindutva
 sanatanism: "Sanatanist"
 sanatanism_religion_desc: "Rta (cosmic order and truth) and the natural order of society - these are the two principles lying at the core of the oldest and least syncretic of the Indic faiths. All other faiths are falsehoods spread by Dasas that seek to corrupt the Arya away from the true gods. They will never compromise with any other faith - concepts such as Dharma and Karma that most other Hindus have embraced are totally alien to them.\n\nMost adherents of this sect are now restricted to Pahadibhum."
 sanatanism_rebels_demand: "Convert $COUNTRYNAME$"
 sanatanism_rebels_demand_desc: "The religious rebels fight for the $RELIGION$ religion. They demand that we recognize its supremacy or at the very least cease our efforts to convert them and let them worship in peace."
 sanatanism_rebels_title: "Religious"
 sanatanism_rebels_name: "$RELIGION$ Zealots"
 sanatanism_rebels_desc: "Religious fanatics tend to rise up in provinces controlled by nations of a different faith. They seek to spread their faith and smite all unbelievers."
 sanatanism_rebels_army: "$RELIGION$ Army"
