 #####Korean religion
 musok: "Musok"
 musok_religion_desc: "'Musok' refers to the traditional religion of the Korean peninsula and island of Tamna. A collection of Korean and Tamnan mythology, it is based on the veneration of the gods and ancestors."
 RUIST: "Ruist"
 SHANGQING: "Shangqing"
 musok_rebels_title: "Religious"
 musok_rebels_name: "$RELIGION$ Zealots"
 musok_rebels_desc: "Religious fanatics tend to rise up in provinces controlled by nations of a different faith. They seek to spread their faith and smite all unbelievers."
 musok_rebels_army: "$RELIGION$ Army"
 musok_rebels_demand: "Convert $COUNTRYNAME$"
 musok_rebels_demand_desc: "The religious rebels fight for the $RELIGION$ religion. They demand that we recognize its supremacy or at the very least cease our efforts to convert them and let them worship in peace."
 yeongdeung: "Yeongdeung"
 yeongdeung_desc: "Yeongdeung is the Goddess of the winds and the sea. She visits Tamna once a year to bring forth the bounty of the seas."
 hwanung: "Hwanung"
 hwanung_desc: "Hwanung is also known as "Heaven King." It is said that he transformed a bear into a human and made her his wife. She later gave birth to Dangun, First King."
 dangun: "Dangun"
 dangun_desc: "First King of Gojoseon and Father of the Korean nation, Dangun is venerated even on Tamna, where his presence was never felt."
 cheonjiwang: "Cheonjiwang"
 cheonjiwang_desc: "Cheongjiwang is, according to the Tamna tradition, creator of the world. He is the one who destroyed one of the twin suns and moons to make the world bearable for humans."
 samseung: "Samseung"
 samseung_desc: "The Goddess of Fertility according to the Jeju tradition. Each village has two midwives who work in tandem with her to make sure each birth succeeds."
 bog-wonja: "Bog-wonja"
 bog-wonja_desc: "The First King of the United Kingdoms of Tamna, who was rewarded with ascension to Heaven by the gods. He will be forever remembered for what he has done for us."
 traveller: "Sonnim"
 traveller_desc: "The Visitor in White who offered to teach the Kings of Tamna in the ways of the light, like he taught the Prince of Ming. Upon his ascension to Heaven, he was made an official part of the Royal Family's pantheon."
 witness: "Sieo"
 witness_desc: "The Seer in Black who promised salvation to the nation, slayer of the Visitor. Upon the completion of his Black Pyramid, he vanished, seemingly ascending to Heaven. His disciples quickly integrated themselves into the military, which has become a hotbed for his ideals."
 amaterasu: "Amaterasu"
 amaterasu_desc: "The Shinto Goddess of the Sun, ancestress of the once mighty royal family of Yamatai-ko. Now she has been integrated into the pantheon of the Tamnan Royal Family."
 kotankar: "Kotankar"
 kotankar_desc: "Kotan-kar-kamuy is the creator deity of the Ainu people. With the integration of the Ainu pantheon, he has finally gained the recognition he deserves."
 jademperor: "Yu"
 jademperor_desc: "According to Jongwan tradition, the Jade Emperor is a great king who achieved immortality. Upon defeating a great evil, he was proclaimed sovereign of all. The Tamnan Royal Family now prays to him to help protect the people, as he did in life."
 buddha2: "Buddha"
 buddha2_desc: "Siddhartha Gautama was the first person to teach the nature of Buddhism to the wider world. We may not agree with all of his words, but his practices will be very helpful for our people.""
 jesus: "Jesus"
 jesus_desc: "Jesus Christ, son of the Christian God. We have heard conflicting accounts as to his nature, but many of his teachings have resonated with the Tamnan people. As such, he has been integrated into the Royal Pantheon as a long lost son of Dangun."
 mani: "Mani"
 mani_desc: "Mani was the prophet for the Manichaean faith, which has found a home among the Princes of the Ming and the Yenisei warlords. His teachings, which fall in line with that of the great Visitor in White, have spread far across the realm, and help improve the integration of other faiths."
 #####Yizhou religion
 taiping: "Taiping Dao"
 taiping_religion_desc: "The Taiping Dao, or Way of Great Peace, is an ancient Taoist sect that traces its origins to the Han dynasty. Made popular by Great Teacher Zhang Jiao and the Yellow Turbans, it has survived in the kingdom of Yizhou for millennia. Believers worship Huangdi, Laozi, and Taiyi, and believe that sickness and suffering are borne from sin."
 taiping_rebels_title: "Religious"
 taiping_rebels_name: "$RELIGION$ Zealots"
