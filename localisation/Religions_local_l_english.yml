 #####Jingtianfazu religion
 jingtianfazu: "Jingtianfazu"
 jingtianfazu_religion_desc: "Jingtianfazu, roughly translating to Reverence for Heaven and Ancestors, is a colloquial term used to describe the many different folk traditions practiced across Jongwa. Just as there is no one true name for the faith, there is no one true way to practice it; Tradition varies from person to person and village to village. Generally, though, in each one a recognizable structure can be found. This includes the adhereance to the concept of Tian, sometimes in the form of the Jade Emperor, the worship of spirits, and the veneration of ancestors."
 jingtianfazu_rebels_name: "$RELIGION$ Zealots"
