#THE BEEEEEEESSS (Ephesian)
 postroman_group: "Post-Roman"
 harmonized_postroman_group: "Harmonized with Post-Roman Religions"

 ephesian: "Ephesian"
 ephesian_religion_desc: "One of the last pagan religions of Europe, with the Ephesians being mostly found in the western part of Anatolia and in Cappadocia. The community has no centralized leadership and is internally divided into several casts. Individual communities are governed by a council of the Kouretes, who study the hidden metaphysics of the Monad, Dyad, and Pleroma and are the keepers of the sacred texts. The Listeners, lay devotees who uphold ethical purity while awaiting eligibility for initiation. The previously mentioned lay followers and the occasional charismatic preacher. They root their faith on a primordial cosmogony centered on Hypsistos, the self-begotten Monad, who precedes all being and defies naming. Ephesian doctrine venerates Barbelo, the Mother-Father and first emanation, and most importantly the Dyad, Artemis and Apollo, through whom the will of Hypsistos is shaped into creation. They recount the fall of Persephone into darkness, the birth and dismemberment of Zagreus, and humanity's ignition from his ash, each soul bearing a fragment of his divine heart. While all communities defer to the mountain sanctuaries where the Kouretes convene, practice varies widely: some emphasize strict asceticism to free the heart's light, others cultivate ecstatic ritual to awaken Epinoia, the spark of remembrance."
 ephesian_rebels_demand: "Convert $COUNTRYNAME$"
 ephesian_rebels_demand_desc: "The religious rebels fight for the $RELIGION$ religion. They demand that we recognize its supremacy or at the very least cease our efforts to convert them and let them worship in peace."
 ephesian_rebels_title: "Religious"
 ephesian_rebels_name: "$RELIGION$ Zealots"
 ephesian_rebels_desc: "Religious fanatics tend to rise up in provinces controlled by nations of a different faith. They seek to spread their faith and smite all unbelievers."
 ephesian_rebels_army: "$RELIGION$ Army"

#Montanism (Pepuzan new jerusalem schizos)
 montanist: "Montanist"
 montanist_religion_desc: "Montanists, known internally as 'New Revelation' and externally as Phrygians or Pepuzans, are a sect originating in 2nd century Phrygia, founded by Montanus. They regard Pepuza as the New Jerusalem and believe in ecstatic prophecy, claiming to speak as possessed fully by God. There is a historic divide in the New Prophecy between Trinitarians and Monarchians but it's been put aside since the conversion of Rhomania to Islam and the two positions have coexisted since."
