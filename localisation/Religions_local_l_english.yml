 ###denawar
 manich: "Denawar"
 manich_religion_desc: "Called the “Merchants' Faith”, it's the second largest and most widespread Manichaean school, ruled from the See of Babylon by the Yamag, elected anonymously by the city's bishops and spiritual heir to the Prophet Mani. The faith is internally divided into Elect and Hearers: the wandering, ascetic Elect travel with caravans (being forbidden from settling in one place), spreading doctrine and goods alike, while the Hearers support them in hopes of rebirth as Elect. Denawar teaching holds that the cosmic war is won; only the liberation of Light from matter remains, achieved through the Elect's ritual purity. Aside from Mani, they revere Jesus, Buddha, Zoroaster, Alchasai and Seth, and decorate their churches with intricate iconography. Though all submit to Babylon, local custom varies widely, from pork-shunning, corpse-burning communities in Rhomania, to vegetarian, excarnating sects in Sogdia. The faith's deep ties to caravan trade have long shielded its followers from the harshest persecution."
