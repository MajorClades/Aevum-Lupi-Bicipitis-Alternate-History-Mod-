l_english: 
 
 #events
 arabisation.1.t: "The Crescent and the Sunrise"
 arabisation.1.d: "From Allea to Aleppo to Palmyra to Niniveh to Babylon this land has been home to many mighty empires and peoples, from the Holy City of Al-Quds to the fertile plains of the Tigris and Euphrates rivers this land has always been great. It is the shining example of the greatest civilisations to ever be, before we came and outshined them all!"
 arabisation.1.a: "From the river to the sea."

 arabisation.2.t: "Khemi, Aegyptus and Misr "
 arabisation.2.d: "Among the vast sands of the Sahara there exists a stretch of land where civilisation could bloom, it is found by the mighty Nile river, a land inhabited for thousands of years in a foggy time long before even the Greeks or Romans became civilised themselves. As new stewards of the river we become inheritors of this tradition, from Copt to Greek to Roman the torch of this ancient civilisation has been passed onto us."
 arabisation.2.a: "We'll carry this flame a thousand years more."

 arabisation.3.t: "Andalusian Feeling"
 arabisation.3.d: "The latin speaking vandals of Ifriqiya have been subjugated for some time now and what were once our greatest and fiercest enemies have become but indistinguishable from our kin."
 arabisation.3.a: "Quite ironic."

 arabisation.4.t: "Iberian Nights"
 arabisation.4.d: "Even at the farthest edge of the world in a peninsula fractured in faith and culture Islam has taken root, the people marvel at our ways and can't help but adopt them as their own."
 arabisation.4.a: "Impressive!"

 arabisation.5.t: "From a Merchant to Another"
 arabisation.5.d: "The fractured states of the so-called 'Holy Italian Empire' have become masters of trade in the Mediterranean, of course as traders ourselves we know how far faith and culture can spread through ports and marketplaces. As we increasingly take control of those trade routes, Arabic and Islam spread along them, traders bringing them back to their homes."
 arabisation.5.a: "Art of the deal, baby!"

 arabisation.6.t: "Once Roman, Always a Roman"
 arabisation.6.d: "The once proud romans viewed us as nothing more than herders and merchants in their far flung southern periphery, only mattering to them as the people of the Prophet (Peace Be Upon Him) and inhabitants of the Holy Cities, translating the Holy Quran in their vile vernacular and forcing us to accept it or else. Instead today thousands of them learn and speak arabic daily and despite still calling themselves 'Romans' they are now no less arab than us."
 arabisation.6.a: "How the tables have turned."

 arabisation.7.t: "Bilad As-Sudan"
 arabisation.7.d: "The land across Aden, the Horn of Libya, Kongo, or as it is known to us 'Sudan', has been in contact with the southern arab kingdoms for centuries with many along the coasts closest to us adopting yemeni custom and tongue. With a return to an arab-centric islam a new wave of arabisation has swept through the Kongolese peoples."
 arabisation.7.a: "Very nice."

 arabisation.8.t: "Old and New"
 arabisation.8.d: "Nubia stood as the only major Christian state south of Misr, capable of rivalring even the mighty Empire of the Rhomans, and although certainly declined from its heyday even before our conquest the region still bears its name and its converted arabised inhabitants keep its history and tradition alive and well."
 arabisation.8.a: "Good for them."

 arabisation.9.t: "Not Quite Arabs"
 arabisation.9.d: "South of the latins of Ifriqiya stretches the mighty Sahara, a seemingly endless sea of sand mainly inhabited by a people called Berbers, or Amazigh in their own language. They have unyieldingly resisted vandal efforts to assimilate them and they continue to resist under our rule, despite keeping a staunchly distinct identity "
 arabisation.9.a: "I hate sand..."



