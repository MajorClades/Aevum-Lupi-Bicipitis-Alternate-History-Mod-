#events
 hellas.1.t: "The Future of Hellas"
 hellas.1.d: "Despite the official coronation of [Root.Monarch.GetName] as the [Root.Monarch.GetTitle] of Hellas, the realm finds itself in an awkward spot. These lands have been occupied by Turks for centuries, and the concept of a Greek identity is all but forgotten. In order to lay the foundations for a stable realm, we will have to find something from which to derive our legitimacy.\n\nThree options lie before us. The philosophers and republics of the ancients, the glory of the Eastern Roman Empire, or forsaking both and ruling on our own terms."
 hellas.1a: "We are the successors of the ancient Hellenes"
 hellas.1b: "We are the true heirs of Rome"
 hellas.1c: "We must look to the future, not the past"
 hellas.2.t: "Constantinople Reclaimed!"
 hellas.2.d: "Centuries ago, the honor of Rome was forever tainted by Alexios II converting to Islam. Despite the best efforts of the Christian world, the Empire remained lost. But now, the heathens have been dealt a catastrophic blow. The city has been returned to the arms of Christendom. Preparations are being made to establish it as the new capital of the realm, with [Root.Monarch.GetTitle] [Root.Monarch.GetName] having been crowned Emperor of the Romans in the center of the Hagia Sophia."
 hellas.2a: "The City of Constantine has returned home"
 hellas.3.t: "The Matter of the Turks"
 hellas.3.d: "The Turks first arrived in Illyria in the 600s, and Athens itself fell to their advance in 612. Ever since, much of what was once called Greece has been home to a variety of Turkish tribes. With Hellenic control once again established over the region, the question of what to do with them has to be asked. Should we accept their presence, or drive them out?"
 hellas.3a: "This is their home too, and we shant take that from them."
 hellas.3b: "This was our home first. They have no right to it!"
 hellas.4.t: "The Restoration of Constantinople"
 hellas.4.d: "REPLACE_ME"
 hellas.4a: "The queen of cities, restored at last."
 hellas.5.t: "Heirs of Magna Graecia"
 hellas.5.d: "REPLACE_ME"
 hellas.5a: "Give Hellenes preferential treatment."
 hellas.5b: "Italian, Hellene, it's all Greek to me."
 hellas.6.t: "The Resting Place of St. Peter"
 hellas.6.d: "REPLACE_ME"
 hellas.6a: "It's amazing what the Vatican treasury can do."
 hellas.7.t: "The First Triumph"
 hellas.7.d: "REPLACE_ME"
 hellas.7a: "Magnificent."


