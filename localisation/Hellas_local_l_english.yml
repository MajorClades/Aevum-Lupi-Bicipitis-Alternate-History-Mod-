 hellas.1.t:0 "The Future of Hellas"
 hellas.1.d:0 "Despite the official coronation of [Root.Monarch.GetName] as the [Root.Monarch.GetTitle] of Hellas, the realm finds itself in an awkward spot. These lands have been occupied by Turks for centuries, and the concept of a Greek identity is all but forgotten. In order to lay the foundations for a stable realm, we will have to find something from which to derive our legitimacy.\n\nThree options lie before us. The philosophers and republics of the ancients, the glory of the Eastern Roman Empire, or forsaking both and ruling on our own terms."
 hellas.1a:0 "We are the successors of the ancient Hellenes"
 hellas.1b:0 "We are the true heirs of Rome"
 hellas.1c:0 "We must look to the future, not the past"
 hellas.2.t:0 "Constantinople Reclaimed!"
 hellas.2.d:0 "Centuries ago, the honor of Rome was forever tainted by Alexios II converting to Islam. Despite the best efforts of the Christian world, the Empire remained lost. But now, the heathens have been dealt a catastrophic blow. The city has been returned to the arms of Christendom. Preparations are being made to establish it as the new capital of the realm, with [Root.Monarch.GetTitle] [Root.Monarch.GetName] having been crowned Emperor of the Romans in the center of the Hagia Sophia."
 hellas.2a:0 "The City of Constantine has returned home"
 hellas.3.t:0 "The Matter of the Turks"
 hellas.3.d:0 "The Turks first arrived in Illyria in the 600s, and Athens itself fell to their advance in 612. Ever since, much of what was once called Greece has been home to a variety of Turkish tribes. With Hellenic control once again established over the region, the question of what to do with them has to be asked. Should we accept their presence, or drive them out?"
 hellas.3a:0 "This is their home too, and we shant take that from them."
 hellas.3b:0 "This was our home first. They have no right to it!"
 hellas.4.t:0 "The Restoration of Constantinople"
 hellas.4.d:0 "Constantinople. Nova Roma. The center of the Greek world. For centuries it has stood desecrated, with the heathen Rhomans sitting in the palaces and uttering their heathen prayers inside the Hagia Sophia. Now, it is restored. Once again, Christians pray in the cathedrals, and our ruler takes his rightful place in the royal palace."
 hellas.4a:0 "The queen of cities, restored at last."
 hellas.5.t:0 "Heirs of Magna Graecia"
 hellas.5.d:0 "As we hold and control the island of Sicily and the heel of Italy, much of the Greek population there is more open to our rule than the local Latins. Perhaps we should encourage Greek settlement? It was Greek land 2000 years ago, after all."
 hellas.5a:0 "Give Hellenes preferential treatment."
 hellas.5b:0 "Italian, Hellene, it's all Greek to me."
 hellas.6.t:0 "The Resting Place of St. Peter"
 hellas.6.d:0 "The patrimony of St. Peter controlled much of Cyprus since the Salvation war - that is, until the Rhoman pirates conquered it. They burned the great cathedral that stood there, striking a moral blow against Christendom. Now, though, the papacy has offered to restore the great cathedral that stood next to the burial site of St. Peter."
 hellas.6a:0 "It's amazing what the Vatican treasury can do."
 hellas.7.t:0 "The First Triumph"
 hellas.7.d:0 "For the first time in a thousand years, a true Roman triumph proceeds through the streets of [Root.Capital.GetName]. The leading general tours the city in his chariot, thousands of soliders marching behind him. He is led before the [Root.Monarch.GetTitle], where he shows submission after a recital of prayer. The celebration continues for 3 more days across the city, with many citizens giving praise to god for this victory."
 hellas.7a:0 "Magnificent."
