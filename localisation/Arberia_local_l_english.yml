#events
 arberia.1.t: "Kush je ti, O Arber?"
 arberia.1.d: " 'Who are you, O Arber?' So beings a poem lamenting the split identity of Arberians living in the Holy Italian Empire. For centuries we have coexisted with the people of the peninsula after fleeing the Turkic takeover of our homeland, influencing each other's customs along the way, and as we grow to become the hegemon of Italy we are suffering an identity crisis, are we still tied to Illyria and the Aegean or are we tied to our latin neighbors?"
 arberia.1.a: "We are first among the latins!"
 arberia.1.b: "We are still Arberian. End of story!"

