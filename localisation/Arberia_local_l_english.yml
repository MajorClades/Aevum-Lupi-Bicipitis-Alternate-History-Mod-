l_english:
#other stuff
 arberia_group:0 "Arberia Group"
# missions
 alb_gather_diaspora_title:0 "Gather the Diaspora"
 alb_gather_diaspora_desc:0 "We must gather our kin from across the seas and make this new home truly Arberian."

 alb_goksuyu_question_title:0 "§JThe Göksuyu Question§!"
 alb_goksuyu_question_desc:0 "The region known as Göksuyu was home to the arberians before the turkish mirgations eight-hundred years ago as evidenced by the arberians still living there. Should we take back what was once ours or leave them be?"

 alb_turkish_shores_title:0 "Turkish Shores, Greek Isles"
 alb_turkish_shores_desc:0 "Turks and greeks have squabbled over the Aegean for centuries, we'll put an end to this petty fighting and spread our wings to the eastern sea."

 alb_prepare_to_fight_title:0 "Prepare the Fight"
 alb_prepare_to_fight_desc:0 "We must build up an army and gather strong allies if we are to win our freedom."

 alb_free_arberia_title:0 "Free at last!"
 alb_free_arberia_desc:0 "We have fought for our indipendence and won but we must not sit on laurels, we must now fight to keep it."

 alb_king_arberia_title:0 "§MKingdom of the Arberians§!"
 alb_king_arberia_desc:0 "Molisia has fallen and the red banner flies across southern italy, finally a realm to call our own. Let the Kingdom of the Arberians rise!"

 alb_rome_title:0 "§YThe Eternal City§!"
 alb_rome_desc:0 "The old capital of the Romans, then the city of the Popes, under whom it has decayed from its former heights, under our rule it shall grow again to its former glory"

 alb_italy_title:0 "§lNew Emperors of Italia§!"
 alb_italy_desc:0 "From a small coastal city on the Adriatic split between bickering families to the rulers of Italy and the Mediterrean, our people have spread far across the land, never again to be put under foreign yoke."

 alb_arberia_forevermore_title:0 "§RAevum Aquila Biciptis!§!"
 alb_arberia_forevermore_desc:0 "Like a phoenix Rome's spirit and might has been reborn through us, the bicephalous eagle rises over the slain wolf. Let our empire soar ever higher. Let the Era of the two-headed eagle begin!"

 alb_sicily_title:0 "Seizing Sicily"
 alb_sicily_desc:0 "The island of Sicily is the perfect place from which to spread our influence across the Mediterrean... and the perfect launchpad towards Africa."

 alb_develop_bari_title:0 "Developing Bari"
 alb_develop_bari_desc:0 "Let's make Bari into the capital of trade in the Adriatic."

 alb_port_naples_title:0 "The Port of Naples"
 alb_port_naples_desc:0 "The port of Naples lies on a natural bay perfect to control trade and project power in the Thyrrenian, we must invest in its growth if we are to control the western sea."


