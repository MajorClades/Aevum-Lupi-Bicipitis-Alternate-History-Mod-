#####EVENTS
 burundi_alb.1.test:0 "Grand Ganwa Council"
 burundi_alb.1.desc:0 "It had been several centuries since the banner of Burundi fly, but Mwezi Bambutsu made it happened. With great help from Afar of the north who had graciously housed and shielded us from Liel's rampage, they managed to repel the Sounnite scourge from our land.\nStill, this fledgling kingdom need a faith to profess to.\nMwezi's mother was born to a jewish clan from Gondar and he have been praying to The Lord since he learned how to wield a sword. Still, large contingent of his force are Christ's devotee who wanted to restore the fabled Prestor John's Kingdom. And some of the more reactionary element in the army urged Mwezi to return to the Forebear's way."
 burundi_alb.1a:0 "The Lord blessed me with victory, The Lord we shall follows."
 burundi_alb.1b:0 "Like Christ, We too had risen."
 burundi_alb.1c:0 "We shall not abandon tradition."
