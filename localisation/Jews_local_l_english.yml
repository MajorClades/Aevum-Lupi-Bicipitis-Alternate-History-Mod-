l_english: 
 SEPHARAD:0 "Sepharad"
 SEPHARAD_ADJ:0 "Sephardi"
 pormane_sepharad_title:0 "A Jewish Home in Iberia"
 pormane_sepharad_desc:0 "Iberia lay under our control, finally the diaspora may come to an end as we firmly establish ourselves as the home of the Jews."
 sephard.1.test:0 "Faith and Country"
 sephard.1.desc:0 "As the true faith spreads across Sepharad old national divisions melt away as the people of the region start identifying more and more with us, our faith and our country."
 sephard.1a:0 "Splendid!"

 KNAAN:0 "Kenaan"
 KNAAN_ADJ:0 "Kenaanite"
 mishtavar_knaan_title:0 "A Jewish Home in Turuk-El"
 mishtavar_knaan_desc:0 "Turuk-El lay under our control, finally the diaspora may come to an end as we firmly establish ourselves as the home of the Jews."

 KHAZAR_KHAGANATE:0 "Khazar Khaganate"
 KHAZAR_KHAGANATE_ADJ:0 "Khazar"
 restore_khazaria_title:0 "Restore the Khazar Khaganate"
 restore_khazaria_desc:0 "We have reconquered our former holdings and can finally restore our own Khaganate!"

 HODU:0 "Hodu"
 HODU_ADJ:0 "Hodu"
 shingly_hodu_title:0 "A Jewish Home in Jambudvipa"
 shingly_hodu_desc:0 "The whole of Jambudvipa lies under our control, finally the diaspora may come to an end as we firmly establish ourselves as the home of the Jews."

 home_of_the_jews:0 "Home of the Jews"
 hb0_looking_west:0 "Sepharad's westward way"
 hb0_looking_west_desc:0 "Having learnt of Rausulia from our former raklionne overlords we must not miss the opportunity to make use of the New World, let us explore and settle across the seas."
 hb1_siberian_frontier:0 "The eastern frontier of Kenaan"
 hb1_siberian_frontier_desc:0 "Having secured a jewish homeland we have the opportunity to expand into the eastern tundra, and so we shall."
 da7_khazar_warriors:0 "Khazaria's Warriors"
 da7_khazar_warriors_desc:0 "We have restored our empire and our loyal warriors will help us expand it even further."
 wi6_indian_artisans:0 "Hodu artisans"
 wi6_indian_artisans_desc:0 "The artisans of Bharat are the backbone of our economy and the foundation of our strength."
