# Events
 gauldruid.1_title: "Faith of Gauls"
 gauldruid.1_desc: "From our kin in Scotia news reaches us of a new celtic church. The court debates wether to officially convert as doing so would certainly destabilise the realm. On one side there are those that believe in the need to break the shackles of roman and german churches and return to a faith closer to our ancestors' traditions, on the other those who dismiss this new sect as nothing more than the crazed ramblings of an old man and stress the legitimacy which the current church gives us among our various non-gaulish subjects. Ultimately, the decision lay in the hands of our ruler."
 gauldruid.1.a: "A gaulish church for a gaulish realm!"
 gauldruid.1.b: "We shall not give in to heresy!"