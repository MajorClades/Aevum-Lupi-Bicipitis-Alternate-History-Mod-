l_english:

 #event
 yotvingia.1.title: "Fate of the Saxons"
 yotvingia.1.desc: "For centuries the Saxons have oppressed, slaughtered and driven away our people from what is our rightful ancestral land, since the reclamation of our country we have the opportunity to take revenge or learn to coexist with our former oppressors."
 yotvingia.1.a: "Coexistence is the best course of action."
 yotvingia.1.b: "Let's only reclaim the lands of Old Sudovia."
 yotvingia.1.c: "GET. THEM. OUT."

 yotvingia.2.title: "Clearing the Land"
 yotvingia.2.desc: "Our efforts in driving away the Saxons are proving successful and the land is clear of foreigners and ripe for resettlement."
 yotvingia.2.a: "Can't wait to move in!"

 yotvingia.3.title: "Returning Home"
 yotvingia.3.desc: "After centuries we return to our homes tho we find them inhabited by Saxons, many are leaving for the Old Frontier but those that choose to remain can surely be taught our ways."
 yotvingia.3.a: "Finally."

 #custom
 YOTVINGIA_TT_1: "We will resettle only the lands of Old Sudovia and push the Saxons to the western borderlands where they belong. This course of action will be met with resistance but it will fade rather quickly."
 YOTVINGIA_TT_2: "We will slowly drive out the Germans and assimilate the Elutsians at the cost of development. They will not take kindly to this course of action and we'll be met with strong resistance."

 #decision
 reclaim_yotvingia_title: "Reclaim Great Sudovia"
 reclaim_yotvingia_desc: "It is time to reclaim the legacy of Old Sudovia, the very one the Saxons tried, and failed, to erase."
 YOTVINGIA: "Great Sudovia"
 YOTVINGIA_ADJ: "Great Sudovian"