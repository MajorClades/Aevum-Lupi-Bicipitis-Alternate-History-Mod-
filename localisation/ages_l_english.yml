 ALB_UPDATE_0_DESC: "This country has recieved a mission tree from ALB 1.0."
 LANDING_dlc_alb_update_0_TEXT: "Main Features: The initial release of the mod, with a complete overhaul of the map, countless new cultures and religions, hundreds of new nations and provinces, and over 35 mission trees. Some good nations to begin with are:\n- §YSoxony§!, heirs of the kingdom of Soissons and the Western Roman Empire\n- §YRhomania§!, caliphate and Rhoman Empire\n- §YSaxony§!, crusader kingdom of the east\n- §YJarija§!, premier heir of the Zardom of Zimmska\n- §YThe Red Legion§!, Indictian crusaders in the last crusade for Egypt\n- §YMolise§!, emperor of Italy\n- §YPadania§!, the mercantile lords of the Po"
 LANDING_dlc_alb_update_0_FLAVOR_TEXT: ""
 LANDING_dlc_alb_update_1_TEXT: "Main Features: The first update for ALB, bringing content for all nations in Iberia and Africa. Some good nations to experience this update are:\n- §YSpania§!, Impotian power in Iberia\n- §YRaklionne§!, Venice of the west\n- §YVranciria§!, home of the Hospitallers and lords of the sea\n- §YAldabba§!, heir of Africa\n- §YTunisia/Carthage§!, Bulwark of the HIE/reviver of an ancient legacy\n- §YBurgundia§!, wine-lord of Iberia\n- §YSweben§!, Aldaran conquerers and knights\n"
 LANDING_dlc_alb_update_1_FLAVOR_TEXT: ""
 LANDING_dlc_alb_update_2_TEXT: "Main Features: Content for Italy, introducing the Pontifexian War and the Investiture Crisis. Overhauls all of Asia as well. Some good nations to experience this update are:\n- §YThe Papal State§!, God's representative\n- §YPannonia§!, Grain-lords of Danubia\n- §Ymedina§!, home of the Megaditta\n- §YAkormosir§!, resistance against the Yamato\n- §YGo/Mun/An§!, reuniters of Tamna\n- §YPyay§!, Ultimate tall play in Southeast Asia\n- §YDalmatia§!, lords of the Adriatic\n"
 LANDING_dlc_alb_update_2_FLAVOR_TEXT: ""
 LANDING_dlc_alb_update_3_TEXT: "Main Features: content for all nations in Brittania, as well as missions for the heirs of Guo Hong in the east:\n- §YSiescheng§!, the true queen of cities\n- §YGuo Dominion (Starting as Siescheng)§!, the truest heir of Guo Hong\n- §YCathay§!, the first among equals in Turuk-el\n- §YSweden§!, vikings and norsemen\n- §YScotland§!, the one true (high) king\n- §YBrittania§!, heir of the Romans\n- §YGanden Union§!, carrying our Balder's will\n"
 LANDING_dlc_alb_update_3_FLAVOR_TEXT: ""