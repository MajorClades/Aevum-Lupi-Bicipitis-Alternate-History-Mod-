#####GOVERMENT
 kongo_unstable_dynasty:0 "Unstable Crown of Kongo"
 kongo_unstable_dynasty_desc:0 "The land known as Kongo has always been very divided even when de facto united, even under the great Liel wa Tadi couldn't unite the realm under one faith."

 kongo_stable_dynasty:0 "Crown of the Great Kongo"
 kongo_stable_dynasty_desc:0 "A great feat of our greatest rulers and Kongo shall once again bring the nearby empires to their knees."

 night_lord_fear_based_state:0 "Dreaded Throne of Nsapu"
 night_lord_fear_based_state_desc:0 "Thrice feared and never loved, the Nsapu Nsapu will sow fear and harvest plenty."

 taverian_demoskratia:0 "Taverian Democracy"
 taverian_demoskratia_desc:0 "With the Winged Plague and the collapse of Nenekongo, the old Taveria and the myriad of coastal cities of Rhomans and Arabs managed to fuse together in this Democracy."

 mercenary_bantapolis_reform:0 "Lomayos Mercenary State"
 L_Rhomania:0 "Lomanya"
 L_Rhomania_ADJ:0 "Lomanyan"
 mercenary_bantapolis_reform_desc:0 "Caring for nothing but the weight of one's coinpurse, this mercenaries will bring war to the Horn."

#Liel wa Tadi born 1315 at the height of the Kongolese Civil War, not of a Sounnite family but later converted, joined in a mercenary army in 1339, ultimately conquered enough of Kongo to take the title of Mwene Kongo in 1350. 

 num_night_assaults:0 "Night Assaults"
#####Mission
kong_restore_the_coast_title:0 "Once Again United"
 kong_restore_the_coast_desc:0 "Liel wa Tadi put an end to the Kongolese Dynastic War and brought the Rhomans to heel, but his successor couldn't keep the empire together. We are once again poised to dominate the horn but we need to prepare a more stable succession."

 kong_taverian_retook_title:0 "Topple Taveria"
 kong_taverian_retook_desc:0 "Taveria was made to control the old Taverian dominion and the Rhomanian and Arab colonies on the coastline of the Great Kongo, now it stands defiant to the true rulers of the Horn, but their power comes from the people and their people are weak."

 kong_rhoman_cities_title:0 "Fate of Demokratia"
 kong_rhoman_cities_desc:0 " The cities of the merchant arab and noble rhoman are now under our control, what started as simple colonies and ports for trade, are now the lifeblood of our realm but we still need to properly create laws for them."

 kong_home_of_warriors_title:0 "Old Meets New"
 kong_home_of_warriors_desc:0 " The old tactics of Liel meet the new situation of the fractured Horn, with some training and some wars we might make better something old or make tradition something new."

 kong_true_warriors_title:0 "Shelter the Soldier"
 kong_true_warriors_desc:0 " Liel was once a soldier and like many of them, would have preferred a comfortable bed than the bare sands of war."

 kong_more_war_title:0 "Entrench and Instill"
 kong_more_war_desc:0 "War stops at nothing, luck will save you sometimes but only true knowledge will save an army, only good strategy will win the day and only the Great Kongo shall conquer the world."

 kong_kuba_retook_title:0 "Capturing Kuba"
 kong_kuba_retook_desc:0 "The Kuba tribes united against the Great Kongo and they were conquered. We shall do so again."

 kong_restorer_of_kongo_title:0 "Reforging Greater Kongo"
 kong_restorer_of_kongo_desc:0 " Nenekongo is the mighty empire of Liel wa Tadi, forged by force, strategy and cleverness; ensuring loyalty through faith and fear, culminating in the unification of the Horn of Lybia under his banners. Today, that empire is restored and we will stand the test of time."

 kong_upbringers_title:0 "Herd the Highlanders"
 kong_upbringers_desc:0 " While the cities are stable and under control, the traditional nomadic tribes are still wandering around, friendly or not, we must deal with them. But there is nothing to conquer, nothing to loot or pillage, perhaps creating something for them to lose might make them more loyal."

 kong_brew_of_war_title:0 "Bitter War or Brew"
 kong_brew_of_war_desc:0 " The average soldier may not need the mokha brew but it will help during the night raids or just to be awake."

 kong_night_terrors_title:0 "Of Fear and Hunger"
 kong_night_terrors_desc:0 "Where will you hide? Where will you run? Perhaps we will find out where you will be laid to rest."

 kong_push_the_avalit_title:0 "End Arab Arrogance"
 kong_push_the_avalit_desc:0 " The Avalit Sultans made all the right decisions, they swore fealty to the Tyrant and as soon as Nenekongo started to collapse, they left. We will not be so lenient for those who named our greatest ruler a 'Tyrant'."

 kong_avalit_death_title:0 "False Loyalty True Gold"
 kong_avalit_death_desc:0 " The Sayhadics swore their loyalty to us, but we know any moment of weakness will be our doom, unless they bring enough coin."

 kong_aktogramm_city_title:0 "The Launching Point"
 kong_aktogramm_city_desc:0 "Liel left the city of Xamar unconquered, but many would claim that the tribute paid to not be attacked would have been no different than normal taxation. This time we will see if that theory holds true or not."

 kong_aktogramm_coast_title:0 "The Greatest Conqueror"
 kong_aktogramm_coast_desc:0 " As the world becomes smaller and coastlines are mapped, we realize that our enemies may strike from any direction, therefore we must conquer what they wanted to conquer first."

 kong_true_mokha_title:0 "Monarch's Mokha"
 kong_true_mokha_desc:0 " The bitter brew was not liked by the Tyrant, but that would not stop his armies from enjoying it. Despite the collapse of Nenekongo, the beans of the so-called Mokha have been planted plenty and sold as well."

 kong_filosofy_brew_title:0 "Royal Mokhahouse"
 kong_filosofy_brew_desc:0 " Thinkers and philosophers enjoy the bitter drink too much, perhaps we could ensure that they stay at one place to talk eachother ears out."

 kong_night_lords_title:0 "A Night to Fear"
 kong_night_lords_desc:0 "Liel wa Tadi first unleashed the Nzapu Nzapu against the city of Bantapolis, where they earned the name of Maws of the Tyrant. Details of that night are sparse, but the survivors talk of flesh-eating warriors and never-ending screams; this rumors continued wherever the Night Lords would be found. Neither the collapse or the plague stopped them and now they are still available to be hired."

 kong_secure_the_strait_title:0 "The Great Fleet"
 kong_secure_the_strait_desc:0 "Despite being born amidst the hills and mountains of Kongo, Liel was very interested in creating a powerful navy. Unfortunately it was disbanded as the state collapsed, but some sailors still yearn for an united Kongo."

 kong_ethiopians_title:0 "The Old Faith"
 kong_ethiopians_desc:0 " This land was known to the Rhomans as Ethiopia but our arrival moved plenty of tribes and collapsed kingdoms, but the faithful remained. The Kongolese conversion to Islam was already happening under the Madagascar dynasty, and Liel wa Tadi completed the process. But we could probably do with renovating old temples and churches of previous faiths."

 kong_adenic_coffe_title:0 "Control The Strait"
 kong_adenic_coffe_desc:0 " Even the least intelligent herder knows to bring his goods to the city if he wants to sell anything at all, but we want the entire thing at a discount."

 kong_true_faith_title:0 "The Sword of Islam"
 kong_true_faith_desc:0 "Liel wa Tadi broke the Rhomans and then entered the city with no troubles. Arab leaders proclaimed him the Sword of Islam against the controversional laws of the Basileous of Rhomania. "

 kong_true_caliph_title:0 "True Caliph"
 kong_true_caliph_desc:0 " The Rhomanians have been misleading the faithful for centuries and know we will ensure that they are put on the right road to enlightment."

 kong_india_that_way_title:0 "Oriental Opulence"
 kong_india_that_way_desc:0 " The spices are flowing, perhaps we should ensure our books are cataloging the profits properly. We could make a Dune out of all of them."

 kong_ndau_subjects_title:0 "The Loyal Few"
 kong_ndau_subjects_desc:0 " The Ndau tribes remained loyal to the Kongolese crown and they have helped keep us strong."

 kong_shona_retook_title:0 "Shona Under Us"
 kong_shona_retook_desc:0 " Piece by piece, the Great Kongo shall be restored, soldiers shall flock to our banners for glory and fame as the Liel once did."

 kong_chollo_retook_title:0 "Liel's Mercy"
 kong_chollo_retook_desc:0 " After our most recent conquest, we have reconnected with the Beja tribes loyal to the old Great Kongo as Liel defended them against the Nubians. We shall reclaim all the land under the Great Kongo now."

 kong_break_nubia_title:0 "Break Nubia"
 kong_break_nubia_desc:0 " Nubia, the rebellious, was the first to rebel against the Great Kongo; blocking the necessary troops to break the Rhomans armies in the East; but that was years ago and now we will repay them in kind."

 kong_one_last_dynasty_title:0 "Last Dynasty of Egypt"
 kong_one_last_dynasty_desc:0 " The great city of Memphis stands as a great capital for our newest conquered land, but maybe it could be the capital of the entire Empire."

 kong_jerusalem_title:0 "A City of Faiths"
 kong_jerusalem_desc:0 " With the holy city of Jerusalem in our hands, we have done what Liel could not, and we will continue what he would have wanted."

 kong_india_this_way_title:0 "Entrepot to India"
 kong_india_this_way_desc:0 "The Indian trade that passes through our land first stops at this island and now that we control it, we could perhaps take more than we bargained for."

 kong_india_my_way_title:0 "Mbalemba Colony"
 kong_india_my_way_desc:0 "We need to increase our production in India, as there cannot be any other to profit from this spices."
