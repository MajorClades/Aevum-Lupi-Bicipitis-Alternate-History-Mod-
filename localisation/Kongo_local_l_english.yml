l_english:
#####EVENTS
 kongo_alb.1.test:0 "The Tyrant's Legacy"
 kongo_alb.1.desc:0 "Warfare was something the great Liel wa Tadi mastered in youth, but will his aggressive tactics still work against those who faced before?\nPerhaps it would be better to carefully plan our routes of expansion and reconquest, to hit each and every one of our enemies in coordinated fashion."
 kongo_alb.1a:0 "Perhaps we could remind them what happened."
 kongo_alb.1b:0 "One by one, they will all fall."

 kongo_alb.2.test:0 "To the Sea"
 kongo_alb.2.desc:0 "The Avalit sultanate bent the knee to the great Liel, but that was mostly a farce; the arabs returned to raid into our lands the moment Nenekongo collapsed.\nThis time we will make sure that there will no one to betray us."
 kongo_alb.2a:0 "Shame on you."
 kongo_alb.2b:0 "Fool me twice."

 kongo_alb.3.test:0 "The Cities of the Lomayos"
 kongo_alb.3.desc:0 "The arrival of the Rhomanian traders and Arabic merchants transformed the economical situation of the Horn, with slaves and goods flowing through their new cities. The Dynastical War saw the Rhomans attack our realm and they believed their cities protected. The Tyrant would conquer them and used their boats to take the other coast. The cities would not be indipendent even after the collapse of Nenekongo and now they are back under our control."
 kongo_alb.3a:0 "Allow more freedom for the Lomayos."
 kongo_alb.3b:0 "No more Lomayos."

 kongo_alb.4.test:0 "Of East and West"
 kongo_alb.4.desc:0 "Some parts of Lybia are too rural to conquer, the only reason to build a road through them would be to not allow others to do so. The sea remains full of trade but foreign ships become even more foreign, especially if they are trying to steer the Indian goods away from us."
 kongo_alb.4a:0 "We are the true Lords of Lybia!"
 kongo_alb.4b:0 "India is ours."

 kongo_alb.5.test:0 "A Mighty Empire and its Capitals"
 kongo_alb.5.desc:0 "With the conquest of Memphis, Liel made it his new capital to properly attack the Rhomans. There is little in the city to remind anyone of that period, as most of the damage was repaired and anything else broken and reused by the vengeful Rhomans."
 kongo_alb.5a:0 "Our Northern Capital once more!"
 kongo_alb.5b:0 "There is no haste to move administrations."

 kongo_alb.6.test:0 "Workers for Working"
 kongo_alb.6.desc:0 "Our arrival in southern India was met with resistance and we must refill our coffers quickly to pay our soldiers. Workers and slaves will be brought here to produce goods faster and cheaper so that our merchants can sell them."
 kongo_alb.6a:0 "Send more slaves."
 kongo_alb.6b:0 "Send less slaves."

 kongo_alb.100.test:0 "Hunger and Slake"
 kongo_alb.100.desc:0 "The Maws of the Tyrant seems to be aware that our coffers are light, but they could be convinced to not run rampant across our realm."
 kongo_alb.100a:0 "You can eat that village."
 kongo_alb.100b:0 "I am not afraid."

 kongo_alb.101.test:0 "The Night Call"
 kongo_alb.101.desc:0 "The Night Lords have won their indipendence!"
 kongo_alb.101a:0 "I am the Night!"
 kongo_alb.101b:0 "Nah."

 kongo_alb.102.test:0 "The Bantapolis Deal"
 kongo_alb.102.desc:0 "The Sacred Band of Bantapolis seems to be aware that our coffers are light, but they could be convinced to not declare indipendence."
 kongo_alb.102a:0 "You can have your special status."
 kongo_alb.102b:0 "Here, you can have it."

 kongo_alb.103.test:0 "The Breakers of Castes"
 kongo_alb.103.desc:0 "The workers of the Mbalemba plantations have risen against us!"
 kongo_alb.103a:0 "Join them."
 kongo_alb.103b:0 "What?"

