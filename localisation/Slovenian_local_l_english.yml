# decision
 alb_form_slovenia_title: "Reclaim Slovenia!"
 alb_form_slovenia_desc: "One thousand years ago Atilla the Hun drove us from our homeland to the frigid lands of Zladinia and the vast steppes of Serica. But we remained. We endured. The time is ripe to reclaim our ancient birthright and make history. Let the world tremble before the might of the Slavs!"

# events
 sloveniafaith.1_title: "The faith of the Slavs"
 sloveniafaith.1_desc: "Having secured our ancient homeland questions of faith have come up and if to even choose, but then again, which way shall we follow?"
 sloveniafaith.1.a: "What a silly question, we would never abandon Christ!"
 sloveniafaith.1.b: "The way of the Buddha."
 sloveniafaith.1.c: "The way of the Turks."
 sloveniafaith.1.d: "The way of the Romans."
