# decision
 alb_form_slovenia_title: "Reclaim @RA2 Slovenia!"
 alb_form_slovenia_desc: "One thousand years ago Atilla the Hun drove us from our homeland to the frigid lands of Zladinia and the vast steppes of Serica. But we remained. We endured. The time is ripe to reclaim our ancient birthright and make history. Let the world tremble before the might of the Slavs!"

# events
 slovenia.1_title: "The faith of the Slavs"
 slovenia.1_desc: "Having secured our ancient homeland questions of faith have come up and if to even choose, but then again, which way shall we follow?"
 slovenia.1.a: "What a silly question, we would never abandon Christ!"
 slovenia.1.b: "The way of the Khitans."
 slovenia.1.c: "The way of the Turks."
 slovenia.1.d: "The way of the Romans."

 slovenia.2.title: "The Second Windelian Migration"
 slovenia.2.desc: "After 1000 years we migrate once again, this time not as flight but as settlement. From the Rhine to the Urals and from Almanach to Costantinople, Slovenes will make themselves at home!"
 slovenia.2.a: "A bright day for all Slavs."
