l_english:
 hinduism: "Vaidika"
 hinduism_religion_desc: "What one could consider the ‘standard’ Hindu, this is the term used for the majority of Hindus in the subcontinent. They have eagerly tried to assimilate and take various ideas from all faiths in India, and have embraced Buddhist ideas such as Dharma and Samsara as well as Manichaean ideas regarding dualism and meat consumption. In this sect, the universe is trapped in an endless battle between the supreme existence, Brahman, and the evil Mara, lord of worldly desires."
 coptic: "Miaphysite"
 catholic: "Lucanian"
 catholic_religion_desc: "The Lucanian Catholic Apostolic Church is based in the original latin rite, founded by St. Luke of Tornema. It is the most popular and orthodox church in Europe, with it's center at the Papacy in Rome."
 totemism_religion_desc: "Totem poles are monumental carvings typical of the peoples of Isfjöll and Hinodaina. The carvings therein may symbolize or commemorate ancestors, cultural beliefs, familiar legends, clan lineages, or notable events. Despite not being worshipped they are extremely important to the cultures of the Pacific and Rausulia at large."
