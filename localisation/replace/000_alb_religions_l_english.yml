 nestorian_religion_desc: "The Church of the East emphasizes the disunion between the human and divine nature of Jesus. It is most commonly practiced along the Silk Road."
 totemism_religion_desc: "Totem poles are monumental carvings typical of the peoples of Isfjöll and Hinode'aina. The carvings therein may symbolize or commemorate ancestors, cultural beliefs, familiar legends, clan lineages, or notable events. Despite not being whorshipped they are extremely important to the cultures of the Pacific and Rausulia at large."