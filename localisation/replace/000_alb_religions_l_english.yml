 catholic_religion_desc: "The Lucanian Catholic Apostolic Church is based in the original latin rite, founded by St. Luke of Tornema. It is the most popular and orthodox church in Europe, with it's center at the Papacy in Rome."
 totemism_religion_desc: "Totem poles are monumental carvings typical of the peoples of Isfjöll and Hinode'aina. The carvings therein may symbolize or commemorate ancestors, cultural beliefs, familiar legends, clan lineages, or notable events. Despite not being worshipped they are extremely important to the cultures of the Pacific and Rausulia at large."