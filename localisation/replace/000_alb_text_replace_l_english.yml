#Vassals
 autonomous_vassal:0 "Autonomous Vassal"
 autonomous_vassal_title:0 "Autonomous Vassal"
 autonomous_vassal_title_plural:0 "Autonomous Vassals"
 autonomous_vassal_is_our:0 "$NAME|Y$ is our Autonomous Vassal."
 autonomous_vassal_long_desc:0 "An Autonomous Vassal must follow their overlord to war. But they can also wage war on their own, without their overlord approval, and as such, without their help."

 make_trade_league_into_vassal_title:0 "Vassalize Trade Member"
 make_trade_league_into_vassal_tooltip:0 "§Y[From.GetName]§! will become your subject."
 make_trade_league_into_vassal_desc:0 "Do you wish to make §Y[From.GetName]§! a vassal? It will cost the require ducats to take this action too."


 make_autonomous_vassal_title:0 "Create Autonomous Vassal"
 make_autonomous_vassal_tooltip:0 "§Y[From.GetName]§! will gain autonomy in their internal affairs."
 make_autonomous_vassal_desc:0 "Do you wish to make §Y[From.GetName]§! an autonomous vassal? They will be able to wage war on their own, but we will still have to come to their aid if they're being attacked.\n\nAutonomous Vassal pay less tax and can wage war on their own, but they will also have less liberty desire.\nYou can't annex autonomous vassal before making them normal vassal again."

 make_me_autonomous_vassal_title:0 "Ask for Autonomy"
 make_me_autonomous_vassal_tooltip:0 "§Y[ROOT.GetName]§! will gain autonomy in their internal affairs."
 make_me_autonomous_vassal_desc:0 "Do you wish to make yourself an autonomous vassal of §Y[FROM.GetName]§!? You will be able to wage war on your own, but you will still have to come to their aid if they're being attacked.\n\nAutonomous Vassal pay less tax and can wage war on their own, but they will also have less liberty desire.\They can't annex autonomous vassal before making them normal vassal again."

 cancel_autonomous_vassal_title:0 "Make Vassal"
 cancel_autonomous_vassal_tooltip:0 "We will strip §Y[From.GetName]§! of their privilege, and make them regular vassal. This will anger them."
 cancel_autonomous_vassal_desc:0 "Do you wish to make §Y[From.GetName]§! a vassal again? They will become a regular vassal again and will gain §R65.0§! liberty desire.\n\nThis will cost you §R-1§! stability."

#Mississippi - Atloyac
 se_mississippian_legacy:0 "Atloyac Legacy"
 se_mississippian_legacy_desc:0 "A legacy is created by stories. Stories about the places that we inhabited, the objects that we used, the lives that we lived. The ancient Atloyacan culture extended along the river as a religious and trade network that united different tribes."
 spartans_of_miss:0 "Spartans of the Lower Atloyac"
 spartans_of_miss_desc:0 "Travelers in our lands tell us of an ancient realm who valued military prowess above all other mark of status, as we do. We must strive so that in the future, our name is likewise remembered!"
 string_start_chikasaw_choctaw:0 "From the ruins of the Mound builders cities of the lower Atloyac, two powerful tribes have emerged. Tracing their lineage far to the west, the Chickasha (or §YChickasaw§!) and the Chatah (or §YChoctaw§!) both maintain a strong tribal unity, and though they must be wary of one another, face few other threats.\nBut to the south and east, the sea lies, and none of the Chickasaw or Choctaw people know what lies beyond it.\nCould a threat greater than they have ever faced someday come from across the waves?"
 string_start_tag_north_america:0 "The last remnants of the ancient Atloyacan civilization are dwindling, leaving behind remnant-states that will become the §YCreeks§!, §YChickasaw§! and §YChoctaw§!. Meanwhile, the Mexica tribal confederacy has finally united and shall be a force to be reckoned with in the future.\nIn the north, wandering prophets and leaders advocate for unity among the §YIroquois§! and the §YHurons§!, forming powerful confederacy that will shape the course of history. In the lands of Vinland, the nation of §YFrjalslundt§! seeks to establish their rule over Rausulia and establish closer relations with the Mexica."

#Australia 
 australia_nation_title: "Form Ulimaroan Nation"
 COLONIAL_AUSTRALIA_Root_Culture_GetName_Australia: "[Root.GetAdjective] Ulimaroa"
 
 #China to Jongwa
 EUROPEANS_IN_CHINA:0 "European Traders in Jongwa"
 prices.2.t:0 "European Traders in Jongwa"
 prices.2.d:0 "With a sizeable contingent of European Traders in Jongwa, the demand for Jongwan porcelain has skyrocketed. The Jongwan porcelain is demanded by all in Europe, and the Jongwan only accept silver or gold as payment."
 prices.2.a:0 "This will increase the demand for Jongwanwork."
 merchants_of_the_indian_ocean:0 "Merchants of The Indian Ocean"
 merchants_of_the_indian_ocean_desc:0 "Traveling far and wide, our merchants travel to the most exotic places of the world; from the Maghreb in the west to Jongwa in the east - and well beyond! The plentiful riches from trading in spices attract many new able bodies to the merchant craft."
 chinese_region:0 "Jongwa Proper"
 desc_mer_kumbalgarh:0 "This area is controlled by the huge mountaintop fortress of Kumbhalgarh. Its long and thick walls are said to be second only to the one in the faraway lands of Jongwa."
 prices.27.d:0 "After many years of slow declining the Elephant population of South East Asia is now at an all time low. The demand for Elephants and Ivory products in both South East Asia and Jongwa has, however, never faltered and as a result the price of elephants and their ivory is rising."
 prices.35.d:0 "Bureaucrats have long favored paper over parchment and other materials due to how much easier it is to work with. There are also various measures that can be taken to make official papers harder to falsify. The invention of the watermark in Fabriano is one, the elaborate marbling techniques and calligraphy of the Islamic paper producers another.\nAs Empires increasingly come to grow to encompass more than one continent this need for provable authenticity and ease of use has lead to Imperial Bureaucracies from Jongwa to Europe exclusively using paper for official documents and orders."
 empire_of_china_title:0 "Claim The Empire of Jongwa"
 empire_of_china_desc:0 "The Jongwan imperial traditions are tainted by a people who control no part of the realm of Jongwa. As the proud carrier of this legacy our [Root.Monarch.GetTitle] must be proclaimed the new [Root.GetTributaryOverlord] once we have secured the traditional capitals of the Empire."
 empire_of_china_not_in_china:0 "The current Empire of Jongwa owns no provinces in either the region of §YZhongyuan§!, §YYuenan§! or §YYitu§!."
 investment_events.3.d:0 "Making a profit on trade with Jongwa is a conundrum for the [opium_province.TradeCompany.GetName]. Jongwa produces sought-after goods such as tea, siks, and porcelain, but there is little we have to exchange in return besides simple gold and silver. This leaves the Company with a trade deficit.\n\nThere is however one commodity that would surely sell in Jongwan markets; opium. The fields of [opium_province.GetName] are well-suited to the growing of opium poppies, which the Company could manufacture into the drug. While the opium trade is prohibited throughout [canton_owner.GetName], the Company believes it will have little difficulty smuggling it into Canton regardless. Such illicit actions would surely upset [canton_owner.GetAdjective] authorities, but it is difficult to pass up an opportunity for profit."
 investment_events.3.a:0 "Smuggle opium into Jongwa."
 investment_events.3.b:0 "We cannot risk Jongwan ire."
 superiority_chinese_unification:0 "Conquer Jongwa"
 superiority_chinese_unification_desc:0 "War goal is to show our superiority towards other Jongwan states."
 CHINESE_UNIFICATION_WAR_NAME:0 "$ORDER$$FIRST$-$SECOND$ war over Jongwan Hegemony"
 estate_eunuchs_bookkeepers_privilege_desc:0 "Bookkeeping is an honorable responsibility, in the court of the Emperor of Jongwa. The duty to keep our books in order is one that brings forth a great deal of influence and demands meritocratic procedures."
 estate_eunuchs_desc:0 "The Eunuchs are a powerful Estate within the Empire of Jongwa. At times their influence is curbed by powerful heads of state who rein them in with an iron fist. However, should the reigning monarch be deemed weak or incapable, they are quick to turn even the Emperor himself into an elaborate puppet."
 estate_eunuchs_improve_imperial_mandate_agenda_desc:0 "Times of trouble are ahead, should we fail to justify our seat as the masters of Jongwa..."
 estate_eunuchs_subsidize_subjects_agenda_desc:0 "Our subjects who kowtow to us have no access to the wealth of Jongwa. Despite that, we could be kind and merciful by granting them a small taste of fruits associated with bowing to our Emperor."
 reform_the_administration_of_china_decision_desc:0 "For far too long have the Eunuchs usurped power for themselves. Jongwa and the Imperial throne belong to the Emperor. We must therefore cut down their privileges and curb their power in order to save ourselves from certain disaster."
 chi_strongest_warlord_tt:0 "Has the highest §YDevelopment§! and largest §YArmy§! in the Jongwan subcontinent"
 promote_sojunghwa_decision_desc:0 "The Jongwan Empire has fallen to petty barbarians! The very concept of the Mandate of Heaven has been corrupted as hordes of savages conquer the Jongwan heartland.\nIt is up to [Root.GetUsableName] to take the mantle of a proper Jongwan realm."
 chinese_iron_key:0 "Jongwan Iron"
 desc_sojunghwa:0 "Sojunghwa ("Little Jongwa") is the core ideology of our state. The Celestial Empire of the past has fallen to barbarians, and it is now up to us to carry out its legacy."
 obj_asian_trade_desc:0 "Gain the trade bonus from either Silk, Spices or Jongwanwork."
 obj_emperor_of_china:0 "Emperor of Jongwa"
 obj_emperor_of_china_desc:0 "Be the emperor of Jongwa, with a mandate over 50."
 cb_chinese_unification:0 "Unify Jongwa"
 cb_chinese_unification_desc:2 "Unify lands of the Jongwan Subcontinent.\n§YEvery occupied province in the Jongwa Subcontinent gains our territorial core while we are the warleader!§!"
 tariffs_on_chinaware:0 "Tariffs on Jongwanwork"
 desc_tariffs_on_chinaware:0 "Our motherland has tightened their grip on our economy by introducing a special tariff on Jongwanwork."
 china_events.31.d:0 "[From.From.GetName] has fallen and the [Root.Monarch.Dynasty.GetName] dynasty is now believed to be the new holders of the Mandate of Heaven. We are expected to pick up the mantle of the Emperor and bring the Jongwan people into a new era of prosperity and stability.\nIf we want to win over the remaining supporters of [From.From.GetName] rule we must start to build our own Imperial bureaucracy and invest in a strong and durable state. On the other hand [Root.Monarch.GetName] worries that disloyal officials will remain within any organization we inherit from [Root.Monarch.GetHerHis] predecessors."
 china_events.55.t:0 "The Riches of Jongwa"
 china_events.55.d:0 "The Emperor of Jongwa is weak and has little support. From north to south, the ordinary Jongwan are questioning his rule and the normally so loyal bureaucrats are debating whether [empire_of_china.Monarch.GetName] has in fact lost the Mandate of Heaven.\nRogue [chinese_border_province.Culture.GetName] officials claiming to represent [chinese_border_province.GetName] have approached [Root.Monarch.GetName] imploring us to free them from the oppression of [empire_of_china.GetName] and end the rule of the [empire_of_china.Monarch.Dynasty.GetName] dynasty."
 china_events.55.d.not_emperor:0 "The [empire_of_china.GetAdjective] [empire_of_china.Monarch.GetTitle] [empire_of_china.Monarch.GetName], the former Emperor of Jongwa, is weak and has little support in the territories he still controls. From north to south, the ordinary Jongwan are questioning his rule and the normally so loyal bureaucrats are openly proclaiming that [empire_of_china.Monarch.GetName] has lost the Mandate of Heaven.\nRogue [chinese_border_province.Culture.GetName] officials claiming to represent [chinese_border_province.GetName] have approached [Root.Monarch.GetName], imploring us to free them from the oppression of [empire_of_china.GetName] and end the rule of the [empire_of_china.Monarch.Dynasty.GetName] dynasty."
 china_events.55.d.not_emperor_but_I_am:0 "The [empire_of_china.GetAdjective] [empire_of_china.Monarch.GetTitle] [empire_of_china.Monarch.GetName], the former Emperor of Jongwa, is weak and has little support in the territories he still controls. From north to south, the ordinary Jongwan are questioning his rule and the normally so loyal bureaucrats are openly proclaiming that [empire_of_china.Monarch.GetName] has lost the Mandate of Heaven and that [Root.Monarch.GetTitle] [Root.Monarch.GetName] is their rightful ruler.\nRogue [chinese_border_province.Culture.GetName] officials claiming to represent [chinese_border_province.GetName] have approached [Root.Monarch.GetName], imploring him to take what is his by right and free them from the oppression of [empire_of_china.GetName], finally ending the rule of the [empire_of_china.Monarch.Dynasty.GetName] dynasty."
 EVTNAME9514:0 "Jongwanwork"
 EVTDESC9514:0 "We have received reports from our colonial settlers in $PROVINCENAME$ that the area has perfect conditions for production of high value luxuries like jongwanwork."
 colonial_nation.EVTNAME124:0 "Tariffs on Jongwanwork"
 colonial_nation.EVTDESC124:0 "The jongwanwork production in one of our colonies has come into focus. It seems that it generates quite a lot of money. Perhaps too much without being properly taxed. In the spirit of mercantilism, we should force them to trade their jongwanwork through our ports instead. This will greatly benefit our own merchants and add a lot of income to the crown's coffers."
 colonial_nation.EVTDESC125:0 "Bad news from the Old World! [From.GetName] has tightened their grip on our economy by introducing a new tariff on Jongwanwork."
 colonial_nation.EVTOPTA125:0 "Perhaps we should throw the jongwanwork into the sea instead..."
 colonial_nation.EVTNAME164:0 "Smuggling of Jongwanwork"
 colonial_nation.EVTDESC164:0 "The tariffs on Jongwanwork imposed on us by [Root.ColonialParent.GetName] are cutting deep into the profits of our merchants. They demand that we send a delegation to [Root.ColonialParent.Capital.GetCapitalName] to protest these taxes or they will turn to smuggling."
 colonial_nation.EVTDESC165:0 "Our tariffs on Jongwanwork have caused great upheaval in the colonies. Outraged traders threaten with smuggling to avoid the taxes cutting too deep into their profits. We should demand that [From.Monarch.GetTitle] [From.Monarch.GetName] quickly puts an end to this nonsense."
 smuggling_of_chinaware:0 "Smuggling of Jongwanwork"
 desc_smuggling_of_chinaware:0 "To avoid the loss of income due to high tariffs, jongwanwork merchants have turned to smuggling."
 mechanic_has_unify_china_cb_yes:1 "Has access to the '§YUnify Jongwa§!' casus belli"
 desc_global_trade:0 "Goods have been moved across continents since antiquity. But where this was previously limited to a set number of routes and goods such as the manufactured goods of India and Jongwa finding their way across the Indian Ocean and along the Silk Road, all trade is now increasingly becoming part of a greater world network. With the discovery of the Rausulias, sea routes around Africa and the crossing of the Pacific Ocean, local trade networks are being connected into one world-spanning interconnected web.\n\nSilver mined in the Andes is now being boxed and taken via Europe all the way to Jongwa and India. Iron mined and wrought in Scandinavia is being sold in West Africa by English merchants, and others are making a fortune just distributing cloth and spices within the South East Asian trade sphere. Local Indian merchants are investing in future European trade ventures. It may still be early to speak of a truly Global Economy but surely the first seeds have been sown."
 the_great_wall_of_china:0 "The Great Wall of Jongwa"
 empire_of_china_nomadic_border_events.4.d:0 "The [From.GetAdjective] [From.Monarch.GetTitle] is facing a severe struggle to maintain [From.Monarch.GetHerHis] authority over widespread fears at the threat we pose to [From.GetUsableName]. Our spies among them expect that, very soon, the discontent will erupt into open revolts and a collapse of the [From.Monarch.GetTitle]'s authority... offering us the ideal opportunity to seize the riches of Jongwa for ourselves."
 empire_of_china_nomadic_border_events.4.opt:0 "Jongwa will be ours!"
 celestial_empire_events.1.d:1 "With the fall of [From.Capital.GetCapitalName] the last remnants of the Empire of Jongwa have been crushed. The Mandate of Heaven and the ancient Confucian administration are now clearly seen as defunct concepts and the scholar gentry as a class will have to evolve into something else or perish.\nThough the memory of the Empire will live for some time the [Root.GovernmentName] of [Root.GetName] will forever be remembered as the destroyers of the last [From.Monarch.GetTitle]."
 celestial_empire_events.2.d:0 "By assuming the mantle of Imperial Jongwa we have taken a step into an ancient tradition. [Root.GetName] has inherited a number of institutions, such as the examination system and the concept of a heavenly mandate, that are closely associated with the Jongwan philosophy of Confucianism.\nAs the new Empire of Jongwa it is up to us to which degree we wish to integrate this ideology with our own, but embracing Confucian philosophy would likely both help us rule the vast empire we now claim and strengthen our Mandate in the mind of the public."
 celestial_empire_events.3.t:0 "Sinicization"
 celestial_empire_events.3.d:0 "The [Root.Culture.GetName] people have increasingly come to resent the new Jongwan customs we have been introducing throughout our realm, from the court to the lowliest provincial official. Due to this growing distrust of the alien impositions on our old traditions and norms some even openly question our right to rule."
 desc_resistance_to_cultural_changes:0 "The people in this province resent that we have been dishonoring the traditions of our ancestors in our increasing Sinicization of our realm. This increasing alienation has resulted in an unwillingness to pay taxes and act a lacking support for our realm."
 empire_of_china_in_name:0 "Empire of Jongwa in Name"
 desc_empire_of_china_in_name:0 "While we have successfully secured the title of Emperor over the Jongwan our Empire is one that scarcely includes any Jongwan. If we are to be seen as anything but a foreign emperor we will need to integrate the Jongwan as part of our government."
 less_than_two_chinese_cultures_accepted_tooltip:0 "Accepts less than 2 Cultures in the Jongwan Culture Group."
 atleast_two_chinese_cultures_accepted_tooltip:0 "Has at least 2 Accepted Cultures in the Jongwan Culture Group."
 empire_of_china_in_name.1.t:0 "Emperor of Jongwa in Name"
 empire_of_china_in_name.1.d:0 "While we have achieved general recognition as the new Empire of Jongwa, we have yet to earn the respect of the Jongwan people. Our great reliance on foreign, even uncivilized, people in our armies and administration is putting the Mandate of our dynasty in question.\nUnless we take measures to become a truly Jongwan Empire we will remain an Empire in name only and will appear to have lost the Mandate of Heaven."
 empire_of_china_in_name.2.t:0 "Acceptance of the Jongwan"
 empire_of_china_in_name.2.d:0 "Our efforts to integrate the Jongwan in the state that rules them have born fruit and our claim to the Mandate of Heaven is no longer in question due to lacking ties to the people themselves. Like many of the foreign conquerors Jongwa has seen over the centuries our Empire may never come to be seen as truly Jongwan in origin, but it is truly an Empire of Jongwa."
 meritocracy_events.4.d:0 "The Examination System has served the Emperors of Jongwa well for centuries, in theory it allows us to ensure that only those of the best ability will be selected to act as the officials of the [Root.Monarch.GetTitle].\nLately, however, it is widely accepted that the general level of the essays of the examinees has been decreasing. Even the work of this year's optimus is much worse than the failures of some years according to the master examiners."
 empire_of_china_nomadic_border_events.2.db:0 "The Empire of Jongwa is lost. The general ruin of our once mighty nation has made any concerns our people once had about the nomadic border a distant memory."
 CELESTIAL_DECISION_NOT_EMPEROR:0 "Must be the §YEmperor of Jongwa§! to enact Celestial Reforms."
 CURRENT_CELESTIAL_EMPEROR:0 "$RULERNAME|Y$ is the current Emperor of Jongwa."
 CELESTIAL_EMPIRE_NO_EMPEROR:0 "The Empire of Jongwa is currently in an interregnum."
 IMPERIAL_MANDATE_DESC:0 "The Mandate value represents the authority of the current Emperor. Mandate can be used to enact centralisation decisions within the Empire of Jongwa."
 CELESTIAL_EMPEROR_BENEFIT:0 "Being the §YEmperor of Jongwa§! gives the following benefits:\n"
 CELESTIAL_EMPEROR_BENEFIT_DESC:0 " -Bonuses from High Mandate.\n -Uses Meritocracy Mechanics\n -Can enact Centralisation Decisions.\n -Permanent claims to Jongwa.\n -Casus Belli to Unite Jongwa.\n -Can Enforce Tributary on Neighbours"
 CELESTIAL_EMPEROR_DIPLOMATIC_ACTIONS_DESC:0 "The §YEmperor of Jongwa§! may take the following additional diplomatic actions:\n$LIST|Y$"
 vassalize_tributaries_decision_tt:0 "The Emperor of Jongwa can use the Mandate to elevate a Tributary State to a direct Vassal."
 vassalize_tributaries_decision_ct:0 "The Emperor of Jongwa can no longer elevate Tributaries to Vassals."
 own_port_province_in_far_east_tooltip:0 "Own a port province in India, Jongwa, Y or the East Indies."
 IS_CELESTIAL_EMPEROR:0 "Is the Emperor of Jongwa"
 ISNT_CELESTIAL_EMPEROR:0 "Is NOT the Emperor of Jongwa"
 bg_celestial_emperor:0 "In the year $YEAR$ $MONARCHTITLE$ $MONARCHNAME$ became the Emperor of Jongwa"
 CELESTIAL_CELESTIAL:1 "Empire of Jongwa"
 CELESTIAL_EMPEROR:0 "$EMPERORNAME|Y$ is the Emperor of Jongwa"
 CELESTIAL_EMPIRE:0 "Empire of Jongwa"
 paperDESC:0 "Paper is a necessity for all types of advanced accounting, administration and diffusion of knowledge and the process of its production was originally devised in Jongwa and then slowly made its way to all corners of the Old World. Far superior to other types of writing materials such as parchment the large scale production of paper requires a specialized set of skills and equipment, making it a rare and sought after commodity."
 silkDESC:0 "The finest of all fabrics of the east was the silk produced in India, Jongwa and East Asia. While less iconic than spices the profits from silk and finely woven cotton cloth would in fact soon dwarf those of the spice trade for the European East India Companies.\nDue to increasing demand attempts were also made to produce the material locally in Mercantilist Europe, with very varied degrees of success."
 teaDESC:0 "Tea was an important luxury drink in Jongwa, India, and South-East Asia. It was often used in religious or social rituals. The English popularized tea in Europe. Never considered as noble a drink as coffee it still produced large profit merely from the fact that the world supply was low."
 spicesDESC:0 "Spices were known in Europe since ancient times, mostly for their medicinal value, and for their ability to improve the taste of food. Pepper, ginger, nutmeg, chili, cinnamon, etc. came partly from East Africa but mostly from India, Jongwa, and the Spice Islands (current Indonesia), to be traded in Alexandria or the other terminals of the great caravan roads. The European desire for cheaper and more direct supply constituted the main motivation for the very first eastbound sea voyages of discoveries for Portugal."
 chinaware:0 "Jongwanwork"
 chinawareDESC:0 "Jongwanwork' represents various exotic goods such as jongwanvase and carpets. Generally from the Orient, these high value luxuries command a high price on the market."
 growing_chinaware_trade:0 "Jongwanwork Trade"
 desc_growing_chinaware_trade:1 "Our efforts to secure more sources of jongwanwork have not gone unnoticed by the domestic merchants. Confident that the state is looking after their interests, they have been unusually forthcoming with any taxes or fees they are required to pay."
 chinese:0 "Oriental"
 chinese_desc:0 "With the Oriental technology group, technology levels are 60% more expensive (160%)."
