#MISSION
 eran_north_way_title:0 "The Mountain Trail"
 eran_north_way_desc:0 "It will be difficult to stop the muslim advance into our rightful land, but we can always use the help of the few surviving faithful to aid us in controlling the newly liberated land."

 eran_push_west_title:0 "Reclaiming the Palace"
 eran_push_west_desc:0 "The great palace of the Bolgarian Shahanshah is a decadent vestige of an old regime that we must topple but it is too grand of a ruin to simply remove it. We shall restore what is left into a proper palace worthy of a Zoroastrian Empire."

 eran_one_falls_title:0 "Douse the Enemy"
 eran_one_falls_desc:0 "When the unloyal dogs of the Bolgars tried to break Parneshar's walls, we took our oppurtunity to strike their exposed back. Now we have to push our efforts farther than ever before if we wish to save our faith."

 eran_the_other_follow_title:0 "Fiery Invention"
 eran_the_other_follow_desc:0 "The people of Guo Hong waged war with fire carelessly but the Bolghars managed to avoid His wrath long enough to learn his ways. Now we must appropiate the true power of this invention to break the inbalance of strenght between us and the unfaithful."

 eran_the_persian_return_title:0 "The Throne of the Shah"
 eran_the_persian_return_desc:0 "A true Shahanshah finally sits in control of the heartland of the oldest empire, with the proper faith and the proper goal of restoring the might of Iran."

 eran_south_way_title:0 "The Sea Route"
 eran_south_way_desc:0 "The southern Farsi have made themselves both our greatest enemy and our only true ally, we shall have to decide it once and for all which way it goes."

 eran_more_stuff_title:0 "Break the Old Masters"
 eran_more_stuff_desc:0 "The Bolghars existence still haunts our future prospects. They shall be made irrelevant or made dissappear."

 eran_zoroaster_temples_title:0 "Rebuild Anew"
 eran_zoroaster_temples_desc:0 "While we focus on the external threats to our faith, we must remember that its weakness was always internal. A sturdy foundation shall be built in our capital to ensure at least a safe haven for the lost and found."

 eran_fires_up_title:0 "Ignite the Fuses"
 eran_fires_up_desc:0 "The army cannot be neglected, our humble soldiers must be motivated and armed with the best firearms we can construct."

 eran_fired_up_title:0 "The Fire Rises"
 eran_fired_up_desc:0 "Our soldiers will not be feared for their bravery or their abilities, but from how they can still hear the enemy among our cannons."

 eran_two_falls_title:0 "Light the Way"
 eran_two_falls_desc:0 "The Manicheans find themselves under the pressure of the muslims but we must not forget that they are also our enemy. The enemy of our enemy might also be our enemy."

 eran_the_other_falls_title:0 "The Manichean Deviation"
 eran_the_other_falls_desc:0 "The eastern Manicheans have made themselves an Empire but they are too fractured to pose a real threat. We must strike in this times of uncohesion among our enemies."

 eran_push_east_title:0 "Rebalanced Opposition"
 eran_push_east_desc:0 "Our enemies cannot fathom the security of our souls and the pursuit of our goals has never been clearer in our soldiers minds."
