###GOVEMRENMS

 goyman_nobility_reform:0 "Faithful Dynasties"
 goyman_nobility_reform_desc:0 "Following the restoration of the Empire, we do not forget our roots and our nobility still carries the strenght of the wisdow and soul that made it all possible."
 farsi_trade_nobility_reform:0 "Trader Noble Rights "
 farsi_trade_nobility_reform_desc:0 "A Noble merchant class control the main imports and exports of the state, both on sea and on land."

###FORMABLE

 war_of_the_fires_parsi_title:0 "Help Our Faithful Kin"
 war_of_the_fires_parsi_desc:0 "The people of Eran are facing disaster and we are the only help they could get."
 
 war_of_the_fires_bolgaria_title:0 "Help Our Faithful Kin"
 war_of_the_fires_bolgaria_desc:0 "The people of Goyman are facing disaster and we are the only help they could get."


###MISSIOSN

 pers_land_of_iran_title:0 "Land of Silk"
 pers_land_of_iran_desc:0 "Despite the Bolghar's decadent empire, silk and cloth production never stopped but the quality lessened over time. The collapse and the changing of the Silk Road's routes did break the power of our tailors, but we have finally restored the production. With the proper state funding we can increase the quality and ensure our treasury never runs dry."

 pers_mesopotamian_expansion_title:0 "Mani's Eastern Throne"
 pers_mesopotamian_expansion_desc:0 "The seat of the most powerful Elect is situated in Babylon and the situation between the two rivers is just a smaller but not less confusing mess that we had to deal with in our homeland. We shall secure the region as older empires did before us."

 pers_break_the_old_enemy_title:0 "The Old Enemy"
 pers_break_the_old_enemy_desc:0 "Rome, or whatever they want to be called, stand once again at our gates. Our wars lead to more wars, but this time we shall make sure that our victories lead to more victories."

 pers_enter_into_europe_title:0 "The Gate of Europa"
 pers_enter_into_europe_desc:0 "Europe is open to us. The Rhoman Empire crumbles upon our armies and now we found ourselves against several more Romes. We have become quite fond of breaking them."

 pers_caucasia_region_title:0 "The Ancient Buffer"
 pers_caucasia_region_desc:0 "Between the old Rome and our predecessors, the people of the Caucasus were and are still more likely to be more of a buffer state. They will no longer enjoy that position as we will need them to aid us for once."

 pers_expand_into_babylon_title:0 "Reunite the Rivers"
 pers_expand_into_babylon_desc:0 "The area known as Mesopotamia is ours, the people do not however. Our cultural superiority has not yet reached their ears and hearts, but it will do in time."

 pers_restoration_celebration_title:0 "Celebrate the Restoration"
 pers_restoration_celebration_desc:0 "Time for celebration is upon us! There will be a lull in the fighting and our enemies will believe themselves safe but we will enjoy this moment of feast, knowing that we cannot longer lose. A mighty Empire rises once again from the center of ancient civilization."

 pers_elite_regiments_title:0 "A Permanent Sepah"
 pers_elite_regiments_desc:0 "The collapse left many soldiers to settle for the nearest warlord, regular lord or highest paying lord. We are now the rightful lord of all Iranians and we must create a proper professional army if we can ever compete with the rest of the world."

 pers_more_elite_powers_title:0 "The Immortal Army"
 pers_more_elite_powers_desc:0 "Soldiers die, Tactics break, Morale falls, but the War must be won! Our armies will never be found wanting on the battlefield and if they do, our enemy will never know."

 pers_central_asia_region_title:0 "The Northern Road"
 pers_central_asia_region_desc:0 "Guo Hong, the great conqueror, spared our lands due to his alliance with the Bolghars, but his impact was felt nonetheless when he forced all merchants from the East to move through his land in the north. We shall restore the proper way of mercantile trade between East and West."

 pers_expand_into_arabia_title:0 "Our Gulf"
 pers_expand_into_arabia_desc:0 "The Arabs believe that their God will save them, but our goals are to regain what is rightfully ours."

 pers_land_of_khorasna_title:0 "Land of Mountains"
 pers_land_of_khorasna_desc:0 "This land has always supported an Empire in one way or another, but time changes our enemies, our friends and the number of people that need to eat. If we were to restore, expand and repurpose the old road networks and irrigations systems, we will be able to compete with any other state in so called better climates."

 pers_indian_expansion_title:0 "Mani'sWestern Throne"
 pers_indian_expansion_desc:0 "The Empire of Light has stagnated, a sleeping tiger best left alone, but it appears to be waking in recent times. We shall make sure that the Tiger wakes with a few less claws."

 pers_a_bigger_men_title:0 "The Middle Moves"
 pers_a_bigger_men_desc:0 "Once trade flowed from India to Rome, increasing our coffers when needed, but now we own a good chunk of this precious land. We have become the maker and breaker of trade in Asia, only one last competitor left."

 pers_a_biggest_men_title:0 "Hegemon of Asia"
 pers_a_biggest_men_desc:0 "An higher peak could not be reached by any other country, we have made history and the pretenders can only wish to be us."

