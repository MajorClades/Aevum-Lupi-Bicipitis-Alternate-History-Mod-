l_english:

#####EVENTS

 ayabani.23.t:0 "An Empire Beyond our Wildest Dreams"
 ayabani.23.d:0 "When King Malro first began purchasing land in Wae from Yamatai-ko centuries ago, a Tamnan Empire was inconceivable. When Tamnan and Korean Armies began beating back Japanese armies and establishing a foothold in Nihon, a Tamnan Empire was nothing more than an aspiration. When King Bongre died without an heir in 1411 and Tamna shattered, a Tamnan Empire was deemed impossible. We have proven ourselves, and our many doubters, wrong. Our empire streches from northern Nihon to the wild west of Mongolia, from the frigid wastes beyond the Amur to the paradise of southern Jongwa. We are not just a Great Tamnan Empire, we are the greatest empire to ever exist. Not by the amount of land we have conquered, but by just how unlikely it was for us to conquer it. Many are content to rest on our laurels and usher in a new era of peace.\n\nNot everyone though.\n\nRecently translated documents from ancient times have seemingly revealed a Korean Empire that streched all the way to Persia and Europe known as Hwan-guk. The [Root.Monarch.GetTitle]'s closest advisors have advised caution in giving these so-called scholars legitimacy, stating that the Hwan were nothing more than a myth, but dreams of glory are not so easily forgotten."
 ayabani.23a:0 "Obviously Hwan-guk never existed. And besides, we are Tamnans, not Koreans."
 ayabani.23b:0 "Real or not, we will revive the legacy of Hwan-guk!"

 ayabani.12.t:0 "The Resettlement Commission"
 ayabani.12.d:0 "With the liberation of Korea complete, the [Root.Monarch.GetTitle] has decided to sponsor the creation of a government agency dedicated to restoring the Korean penninsula to its rightful owners: the Koreans. The Mongol tribes will be driven north and out of our lands forever, their territories being turned over to Tamnan and exiled Korean families to restore the land."
 ayabani.12a:0 "It will be like Goryeo never fell."

 ayabani.13.t:0 "The Matter of Amishi"
 ayabani.13.d:0 "To the south of the island of the island of Wae lies a small kingdom. The Amishi Kingdom. They once paid tributed to the Tamna Kings of old, but the fall of the Old Kingdom has given them delusions of independence. Now that we have reunitied and vanquished our oldest enemy, it is time we correct this. The Amishi are isolated, and nobody will come to their aid. The advisors to the [Root.Monarch.GetTitle] have already prepared a strongly worded letter to the Amishi imploring them to become our subjects once again."
 ayabani.13a:0 "Send the letter."

 ayabani.14.t:0 "A Letter"
 ayabani.14.d:0 "[Root.Monarch.GetTitle] [Root.Monarch.GetName] sat upon [Root.Monarch.GetHerHis] throne, staring off into the distance. Life in Amishi was peaceful, if a little uneventful. Ever since the Tamnan Kingdom fell because they couldn't decide what inbred noble to make their new king they had been enjoying the fruits of independence: trade with the Japanese, with Jongwan merchants, and even with enterprising Tamnan merchants who bothered to remember they existed. But lately, that trade had dried up. Tamnan merchants stopped arriving years ago, and recently not a single Japanese ship has reached their shores. It was a strange turn of events to be sure. Before [Root.Monarch.GetSheHe] could ruminate on this any further, however, [Root.Monarch.GetSheHe] was handed a letter. At first [Root.Monarch.GetSheHe] assumed it was from a friend. Perhaps someone seeking to open up a new trade route like the enterprising Wun merchant from last week. But it wasn't a letter.\n\nIt was a threat.\n\nIt seemed the Tamnans had not only reunited, not only conquered the Japanese, but worst of all they had remembered Amishi existed. And they weren't happy about that."
 ayabani.14a:0 "We don't have a choice. To spare my people I must submit."
 ayabani.14b:0 "We may die, but I will never bow before false kings."

 ayabani.15.t:0 "Amishi Folds"
 ayabani.15.d:0 "We have received a response to the letter we sent to the Amishi. They have humbly accepted our request that they be returned to the fold. The Amishi Royal Family is on its way to $CAPITAL$ now to pay tribute and formalize the integration of their kingdom into ours."
 ayabani.15a:0 "As expected."

 ayabani.16.t:0 "Amishi Resists"
 ayabani.16.d:0 "We have received a response to the letter we sent to the Amishi. It seems in their decades of independence they have grown something akin to a spine, as the have refused our demands outright, referring to us as false kings and declaring that they will never again be subjugated by the likes of us."
 ayabani.16a:0 "We'll see about that."

 ayabani.17.t:0 "Entry Number 17"
 ayabani.17.d:0 "DARK DARKER YET DARKER\n\nTHE DARKNESS KEEPS GROWING\n\nTHE SHADOWS CUTTING DEEPER\n\nPHOTON READINGS NEGATIVE\n\nTHIS NEXT EXPERIMENT SEEMS\n\nVERY\n\nVERY\n\nINTERESTING\n\n...\n\nWHAT DO YOU TWO THINK"
 ayabani.17a:0 ""

 ayabani.18.t:0 "The Sun or the Bear"
 ayabani.18.d:0 "The entirety of Nihon has fallen under our control. This has presented a unique opportunity not seen in any other period of Tamnan history. Constant daily interactions with other religions. But unlike dogmatic followers of Shinto or Kamuryamat, our faith is truly pluralist; We do not strictly cling to one set of deities. How one worships the Gods and ancestors is entirely up to them. Not every person worships every God, and some may go unworshipped for centuries. Such was the case with Dangun, who was mostly localized to Korea itself, before King Bokryeong made public that his family would pray to him in 1107. This began the long standing tradition of the Tamnan Royal Family being able to integrate other deities into the faith by simply publically extolling their virtue. We have a chance to do the same with the faiths now within our borders, and two Gods have presented themselves: Amaterasu, Goddess of the Sun and Ancestor of the Japanese Royal Family, and Kotan-kar-kamuy, oft forgotten creator God of the Ainu."
 ayabani.18a:0 "We will integrate Amaterasu"
 ayabani.18b:0 "We will integrate Kotan-kar-kamuy"

 ayabani.19.t:0 "Choosing a Throne"
 ayabani.19.d:0 "Jongwa is a very large place. One would expect such a place to have a great many religions populating it. This is not the case. For centuries the dominant ideology in Jongwa were those ideas first espoused by the Great Confucius centuries ago. Much of Jongwa still follows them to this very day, as do every ruler who wishes to establish themselves in the region. His influence is so great there are many within the court calling for his deification. While that may occur at the local level, it is not something the Royal Family is interested in. Instead, two opportunities have presented themselves: the Jade Emperor, purported founder of Jongwan civilization, and the Prophet Mani followed by those in southern Jongwa."
 ayabani.19a:0 "We will integrate Jade Emperor"
 ayabani.19b:0 "We will integrate the Prophet Mani"

 ayabani.20.t:0 "Choosing a Saviour"
 ayabani.20.d:0 "The Mongolian plateau is home to many faiths. Chief among them is Tengrism. The shamanistic faith of the Mongols and countless other steppe tribes. A faith so easy to integrate it barely desevres mention. But Tengri is not the only God in the sky. In southern in western Mongolia there are two other faiths popular with the more civilized inhabitants of the region. The faiths of Buddhism and Christianity. Each claims to provide the way to enlightenment and salvation for the practitioner. While the faith itself is incompatible with the way of our ancestors, we can acknowledge the positive aspects of both. Chief among them being their central figures: the Buddha, and Jesus Christ."
 ayabani.20a:0 "We will integrate Buddha"
 ayabani.20b:0 "We will integrate Jesus"

 ayabani.21.t:0 "A War of Revenge"
 ayabani.21.d:0 "In 1253, the Grand Army of Tamna and the Army of Goryeo were laying siege to Kyoto. It was what should of been the penultimate moment of Tamnan glory. Our age old enemy, the vile Kingdom of Yamatai-ko, was doomed. It was a matter of months before Kyoto would fall and all of Nihon would lie open before us. Destiny saw fit to spit in our eye, however. Dayan Jalayirid, freshly exiled from the Empire of 10,000 Armies following his father's failed revolt a year prior, marched his barbarian hordes past the Changbai mountains into Goryeo. When the King of Goryeo mustered an army to drive out the invaders, he was slain. His kingdom dissolved in a matter of days. And our allies in the siege of Kyoto were no more. Without warning the Japanese sallied from the city and defeated our armies, humiliating us and forcing us to sign the treaty of Settsu. Now, with the south reclaimed, we may right the wrong that saw us relegated to a minor power. We will drive the barbarians from Kaesong, ending centuries of humiliation and liberating the capital of Goryeo from their tyranny."
 ayabani.21a:0 "For the memory Goryeo, for the honor our ancestors, and for the glory of Tamna!"

 ayabani.22.t:0 "Reorganising Mongolia"
 ayabani.22.d:0 "All of Mongolia now belongs to our great Empire. The petty squabbling of the barbarian tribes has been brought to a permanent end and, recognising our overwhelming strength, they now look to us for guidance. We now face a dilemma: there are far too many tribes in the region to manage effectively. We are now faced with a choice on which of the Mongolian tribes we wish to elevate to civilisation. The other tribes will be forcibly integrated and, if they refuse, destroyed."
 ayabani.22a:0 "Elevate the Khalkha, they've suffered enough."
 ayabani.22b:0 "The Evenk should be easy to control, they shall be elevated."
 ayabani.22c:0 "Oh, that's right, the Chile exist. Elevate them, why not."
 ayabani.22d:0 "None of these tribes hold a candle to the Yenisei. They will be our chosen."

 ayabani.1.t:0 "Fusing the Army and the Navy"
 ayabani.1.d:0 "With the War of Reunification drawing ever closer, an interesting proposal has reached the ears of the [Root.Monarch.GetTitle]. The Army and Navy have long worked in tandem with one another, even during the days of the old Kingdom. As such, tt has been suggested that in order to better coordinate our forces in the coming war, the [Root.Monarch.GetTitle] should be appointed Supreme Commander of the Army as well as Supreme Commander of the Navy. This would effectively merge both branches of the military under one leader. This is a risky plan. If the [Root.Monarch.GetTitle] is not up to the task of commanding the military this could prove to be a disaster. How shall we proceed?"
 ayabani.1a:0 "Make it so."
 ayabani.1b:0 "That could cause too many issues."

 ayabani.2.t:0 "The Fate of the Three Armies"
 ayabani.2.d:0 "The Grand Army of Tamna is nothing more than a relic of the old kingdom. It was first established in the wake of our victory against Yamatai-ko centuries ago, when a foothold was first established in Nihon proper. When we restored it in preparation for the coming war, it was not the first time we had done so. And we were not the only ones to do it. With the reintegration of the rival kingdoms into one realm, we are now forced to confront the fact that we now have three Grand Armies of Tamna under our control.The prevailing opinion among the nobles of the court is that the best course of action would be to simply disband the excess armies and ensure ours remains the only one. They argue that the Grand Army of Tamna served the Tamna Kings with distinction for centuries, and it would continue to do so unto eternity.\n\nReformers in the court, however, have argued against this. They argue that it was the inaction of the Grand Army following the death of King Yeong that allowed the succession crisis to grow to such a point that rival kings were able to declare their own states; That the original Grand Army was rife with issues: corruption, nepotism, and leaders playing favorite for one particular family or another. They suggest we disband the Grand Army altogether and seek a new way forward. It falls to the [Root.Monarch.GetTitle] to break this stalemate."
 ayabani.2a:0 "The Grand Army worked for our ancestors. It will work for us."
 ayabani.2b:0 "We cannot let nostalgia blind us. Disband the Grand Army."

 ayabani.3.t:0 "A Fiery Coronation"
 ayabani.3.d:0 "The Grand Army of Tamna had assembled before the [Root.Monarch.GetTitle]. They stood just outside the Imperial Palace of Kyoto, dressed in full military gear, a torch in one hand and a sword in the other. Today was meant an important day in the history of Tamna, as it was the coronation of the [Root.Monarch.GetTitle] of Tamna as the new [Root.Monarch.GetTitle] of Yamatai-ko. The Royal Family, whose unbroken line of succession had been such a source of pride for the Yamatai in the past, were either dead or in hiding; in other words, irrelevant. All of their holdings in Nihon had fallen to the Tamna, and the treaty that had humiliated Tamna for so long was worth less than the dirt they stood on.\n\nKyoto had long stood as symbol of Yamatai-ko. Their ancient capital, the place where Tamna was defeated. Now, it would serve as a grim reminder of how fickle a mistress fate can be. But this cause for celebration was interrupted by an attempt on the life of the [Root.Monarch.GetTitle]. This insult demanded retribution, and Kyoto would have to do.\n\nA Yamato Prince who failed to evacuate the city with his family was dragged out of the palace, weakly struggling against the soldiers dragging him by his arms. He was dropped at the feet of the [Root.Monarch.GetTitle], who held the torch out to him. He would set the first flame."
 ayabani.3a:0 "Centuries of humiliation finally undone."

 ayabani.4.t:0 "Samgugtong-il"
 ayabani.4.d:0 "30 years ago, King Yeong Go died childless, and the Tamna Kingdom shattered. We have existed in a state of undeclared civil war ever since. But that ends now. Our army stands unparalleled. Our navy is prepared to face any challenge. The best and the brightest have rallied to our cause. There are no more plans left to finalize, and no more questions left to answer. The Three Kingdoms will be unified, no matter the cost. We will claim what is rightfully ours!"
 ayabani.4a:0 "Or we will die trying."

 ayabani.5.t:0 "Our Enemies Make for War"
 ayabani.5.d:0 "30 years ago, King Yeong Go died childless, and the Tamna Kingdom shattered. We have existed in a state of undeclared civil war ever since. But it seems that will soon come to an end. Our rivals have already made moves to restart the succession crisis. While we had hopes of doing so ourselves, we don't have many options left. We can either fight or denigrate ourselves to try and postpone it until we're ready. How shall we proceed?"
 ayabani.5a:0 "We have no choice. To arms!"
 ayabani.5b:0 "We aren't ready yet. Do whatever it takes to delay this."

 ayabani.6.t:0 "The Royal Madness"
 ayabani.6.d:0 "Several days ago, a travelling Mudang visited the Royal Court. She claimed to have a message for The [Root.Monarch.GetTitle] from [Root.Monarch.GetHerHis] ancestors. The [Root.Monarch.GetTitle] decided to entertain this visit and met with her in private, but hasn't been the same since. [Root.Monarch.GetSheHe] has begun compulsively destroying every mirror within sight, claiming that the Mudang had done something that ruined [Root.Monarch.GetHerHis] face. Nobody else in the court has noticed anything wrong with [Root.Monarch.GetHerHis] face and this point has been made several times, but the destruction of any reflective surface has continued nonetheless."
 ayabani.6a:0 "Okay Your Majesty, we'll get rid of all the mirrors for you..."

 ayabani.7.t:0 "The Traveler in White"
 ayabani.7.d:0 "Early this morning a man arrived outside the palace. He wore all white robes and sported a snappy white beard. When asked for his name he simply referred to himself as a traveler and asked for an audience with the [Root.Monarch.GetTitle], which was reluctantly granted. The Traveler explained that he was a wandering mystic, who had travelled across the land spreading his good word to society after society. He was a practitioner of what he referred to as The Cult of Light. An ethos that sought to promote devotion, bravery, and sacrifice for the greater good. According to him, he had spent time at the courts of the Yan, the Ming, the Yamatai, and even the Old Kingdom of Tamna. And he was offering to teach us his ways as well. While there was no way of verifying anything the man said, some within the court seemed to be persuaded by his words. He said he would return in a few weeks to hear our response."
 ayabani.7a:0 "What an odd man"

 ayabani.8.t:0 "The Seer in Black"
 ayabani.8.d:0 "It has been a week since the Traveler in White left, and the entire time the court has been endlessly debating the merit of his words. Devotion, Bravery, and Sacrifice can be very helpful for a Kingdom seeking to expand, such as ours is. However, before any further discussion could take place a young man waltzed into the throne room. A pale man, he was dresse all in black. He bowed before the [Root.Monarch.GetTitle] and introduced himself simply as a Seer. He claimed to be a former apprentice of the Traveler in White, whom he had heard had recently visited our court. He claimed that what the Traveler preached was nothing but self serving lies. That he had done nothing but bring ruin to the societies he had visited. When one courtier tried to bring up that of the courts the Traveler visited only Tamna fell, the Seer kicked him in the shin and the had to be restrained before he could cause further harm. The Seer left quickly after that, warning us of grave consequences should we take the Traveler's offer."
 ayabani.8a:0 "...I'll be sure to keep that in mind."

 ayabani.9.t:0 "The Confrontation"
 ayabani.9.d:0 "The Throne Room was abuzz. The Traveler in White had returned. He bowed before the [Root.Monarch.GetTitle], saying it was a pleasure to be back and asking if his advice had been heeded. Without warning, the Seer barged into the Throne Room, shoving past the guards. He asked if the [Root.Monarch.GetTitle] was seriously considering taking the advice of a fraud whose words would bring nothing but ruin to the land. The Traveler simply smiled at the Seer and said it was good to see him again. The Seer didn't seem to share the sentiment, and if looks could kill the Traveler would have disintegrated on the spot. The room went quiet, everyone inside stopping to watch the two men stare each other down. Out of nowhere the Seer drew a dagger from inside his Hanbok. The [Root.Monarch.GetTitle] stood up just as quickly, held out [Root.Monarch.GetHerHis] hand, and spoke."
 ayabani.9a:0 "This Traveler is a guest. Guards, please escort the Seer away."
 ayabani.9b:0 "I will not let my realm fall to chaos. Guards, escort the Traveler away."

 ayabani.10.t:0 "The Ascension of the Traveler"
 ayabani.10.d:0 "A couple of days after being taken from the court, the Seer vanished. Local fishermen claimed to have seen his body floating in a shipwreck of the coast of Wae, but nothing concrete was found. The Traveler, on the other hand, was quick to integrate himself into the Tamnan court. The [Root.Monarch.GetTitle] spent hours discussing all manner of things with him, and soon his teachings began to spread across the capital. But unfortunately, the Traveler seemingly had a higher calling. Without warning he vanished himself, his quarters still furnished from the day before. Having ascended to Godhood, he was quickly integrated into the Royal Pantheon, and the day of his ascension was declared a holy day."
 ayabani.10a:0 "Together in the Light"

 ayabani.11.t:0 "The Cult of the Seer"
 ayabani.11.d:0 "The Traveler in White was dead. Only a few days after having him removed from the court, the Seer left for a day trip and returned with the Traveler's head. After that, he had his way with the court. He spent hours with the [Root.Monarch.GetTitle] and the Royal family, teaching them of his strange philosophy. While the Royal family was hesitant to accept the teachings, the Seer was quickly approached by the military, who were enamored by his words. The Seer's teachings spread like a wildfire across the capital until he had his very own cult following. He began the construction of a pyramid in $CAPITAL$, a place for his students to congregate and spread his word. And just like that, he vanished. His students claimed he had ascended to Godhood and demanded the Royal family integreate him into the national pantheon. Without much of a choice, they obliged."
 ayabani.11a:0 "The Pyramid is quite nice if you give it a chance, I swear!"

 ayabani.24.t:0 "Whispers of Rebellion"
 ayabani.24.d:0 "A few months have passed since our burning of the Imperial City. While we had hoped this act would demoralize the Japanese people into accepting our rule, it seems to have done the opposite. Whispers of discontent spread across our newly conquered land, growing louder by the day. It seems the Japanese will never accept our rule, and that a revolt is coming."
 ayabani.24a:0 "Disperse some of the larger groups, that should slow them down"
 ayabani.24b:0 "We must conserve our strength, let them make the first move"

 ayabani.26.t:0 "The Japanese Revolt"
 ayabani.26.d:0 "The consequences of our actions have come around to haunt us. The fields have been left bare in favor of fortresses as dispossessed former Daimyo, wandering Saumrai, and thousands of peasants have rallied behind Tetsujin Kobashi and revolted. They wish for nothing short of the total expulsion of Tamnan authority over the lands and the restoration of an independent Yamatai. We must do everything in our power to ensure that these radicals remain disorganized and divided, lest they gather popular support and escalate their rebellion."
 ayabani.26a:0 "Tamnayeo, yeong-wonhala!"

 ayabani.27.t:0 "The Revolt Escalates"
 ayabani.27.d:0 "The situation has spiraled out of control. Our inability to keep the rebels weak and disorganized has allowed them to coalesce into a relatively united front of warlords and peasant militia. At this very moment, the rebellion's leaders are gathered in Kyoto in preparation for a declaration of independence. We are faced with two options. We can meet this united rebellion on the field of battle, crushing Yamatai-ko for a second time. Or, we can withdraw. Abandon our holdings to the rebels and regather our strength on Wae, hoping to return once the dust settles."
 ayabani.27a:0 "Freak the fuck out and abandon everything right now. It's fucking over."
 ayabani.27b:0 "We will not have our destiny stolen from us again!"

 ayabani.28.t:0 "The End of the Japanese Revolt"
 ayabani.28.d:0 "With the valiant effort of Tamnan troops, the Great Japanese Revolt has been brought to an end. Tetsujin Kobashi and his conspirators were caught in an ambush Echizen and executed. With their deaths, the rest of the rebels retreated back into their daily lives. We have proven, without a shadow of a doubt, the superiority of Tamna over our most hated enemy."
 ayabani.28.d2:0 "Despite our best efforts, we have failed to contain the Japanese rebels. They have gathered their strength and declared an independent Shogunate, intent on driving us out of Nihon entirely. We must once again defeat our most hated enemy, and prove who the true master of Nihon is."
 ayabani.28a:0 "Crush them once and for all!"
 ayabani.28b:0 "A lesson they won't soon forget"

 ayabani.29.t:0 "Revolt in [japan_rebels_target.GetName]"
 ayabani.29.d:0 "Abuse by local ordinaries in [japan_rebels_target.GetName] has become intolerable. Local peasants have joined with Kobashi's cause and are demanding autonomy, lest the rise in revolt against our rule."
 ayabani.29a:0 "Crush them once and for all!"
 ayabani.29b:0 "Though it pains us, we must give them autonomy"

 ayabani.30.t:0 "The Old Kingdom of Tamna"
 ayabani.30.d:0 "According to Legend, Tamna was first founded when the gods Yang Eulna, Go Eulna, and Bu Eulna emerged from three holes in the ground south of Mt. Hallasan. The three would take wives they found washed up in a box, and Go Eulna would become the first King. Tamna remained an independent kingdom until 476, when they became a tributary of Baekje. They became a tributary of Silla after that, and were independent once more when Silla fell. Allying themselves with Goryeo in 938, Tamna's first expansion came with the purchase of treaty ports in southern Nihon beginning in 940. Yamatai-ko soured on the ports in 950, though, and tried to seize them. With help from Goryeo, Yamatai-ko was defeated, and Tamna seized the entirety of Kyushu for themselves. Over the next couple centuries Tamna and Yamatai-ko would go back and forth in conflict, with Tamna winning more often than not thanks to Goryeo's aid. This continued until the War of Humiliation from 1165 to 1168. Yamatai nearly destroyed Tamna, pushing them to the very edges of Wae.\n\nTamna would recover from this loss and subsequent civil war, and in revenge for the previous war launched a war in 1210 known as the Great Betrayal, which would last for the next 20 years. Though Tamna eventually won, they were economically and militarily crippled, forced to rely more and more on Goryeo and the nobility for military success.\n\nTamna's final official war with Yamatai-ko began in 1263. The war ended when Goryeo was invaded by Mongol tribes during the siege of Kyoto and Yamatai-ko was able to soundly defeat Tamna, forcing them to sign the humiliating treaty of Settsu in 1267. This defeat saw Tamna once again collapse into a 40 year civil war, which lasted until the coronation of King Go Geon as king. Tamnam, now without allies, as well as being economically and military crippled, simply floundered until the ascension of Go Bongre. Bongre attempted to rebuild and centralize the country, but only succeede din agering the nobility. King Bongre eventually died in 1414 without a direct heir, and the country began to collapse once more."
 ayabani.30a:0 "And then what happened?"

 ayabani.31.t:0 "The Go Kingdom of Tamna"
 ayabani.31.d:0 "The Go clan has ruled over Tamna since time immemorial, tracing their ancestry back to Go Eulna and the very founding of the Kingdom. They were not going to let the claims of petty nobles end that legacy. Despite the claims put forward by Mun Shin and An Silgae, Go Samgye was crowned King of Tamna on the island of Tamna itself in 1412. As the most legitimate successor to the throne, Samgye found the most support among the population. The islands of Wae, Tamna, and Daemado, as well as the princes of the Korean frontier lands, all swore fealty to him as rightful King. Skirmishes with the rival claimants continued for the rest of the year, to no avail. In a desperate attempt to secure foreign aid, in 1413 King Samgye petitioned Khan Adai Taiji of Solongos for aid. He was willing to support the King militarily, but in exchange he demanded the transfer of Tamna's land in Korea to him. Unwilling to part with such a large swath of land an alienate the people, King Samgye refused the offer.\n\nNo further moves were made by either side, and for the past 31 years the war has been frozen. King Samgye passed away of natural causes in 1442, and was succeeded by his daughter and only child Go Yeong. Queen Yeong is an ambitious woman, and will not rest until she has been crowned Queen of a reunited Kingdom of Tamna."
 ayabani.31a:0 "We will restore Tamna!"

 ayabani.32.t:0 "The Mun Kingdom of Tamna"
 ayabani.32.d:0 "The Mun family first rose to prominence as the Princes of eastern Tamna. But as the Kingdom solidified and the island became more and more important to the Go, the clan was forced to relocate to southern Wae This would be their new powerbase until Tamna, with Goryeo's help, defeated Yamatai-ko in 1109. Large areas of land on Yamatai's main island were taken, and the clan relocated once again to a land now called Munseong. Tamna's horrific defeat to Yamatai-ko in 1168, which saw all of Munseong and large parts of Wae lost, led to a minor civil war between the clans which lasted until the coronation of Go Seo as King in 1172.\n\nFrom that point on the Mun and Go became more cooperative with one another until the 1267 treaty of Settsu, in which Tamna once again collapsed into civil war. Still, this too was negotiated down, and the Mun remained compliant until the death of King Bongre in 1414. Believing the Go clan to be incompentent, Prince Mun Shin of Munseong, citing an ancient law nobody had ever heard of, claimed that the right to the throne fell to the Mun in the event the King died without an heir. This was rejected by the other clans, leading to his separating of Munseong into a rival kingdom of Tamna. With their skirmishes with the rival Kings failing and negotiations with Yamatai-ko going nowehere, the Mun were once again forced to wait.\n\nKing Shin died in 1432, succeeded by his brother and current King Mun Chung-vou. A patient man, he is more than willing to wait until the right moment to strike and reunite the Kingdom."
 ayabani.32a:0 "We will restore Tamna!"

 ayabani.33.t:0 "The An Kingdom of Tamna"
 ayabani.33.d:0 "The An clan is the most recent addition to Tamna's nobility, relatively speaking. The family first gained the attention of the crown in the War of the Great Betrayal, when General An Min-Kyu's army singelhandedly drove Yamatai-ko from the island of Shikoku. As a reward for his bravery, he was granted the entire island as a personal domain. He ruled the island as a King, renaming it to Sejib and establishing a family estate on the island. Though Tamna's control over the island would ebb and flow over the years, the An remained incredibly influential in the Old Kingdom's policies. Their firsst real act of defiance came in the 40 Years of Chaos after the Treaty of Settsu, when An Se-yeong attempted to push a claim to the throne. When order was restored in 1308 the An returned to Sejib, but never quite forgot how close they came to ruling the entire nation.\n\nTheir opportunity returned with the death of King Bongre in 1411. With the Go and Mun contesting each other's claims to the throne, Prince An Silgae seized his chance and declared his own rival kingdom on Sejib. Resoundingly defeated by the Go in 1412 and rebuffed by Yamatai in 1413, the An were forced into waiting like the rest of the Kingdoms. King Silgae died in 1436, and was succeeded by his son An Malro. King Malro understands how weak of a position the Kingdom is in compared to their rivals. It will take a lot of effort and a bit of luck for the An to come out on top in this civil war."
 ayabani.33a:0 "We will restore Tamna!"

 ayabani.34.t:0 "Unification of the Three Kingdoms"
 ayabani.34.d:0 "At last, it is done. After decades of civil war and division, Tamna has been re-united. The rulers and nobility of the rival Kingdoms have all been forced to recognise [Root.Monarch.GetTitle] [Root.Monarch.GetName] as the rightful [Root.Monarch.GetTitle] of all of Tamna. Though the rival Kings will be allowed to retain their realms and stations, they will never again be capable of challenging the rule of the [Root.Monarch.GetTitle]. The Go, Mun, and An Kingdoms have been reforged into one unitied Kingdom of all Tamnans. Despite this great success though, there is still work to be done. The land remains devastated from decades of conflict and neglect, and the sudden influx of two additional kingdoms worth of bureaucracy, soldiers, and nobility must all be addressed as soon as possible."
 ayabani.34a:0 "There is still much to be done"

 ayabani.35.t:0 "Professionalization of the Army"
 ayabani.35.d:0 "Our efforts to reform the Grand Army into a more professional fighting force have paid off. Despite the initial setbacks suffered during the process, it proved surprisingly easy to establish a standing army independent of the nobility. Though the cost of maintainging the army is cutting into our ability to recruit as many soldiers, it will be worth it in the end. The nobility will no longer have the stranglehold on the nation they once did."
 ayabani.35a:0 "Outstanding"

 ayabani.36.t:0 "The Future of Korea"
 ayabani.36.d:0 "Across both Korea and Tamna, the people are celebrating the liberation of our kin form their barbarian oppressors. But amidst all the celebration, a question has arisen. What is to be done with Korea? At the moment, we have two possible choices. The first is to crown the most senior living member of the House of Wang as the new King of Goryeo, and restore their nominal independence. They would not be fully independent, of course, but they would be a step above direct annexation into Tamna itself. The other option is to treat Goryeo as we have treated the previous Tamnan kingdoms. Allow the House of Wang to rule the land, but force them to swear fealty to the [Root.Monarch.GetTitle]. Either way, we expect no resistance from either House Wang or the people, as they are simply happy to be free of the barbarians. It all comes down to how we want to administer the region moving forward."
 ayabani.36a:0 "We will restore Goryeo"
 ayabani.36b:0 "We are already a union of Kingdoms, what's one more crown?"
 ayabani.36c:0 "We are already a union of Kingdoms, what's one more crown?"

 ayabani.37.t:0 "Koreans Return to Korea"
 ayabani.37.d:0 "Yeah I'm thinking I'm back"
 ayabani.37a:0 "Beautiful"

 ayabani.38.t:0 "The North Pacified"
 ayabani.38.d:0 "At last, our efforts to pacify the north have borne fruit. The Ainu tribes that inhabit these lands have abandoned most attempts at resistance, and have begin settling down as happy, helpful subjects of the crown."
 ayabani.38a:0 "Outstanding"

 ayabani.39.t:0 "Balloon"
 ayabani.39.d:0 "An inventor named Min Chae-won has approached the crown with an interesting proposal. Apparently, she has invented a method of flight. Inspired by Jongwan floating lanterns, she refers to it as a 'Pungseon,' or sky boat, it sees an individual propelled into the air inside a basket, suspended below a paper and cotton canvas pushed upward by an open flame. The goal of this invention, she has informed us, is to allow Tamnan soldiers to gain greater elevation than the enemy. She strongly suggests they only be used for scouting purposes, as using them to liberally could lead to them getting intercepted by the enemy. After a hefty payment, the designs were quickly integreated into the military. We will make great use of them moving foward."
 ayabani.39a:0 "They'll never see us coming"

 ayabani.40.t:0 "Hello Trappist"
 ayabani.40.d:0 "I know you told me no goguryeo larp, but that was specifically in relation to solongos"
 ayabani.40a:0 "you didn't say anything about tamna"

 ayabani.41.t:0 "A Meaningless Debate"
 ayabani.41.d:0 "The conquest of Ih Huree some time ago has led to a very interesting situation. Apparently two soldiers stationed there, one Ma Holang-i and Choe Geu, have entered into a heated feud with one another regarding an ancient legend. According to Choe Geu, Gao Yan, a former Jongwan emperor and descendant of the Goguryeo Gaogouli family, fled to the Mongolian steppe and established himself as leader. His descendants remained in power in the region for the next few centuries, preparing to one day return and reclaim Korea.\n\nMa Holang-i claims this is absolute nonsense, that there is absolutely no way a Jongwan king could become Khan and that his family could rule for this many centuries uninterrupted.\n\nThe commanding officer of the two has come before the crown, begging us to shut these two up so everyone else can get some sleep."
 ayabani.41a:0 "Flog them until they shut up"
 ayabani.41b:0 "We should try and verify this claim"

 ayabani.42.t:0 "The Results are in"
 ayabani.42.d:0 "The investigative team we sent to Ih Huree has come back with their results. They have not found any evidence of any ancient Sino-Korean kings once ruling this land in the past. Rather, in a shocking turn of events, they have discovered that they are still ruling this land. Nestled deep within the steppe, the still living descendants of the Gao dynasty have been discovered ruling over a nomadic Buryat tribe. The news has spread across the country like wildfire, and the family has been invited to go on a tour of the realm.\n\nMa Holang-i reportedly walked off into the steppe to become a monk, and has not been heard from in weeks."
 ayabani.42a:0 "Reality is indeed often stranger than fiction"

 ayabani.43.t:0 "The Results are in"
 ayabani.43.d:0 "The investigative team we sent to Ih Huree has come back with their results. Despite their best efforts and months of tireless searching, no evidence has been discovered regarding any Sino-Korean kings ruling any Mongol tribes. Just a wealth of various artifacts pertaining to Mongol history, which have all been thrown out as instructed.\n\nChoe Geu has taken the news well, though, and peace has finally returned to the garrison."
 ayabani.43a:0 "Oh well"

 ayabani.44.t:0 "The End of the Second Mandate"
 ayabani.44.d:0 "While the most famous and well known Mandate of Heaven belongs to the Jongwans, the Meng people of Yitu were in possession of their own version as well. But what's more, they were also in possession of a considerable number of precious metals for which to fund this mandate. For centuries the Cuan dynasty ruled over these lands as the chosen son of heaven. But not everything can last forever. With the region now under our control, the southern Mandate has been destroyed. This land will now serve as our prime source of copper, as well as any other metals discovered here in the future."
 ayabani.44a:0 "It was on the way out anyways"

 ayabani.45.t:0 "The Lands Beyond the Sea"
 ayabani.45.d:0 "As it turns out, the stories of land beyond the ocean were true. A small chain of islands has been discovered where nothing but ocean was supposed to be. The news is spreading quickly back home. An expedition to search for the colossal serpent is being prepared, and dozens of ships bound for the east are getting ready to set sail. In the meantime, we should try our best to conquer this island chain we've found. There is a nearby, smaller island chain that could serve as a base of operations for just such an invasion."
 ayabani.45a:0 "Get settlers on those islands immediately"

 ayabani.46.t:0 "Settsu Undone"
 ayabani.46.d:0 "In this very city, in the year 1267, the King of Yamatai-ko forced King Go Min of Tamna to sign the Treaty of Settsu. Settsu itself, as well as several outlying towns and villages in Guggyeong and Sejib, were cede to Yamatai. Tamna was also forbidden from waging wars of aggression against Yamatai at any point in the future. It was this document that effectively guaranteed the death of the Old Kingdom. King Min died not long after, and the country collapsed into civil war for the next forty years. While most of Sejib was regained during a period of unrest in Yamatai, Tamna would remain stagnant until the death of King Bongre in 1444 and the civil war.\n\nNow, Settsu is once again in Tamnan hands. The centuries of humiliation imposed on us by Yamatai-ko have finally come to an end. The building the hated treaty was signed in has already been dismantled, and the city is quickly being converted into a base of operations for future invasions further into Nihon. The humiliation of Settsu may have been undone, but we cannot rest until the memory Yamatai is destroyed entirely."
 ayabani.46a:0 "Death to Yamatai-ko!"

 ayabani.47.t:0 "The Fall of Kyoto"
 ayabani.47d1:0 "Kyoto, capital of the hated Yamatai-ko, is ours.\n\nAfter centuries of effort, thousands of lives lost, national humiliation, and a civil war, we have done it at last.\n\nYamatai-ko will never recover from this blow. Despite our failure to capture the royal family, the loss of their ancient capital will cripple both their morale and economy. It is only a matter of time until the rest of Yamatai falls. Until then, we will celebrate our greatest victory yet. Death to Yamatai-ko, long live Tamna!"
 ayabani.47d2:0 "Kyoto, capital of the hated Yamatai-ko, is ours.\n\nAfter centuries of effort, thousands of lives lost, national humiliation, and a civil war, we have done it at last.\n\nWe may not have been the first to take the city from them, but it matters litte. What matters is that it is ours now, and it will always be ours. We may not be able to destroy Yamatai-ko itself, but we can still humiliate them from beyond the grave."
 ayabani.47a:0 "Raise the black banner high, Kyoto is finally ours!"

 ayabani.48.t:0 "The Liberation of Kaesong"
 ayabani.48.d:0 "Kaesong was established as the capital of Goryeo in the year 919. It would remain the most prestigious and important city in the entire Korean world for the next 300 years. Everything changed in 1266, though. The barbarian invasion of the penninsula quickly led to the collapse of Goryeo's authority, and by 1268 the barbarian chief who led the invasion had crowned himself King of 'Solongos.' The city has languished under barbarian control ever since, but it has not been forgotten about. Koreans everywhere still looked to it as a beacon of what was lost, and though it was now the barbarian's capital it never stopped belonging to Goryeo. \n\nNow, Kaesong has been liberated. In an elaborate ceremony, the [Root.Monarch.GetTitle] honored all the ancient Kings of Goryeo and all those soldiers who perished in her defense. We will never allow this great city to fall to barbarians again."
 ayabani.48a:0 "We have avenged them"

 ayabani.49.t:0 "A Rising Star in the Mudang"
 ayabani.49.d:0 "Traditionally, the Mudang are content to stay out of politics. Their usual duties are restricted to the village they inhabit. Sometimes, though, a particular Mudang will preform their duties so exceptionally the entire nation takes notice. Such is the case with Mun Seo-a, a Mudang from the Cheonsang-ui archipelago. She has served the community there faithfully for five years now helping them through a drought and supposedly staving off a famine. She has been given glowing reviews by all who have met her. Upon invitation, she has agreed to step down from her post on Cheonsang-ui and come to the capital to serve as a spiritual advisor to the [Root.Monarch.GetTitle]."
 ayabani.49a:0 "Excellent"

 ayabani.50.t:0 "Won Gwangjo Promoted"
 ayabani.50.d:0 "News has reached the capital of a recent promotion in one of our frontier garrisons. A soldier by the name of Won Gwangjo recently distinguished himself in battle against a group of Samurai raiders. After the unit's commanding officer was killed, he took charge, rallied the men, and wiped out the raiders to the last. For this tremendous victory, he has been sent directly promoted to the rank of General by the army's leadership. There is a bright future ahead for this young man."
 ayabani.50a:0 "Such a man shall lead our armies with honor"
 ayabani.50b:0 "He should advise the court"

 ayabani.51.t:0 "The History of Tamna"
 ayabani.51.d:0 "A new book by famed author Yang Chang-ho has taken the country by storm recently. Titled 'A History of Tamna,' it details the entire history of Tamna from the moment of its founding to the modern day in the form of poetry. The educational value of the work, enhanced by it's beautiful illustrations and exquisite writing, has seen it rapidly adopted in schools the country over. It has also swelled in popularity thanks to readings done in cities by local storytellers. Yang Chang-ho has truly cemented his status as Tamna's greatest living writier."
 ayabani.51a:0 "I wonder what he'll write next"

 ayabani.52.t:0 "Whispers in the Military"
 ayabani.52.d:0 "Earlier today, a young soldier approached a court official with a most alarming tale. Suppoesdly, a group of dissatisfied soldiers from Daemado are plotting to overthrow the [Root.Monarch.GetTitle]. Led by a young Lieutenant named Ga Deokgi, they are slowly building their influence in the army in preparation for a march on the capital. The whistleblower was apprently part of this group before coming to his senses, and claims that they are quite far along in their plans. Unless action is taken now, he says, they will be ready within a month."
 ayabani.52a:0 "Arrest them"
 ayabani.52b:0 "I don't think it's anything to worry about"

 ayabani.53.t:0 "The Coup"
 ayabani.53.d:0 "In the early hours of [GetDateText], military units from across Tamna stopped responding to orders. Despite the best efforts of regional commanders, nobody could get the soldiers to do much of anything. After a few hours of this confusion, several regiments unexpetedly marched through the streets of $CAPITAL$ towards the royal palace. The doors were borken down, and Lieutenant Ga Deokgi spoke from the balcony to the assembled crowd.\n\nDecrying the royals as the root cause of all of Tamna's issues, Deokgi declared that they were no longer fit to rule. In their palce, and under his leadership of course, the army would be taking total control of the United Kingdoms of Tamna.\n\nThe Royal Family, which quickly fled the city following the suprise march, have evacuated to the island of Tamna. Together with a coalition of loyalists, they have declared the military's intervention to be treason, and are preparing to revolt and retake the country."
 ayabani.53a:0 "For the Greater Good"
 ayabani.53b:0 "Down with the tyrants!"

 ayabani.54.t:0 "Victory Against the Usurpers"
 ayabani.54.d:0 "Against all odds, the Loyalist coalition has defeated the military usurpers. The capital has been reclaimed, and the [Root.Monarch.GetTitle] has been returned to [Root.Monarch.GetHerHis] rightful place on the throne.\n\nMost of the conspirators have been rounded up and executed for their crimes against the kingdom. Lieutenant Ga Deokgi himself remains on the run, but it is only a matter of time until he is caught and killed, unless he finishes the job before we can."
 ayabani.54a:0 "Tamnayeo, yeong-wonhala!"

 ayabani.55.t:0 "Victory Over the Rebels"
 ayabani.55.d:0 "The rebels that attempted to unseat us have, naturally, been defeated. The old royal family has been unceremoniously executed, their bodies dumped into the sea of Tamna. An extermination order has also been put in place for the entire royal house, to prevent such a rebellion from happening again.\n\nWith our grip on power secure and any challeneges to our rule eliminated, we can set about reshaping Tamna in our image."
 ayabani.55a:0 "We will save Tamna from itself"

 ayabani.56.t:0 "A Moment of Peace on the Steppe"
 ayabani.56.d:0 "The Tiele and Yenisei tribes had been locked in a struggle for dominance over the steppe for centuries. While it often went back in forth, at the moment, the Yenisei were handily winning. And while we could have decided to hedge our bets with one of these tribes, or simply let them be, how could we call ourselves civlizers if we let our subjects kill one another unimpeded?\n\nInstead, a plan was devised. We would gather the Tiele and Yenisei leadership in one place, and have them air out their grievances in a safe space. It was hoped that, after the shouting and fighting ended, a sense of camaraderie could blossom between the two. And at that we seemed to have succeeded. The Yenisei and Tiele chiefs fought, and yelled, and threatened, but in the end, they managed to resolve most of their differences.\n\nUnfortunately, the Khalkha used the opportunity to make their move. They ambushed the meeting, killed everyone there, and then expelled the Tiele and Yenisei from the region.\n\nWhen asked why they did it, the various Khalkha chiefs said 'wouldn't you like to know' and then beat our messenger up. But they do still swear fealty to the [Root.Monarch.GetTitle], so there is at least kind of a silver lining."
 ayabani.56a:0 "Oh"

 ayabani.57.t:0 "Resting on Our Laurels"
 ayabani.57.d:0 "The initial claims put forward upon our restoration of Hwan-guk lined up with what we assumed to be their maximum extent. Not accounting for tributaries, this included most of Iranzamin, the Serican steppe, Phyu, and Cherosyne. With wise leadership, bravery, and steadfastness, these lands have been reconquered. Recently, though, the initial scholarship that led us to discover Hwan-guk has been examined again, and the list of claims has grown to include...the entire world. This casts severe doubt on the veracity of the existence of Hwan-guk as a whole. We have two options laid out before us. We could bury this evidence and bring an end to our campaigns of conquest, or decide to throw caution to the wind and lay claim to the entire world.\n\nWhat shall it be?"
 ayabani.57a:0 "This is enough for me"
 ayabani.57b:0 "The entire world will be ours!"

 ayabani.58.t:0 "The End of History"
 ayabani.58.d:0 "From a small island kingdom, to the first conquest of Wae, to the humiliation of Settsu, to the chaos of the civil war, to today. Despite the often insurmountable odds, Tamna has survived. The spirit of the Tamnan people has remained unbroken. When others demanded we bow, we rose and turned the tables. Now, there are none left to oppose us. The black banner of Tamna, which many thought would never see the light of day again, now flies over every major city in the world. History, as we know it, has ended. We have well and truly won."
 ayabani.58a:0 "And we couldn't have done it without you"

 ayabani.59.t:0 "Victory Over the Rebels"
 ayabani.59.d:0 "The rebels that attempted to unseat us have, naturally, been defeated. The old royal family has been unceremoniously executed, their bodies dumped into the sea of Tamna. An extermination order has also been put in place for the entire royal house, to prevent such a rebellion from happening again.\n\nWith our grip on power secure and any challeneges to our rule eliminated, we can set about reshaping Tamna in our image."
 ayabani.59a:0 "We will save Tamna from itself"

##MISSIONs
 aya_navy_title:0 "To Conquer the Seas"
 aya_navy_desc:0 "The Old Kingdom was always conscious about maintainging a strong navy. With our origins in the island of Tamna, that is not surprising. But when the Old Kingdom fell, we began to focus far more on our holdings in Nihon and the navy fell to neglect. With war on the horizon, we must make sure our navy is strong enough to defeat our enemies."

 aya_merge_army_navy_title:0 "The Question of Command"
 aya_merge_army_navy_desc:0 "An ever present concern of the coming war is that of logistics. As such, several low ranking military officers have put forth a siggestion: appointing our ruler as leader of the military."

 aya_unification_war_title:0 "The Great War of Unification"
 aya_unification_war_desc:0 "All of our preparation has led up to this moment. We have waited for 30 years for the right opportunity to fall into our lap. But we will wait no longer. The Kingdoms of Tamna will be united, and we will be the ones to do it!"

 aya_army_title:0 "The Grand Army of Tamna"
 aya_army_desc:0 "The Grand Army of Tamna was the principle fighting force of the Old Kingdom. If we are to take our rightful place as their heirs, we must make sure that our army is able to live up to what it once was. Officially restoring the Grand Army of Tamna will go a long way in ensuring that becomes a reality."

 tmn_econ_title:0 "Rebuilding the Economy"
 tmn_econ_desc:0 "The Great War of Reunification may have bound our kingdoms together, but the lingering economic effects still plague the realm. Entire villages were wiped out by marauding armies and one enterprising noble is 12000 Grain Coins in debt to Japanese moneylenders. Serious rebuilding efforts will have to be undertaken in order to ensure that our economy recovers. We may even need to call on the moneyed men of the realm to aid us. Only when the economy is thriving will our people be happy and healthy, after all."

 tmn_stalin_title:0 "Purge the Bureaucracy"
 tmn_stalin_desc:0 "Uniting the three kingdoms has caused an unfortunate side effect: the bureaucrats of all three kingdoms have begun to forge alliances. They know that the reforms we are undertaking put their careers at risk and hope that, if they can gain enough traction, they will be able to outlast the coming storm. They believe themselves to be faceless bean counters who blend into the woodwork. We must show them that they couldn't be more wrong right before we show them the door."

 tmn_nobles_title:0 "Reign in the Nobility"
 tmn_nobles_desc:0 "The thing that brought down the old kingdom, besides rampant corruption, nepotism in the army, overreliance on allies that no longer existed, and the lack of an heir, was cliques of nobles having their way with the countryside. These rampant abuses turned the people against the nobility and led to revolt after revolt, wwhich turned the army against the nobility. These past 30 years little has changed on that front. Until now. The nobles will no longer be allowed to abuse the people so directly. They must be curtailed."

 tmn_war_pacifism_title:0 "Declare War on Pacifism"
 tmn_war_pacifism_desc:0 "Priests across the realm celebrated the reunification of the kingdoms, as they believed it would bring an end to the era of militarism that began when the Old Kingdom fell. They have begun to preach their pacifist ways from village to village, lying to the people and claiming that they will never have to shoulder the burden of another war. This is an incredibly dangerous line of thinking. These priests must be reigned in and pacifism must be eradicated if we are to claim or rightful destiny."

 tmn_unbreakable_union_title:0 "Unbreakable Union"
 tmn_unbreakable_union_desc:0 "Some said that reunifying the Tamnan kingdoms was impossible. That we would sooner be swallowed up by the Japanese before we could ever work together again. They were swiftly executed to prevent such seditious ideas from spreading, but they have been proven wrong from beyond the grave. The Tamna Kingdoms are whole again. The Tamnan people are happy, healthy, prosperous, and willing to die for their [Root.Monarch.GetTitle]. Now we may set our sights on the horizon, and on the future of our Kingdom. A future that looks very bright indeed."

 tmn_three_armies_title:0 "The Three Grand Armies"
 tmn_three_armies_desc:0 "The integration of our rival kingdoms have given our high command a rude awakening: we were not the only ones to attempt a restoration of the Grand Army. In fact, all three kingdoms had their own Grand Army. Now we have to deal with the fact that we have three different Grand Armies under our control. We will have to carefully navigate this issue if we do not want to hamstring our army in any future conflicts."

 tmn_trucebreak_title:0 "Repudiate the Treaty of Settsu"
 tmn_trucebreak_desc:0 "In 1267 the Kingdom of Tamna, following their defeat in the siege of Kyoto, signed a treaty with the Japanese agreeing to withdraw from our occupied territories in exchange for peace with Yamatai. This put an end to the Tamnan Golden Age and the kingdom began to stagnate. If we are to undo the wrongs of the past, our first step should be to do away with this vile treaty. We will not allow Japanese barbarians to put a limit on our greatness!"

 tmn_cant_spell_chrysanthemum_title:0 "The Coronation"
 tmn_cant_spell_chrysanthemum_desc:0 "At long last the great city of Kyoto, and with it the Kingdom of our most hated enemy, Yamatai-ko, have fallen. We have finished what our ancestors started so many centuries years ago. We will celebrate this great victory by crowning our great [Root.Monarch.GetTitle] the as [Root.Monarch.GetTitle] of Yamatai. With luck this may even convince the Japanese of the righteousness of our rule, provided things don't get out of hand."

 tmn_ryu_title:0 "The Matter of Amishi"
 tmn_ryu_desc:0 "Securing the tribute of the Kingdom of Amishi in 1109 was the first expansion undertaken by the Old Kingdom without the help of the Kingdom of Goryeo. Amishi would remain subject to the Old Kingdom until the very moment it fractured, waiting until they were sure nobody would notice their declaration of independence. They were right to think that way, as in the chaos of the following decades almost no member of any of the three courts even bothered to try and subjugate them again. They would have been forgotten entirely had we not discovered trade manifests mentioning them. Now it is time to decide what to do about this renegade island."

 tmn_kuomintang_title:0 "A Worthy Foe"
 tmn_kuomintang_desc:0 "The people of northern Nihon have struggled against the Japanese for almost as long as we have. In a way it makes us kindred spirits, though our reasons for hating the Japanese are far better and more nuanced then theirs. While Yamatai was blind to the strength of the Ainu, we will not let that be our downfall. We must strike quickly, and pacify these worthy enemies. Only then will our dominance of Nihon be unquestioned."

 tmn_nihon_title:0 "Conquerors of the Sun"
 tmn_nihon_desc:0 "In 1267 the Old Kingdom of Tamna was reduced to irrelevance and humiliated. Our existence was propped up by an ally that no longer existed, and the Japanese grew to view us as nothing more than a speedbump in the path of domination. We were the laughingstock of the region. Now, though much has changed, the Japanese have bent the knee to their rightful rulers. Our revenge has been swift, and it has been sweet. We stand alone as the undisputed Kings of Nihon and the conquerors of the Sun itself."

 tmn_sos_title:0 "Developing the Frontier"
 tmn_sos_desc:0 "In 1266 our closest ally, the Kingdom of Goryeo, was destroyed. Barbarian invaders came in from the north, murdering the king in cold blood and destroying a dynasty that had ruled for 400 years. While the old Kingdom managed to seize several border territories when the barbarian kingdom fell, this frontier fell into neglect and disrepair when the civil war began. Any campaign in Korea must first begin with a restoration of this territory."

 tmn_hoi4_title:0 "The Liberation of Korea"
 tmn_hoi4_desc:0 "After a hardfought campaign, we have finally liberated the Korean peninsula from the clutches of the Mongol barbarians. Though much remains destroyed, from Jeonju to Kaesong to Yukjin, the sons of Dangun are welcoming are soldiers as heros. We must now set about deciding how to manage the peninsula, and rebuilding it after centuries of nomadic rule."

 tmn_ainu_title:0 "The Wild North"
 tmn_ainu_desc:0 "The Ainu we have encountered most often, according to those we have spoken to, are of a far calmer and more settled temperment. It is these Ainu whom we have already conquered. Their kin to the north, however, are for wilder. They represent a grave threat to our security, and we must pacify this region before they can cause too much damage."

 tmn_north_title:0 "The Northern Expedition"
 tmn_north_desc:0 "With the north of Nihon under our control, we have discovered a new frontier previously unknown to us. The people there have come bearing gifts, telling us wonderous stories about the land in which they live. We must establish a foothold in this new territory, so that we can better explore and exploit it."

 tmn_west_alaska_title:0 "The Western Expedition"
 tmn_west_alaska_desc:0 "This land is far vaster than we initially assumed, stretching on seemingly infinitely. But more importantly, it is home to a great deal of new areas for settlement. We shall expand our reach in a relentless march west until we run out of traps to lay and fur to sell."

 tmn_changbai_title:0 "Return to Buyeo"
 tmn_changbai_desc:0 "The lands beyond the Changbai were once the home of the Kingdom of Buyeo. Many Korean kingdoms, notably Goguryeo and Silla, claimed a direct line of descent from this realm. Now, though, the land lies in the hands of various bickering tribal kings. Conquering this land would be seen as a source of legitimacy among the Korean population, as well as open us up to further opportunities in conquering the rest of the region.. "

 tmn_frontier_title:0 "Taming the Frontier"
 tmn_frontier_desc:0 "The primary issue with pushing further into the Amur is the weather. Most of our soldiers aren't used to the cold, snowy climate that permeates this land, and we lose almost as many to the cold as to the enemy. If we are to push any further into the mainland, we will have to develop strategies to combat this. Luckily for us, there is territory that would be perfect for training our soldiers how to survive in this weather. Unfortunately, that land is owned by various tribes. We just have to hope we can take it without losing too many soldiers, or this exercise will have been a waste of time."

 tmn_coast_title:0 "Conquering the Coast"
 tmn_coast_desc:0 "The Itelmen, cousins of the Ainu we are already familiar with, currently maintain a large tribe on the coast of Nihon basin. Despite attempts to reach out with them, they are uninterested in any dealings with us. Unfortunately, this positions them as a threat to our regional ambitions. We must conquer these coastal lands to ensure the security of our territory."

 tmn_jesse_title:0 "A Saviour"
 tmn_jesse_desc:0 "The Mongolian and Yeniseian Steppe is home to a number of faiths, chief among them being Shamanism like ours. However, it is also home to two far more interesting faiths: Christianity and Buddhism. With the lands of these barbarians under our control and our faith spreading more and more by the day, we have a chance to integrate one of these faiths into the Royal Pantheon."

 tmn_jade_title:0 "Throne of Jade and Light"
 tmn_jade_desc:0 "The ruling ideology of the Jongwan elite has been the ideas of Confucius for centuries. While some have considered integrating him into the pantheon, two interesting alternatives have been suggested: Jongwa's Jade Emperor, and the prophet Mani worshipped by those in the south of Jongwa. Only one may be chosen, for it will be seen as an insult to the followers of the other. We must choose carefully which spirit to pray to."

 tmn_faith_title:0 "The Sun or the Bear"
 tmn_faith_desc:0 "One of the greatest strengths of our faith is its malleability. The spirits a believer prays to are, for the most part, up to the believer themselves. Now, with all the islands of Nihon under our control, two different faiths have become commonplace in the Kingdom. Integrating one of these gods into the pantheon of our royal family will go a long way in integrating the believers."

 tmn_rel1g1on_title:0 "The Word of the Spirits"
 tmn_rel1g1on_desc:0 "The Musok faith has been the official faith of the Kingdom of Tamna dating back to our very founding. However, various new religions have arisen over the centuries and replaced or integrated local beliefs. As a result, Tamna is the last place where Musok is practiced freely. If our faith is to survive, we must work tirelessly to steadfastly spread the word of the ancestors to any who will - or won't - listen."

 tmn_amur_title:0 "Tigers of the Amur"
 tmn_amur_desc:0 "Tigers have long been venerated as protectors, wards against evil that bring luck. Much like the Tiger drives away evil, we have driven away the barbarians that dwelled around the Amur and brought peace and prosperity to the land."

 tmn_heaven_title:0 "Crossing Shanhai"
 tmn_heaven_desc:0 "The Empire of Jongwa has always existed at the perifery of Tamna's affairs. At most, trade took place between Tamna and various Jongwan dynasties. But times have changed, and while Tamna has caught up with them, Jongwa has not. Since the fall of the Yan, the region has been left divided and ripe for conquest. We must act quickly, before any one Jongwan state can rise to contest us."

 tmn_wall_title:0 "Along the Great Wall"
 tmn_wall_desc:0 "The Great Walll of Jongwa was constructed with one goal, being to keep the northern barbarians out of Jongwa. Despite our designs on these barbarian lands, which we may or may not have already conquered by the time we conquer Jongwa, it's still an initiative we support. We must conquer the lands around this collection of walls and coopt them for ourselves."

 tmn_river_title:0 "Along the Rivers"
 tmn_river_desc:0 "The Huanghe and Yangtze rivers have served as the lifeblood of Jongwa since time immemorial. The first Jongwan states arose around them, and these waterways continue to play a pivotal role in both daily life and the cycle of the Mandate. Control over Jongwa is dependent on controlling these rivers."

 tmn_plains_title:0 "The Central Plains War"
 tmn_plains_desc:0 "Central Jongwa possesses some of the most fertile lands in all of Serica, and is among the most populous places in the world. Controlling it will provide a considerable boon to our armies."

 tmn_tno_title:0 "The Twin Pearls"
 tmn_tno_desc:0 "Southern Jongwa has found itself surprisingly unbothered by various dynasties throughout history. It is likely for this reason that it was home to so many petty warlords, none more petty and more warlord-y than Liqian Lei. These cosplayers of an empire nobody has ever heard of cannot be allowed to squat on a region as economically important as Guangdong. We must drive them out."

 tmn_longyun_title:0 "Mountainous Mandate"
 tmn_longyun_desc:0 "The Empire of Da Cuan has the distinguishment of being the one part of Jongwa never conquered by Guo Hong or his successors. Instead, it has stood tall in the mountains of Yitu under their particular mandate of heavan. We cannot allow a rival empire such as this to exist if we are to ensure our position in Jongwa is secure."

 tmn_jongwa_title:0 "Cheongug"
 tmn_jongwa_desc:0 "At long last, all of Jongwa has fallen to Tamna. What was once a patchwork of petty warlords and kings is now a harmonious, peaceful land under the watchful eye of Tamna. Truly, Tamna is as close as you can get to Heavan."

 tmn_weast1_title:0 "The Eastern Expedition"
 tmn_weast1_desc:0 "Many Japanese and Ainu sailors tell strange stories in taverns late at night, of a land far to the east. A bountiful land, with resources aplenty. We should quietly look into these rumors, see if there's any veracity to them. They're probably about as true as the story of the colossal serpent that sank an entire fleet of ships, but you never know."

 tmn_weast2_title:0 "The Islands of Fire"
 tmn_weast2_desc:0 "The islands we have discovered surprise us in many ways. Not only are they inhabited, but they are home to a great variety of different tribes and kingdoms. They are also stunningly beautiful. If the stories they tell us of lands even further east are true, they would make an excellent vacation home and staging ground for future colonization. So long as the colossal serpent does not sink any of our fleets. Hopefully, we can locate it soon."

 tmn_weast3_title:0 "The Land of Sunrises"
 tmn_weast3_desc:0 "In one of the early explorations of this land, a Japanese member of the crew referred to it as the Land of Sunrises. Truly, there is no better name for it. While colonial affairs matter little to us, we should still do our best to make sure or colonists here can survive on their own two feet."

 tmn_weast4_title:0 "The Frozen Peaks"
 tmn_weast4_desc:0 "The hills and mountains of Cascadia are home to quite a number of different people, and our colonial venture has faced some difficulty getting off the ground. But more importantly than any of that, there is a large number of valuable resources in the area. Gold included. We should give our fledgling colony there some support, so they can manage themselves without going bankrupt."

 tmn_panyupaya_title:0 "Harness the Spice Trade"
 tmn_panyupaya_desc:0 "Following our seizure of Liuqiu, a large number of spices have begun to flow into the country from the south. While they have gone a long way in improving our already exquisite cuisine, there's an issue. These spices are expensive. The merchant class has begun to urge us to subijugate the lands of Panyupaya, so that we may establish commercial rule over them."

 tmn_straya_title:0 "The Southern Expedition"
 tmn_straya_desc:0 "The foothold we have gained in Panyupaya has revealed to us another set of islands, so large one could mistake them for another continent entirely. This vast and unforgiving place would be the perfect home for some of the more undesirable criminal elements of society."

 tmn_army_title:0 "A Truly Grand Army"
 tmn_army_desc:0 "The army has always been a sore spot for Tamna. Historically, the Old Kingdom would often rely on support from Goryeo to win wars for them. This came back to haunt them when Goryeo collapsed and Yamatai was able to humiliate the Old Kingdom with the treaty of Settsu. Our previous policies have come a long way from those days, but it is not enough. We must reform the army into the strongest in Serica."

 tmn_1conomy_title:0 "Hearts and Minds"
 tmn_1conomy_desc:0 "The Great Japanese Revolt has taught us an awkward truth. Unbridled hatred for all things Japanese is a hard thing to sell to the Japanese population. It is clear that ruling through hatred will not prove effective in the long term. Instead, we must change our focus. Investing in their land and rebuilding Kyoto should win the hearts and minds of the Japanese people. We should probably also tone down the most hated enemy thing, too."

 tmn_2conomy_title:0 "An Enlightened People"
 tmn_2conomy_desc:0 "Tamna's philosophy is already among some of the best in the world. Scholars flock to our lands in search of new frontiers to develop their ideas. With a bit of government funding, we can make philopsophical enlightenment a permanent fixture of Tamna's way of life."

 tmn_3conomy_title:0 "The Global Market"
 tmn_3conomy_desc:0 "Trade is a vital component to any modern economy. Our position in Serica, however, puts us on the perifery of some of the more profitable trade routes you can find in Jongwa. We shall fight for our place in the global market, and make Tamna the world's port."

 tmn_navy_title:0 "A Grand Fleet"
 tmn_navy_desc:0 "The navy has always been the pride of Tamna, much more than the army ever could be. But the years of civil war have seen it fall into, if not disrepair, at least neglect. If we are to stand among the great powers, we need a better fleet."

 tmn_navy2_title:0 "A Grander Fleet"
 tmn_navy2_desc:0 "The first stage of our naval reforms have been completed, but it simply is not enough. There are whispers of lands to the west with far larger, far more powerful fleets than even ours. We cannot risk them discovering us and taking advantage of our comparative weakness. We must build a larger, more grand fleet. Only then will we be truly safe."

 tmn_steppe_title:0 "Subjugating the Steppe"
 tmn_steppe_desc:0 "There are many different justifications one can give for invading the barbarian steppe. Revenge for the conquest of Goryeo, and abundance of resources, religious differences, perhaps a Khalkha prince inviting us to rule. Take your pick, I'm sure any of them would work fine."

 tmn_mountain_title:0 "Moving the Mountains"
 tmn_mountain_desc:0 "Every so often, a particular tribe will rise to prominence and establish themselves as the dominant power in the steppe. While most of these would be Greatest of Khans simply fade into history, the Yenisei have had a surprising amount of staying power. If we are to secure out power over the steppe, we must eliminate this rival contender. Or, if someone did that for us, take over their former land and act like we beat them."

 tmn_republic_title:0 "Crushing the Republics"
 tmn_republic_desc:0 "The passage of the silk road through the western steppe has given rise to a great many republics over the course of history. Ordinarily, we might be able to find common cause with these traders and merchants. But, if we want to control the trade that flows through the steppe, we must conquer them. Really, they left us no other choice."

 tmn_temujin_title:0 "Our own Khanate"
 tmn_temujin_desc:0 "Mongol chieftans often speak of some sort of destiny that has been stolen from them. They claim that Guo Hong was only able to achieve his many feats due to timing, and a little bit of luck, and if they were given the opportunity they would have far surpassed him. We have once again proven them wrong. A century after Guo Hong nearly wiped them out the Mongols have been subjugated once more. But while they have been disgraceful in defeat, but we must be graceful in victory. Like with Yamatai, we will proclaim ourselves the new Khans of this land. Except this time, we won't burn anything down."

 tmn_empire_title:0 "The Empire of our Dreams"
 tmn_empire_desc:0 "When the Old Kingdom fractured into civil war, a high ranking general remarked that it would spell the end of Tamna. He has been proven wrong time and again, first when the Kingdoms reunified, then again when the hated enemy was defeated, and again when Korea was liberated. Now we have proven him wrong once more, by establishing the greatest Empire in Tamna's storied history. Truly, none can stand before us as equals."

 tmn_serica_title:0 "Relentless March West"
 tmn_serica_desc:0 "The conquest of Siyi was simply the first step in our push across the steppe. We shall push west, into the lands of the Serbs and Tibetans which now lie open in waiting for the return of their rightful rulers."

 tmn_persia_title:0 "Graveyard of Empires"
 tmn_persia_desc:0 "Persia and Khorasan have been home to many empires throughout history. Since the fall of the Bolgars, though, no empire has managed to last longer than a few decades at a time. We shall be the exception to this rule, and conquer Persia once and for all."

 tmn_vietnam_title:0 "Down South"
 tmn_vietnam_desc:0 "South of Jongwa, the forested lands of Phyu and Cherosyne have been left to their own devices for some time. Exempt from the conquests of Guo Hong and the Yan, they have had a chance to develop on their own. Unfortunately, the lands have been divided between rival kingdoms. We must restore order and peace to this land"

 tmn_hwan_title:0 "Empire of the Dragon"
 tmn_hwan_desc:0 "In Korean and Tamnan mythology, rather than being creatures of destruction, Dragons are symbols of authority, divinity, and grace. Like a mighty dragon, we have risen from ruin and reclaimed not just our own legacy, but our ancient past as well."

 tmn_hworld_title:0 "The Last Empire"
 tmn_hworld_desc:0 "We have done it at last. The entire world has fallen to the might of Hwan-guk. No country is left to stand up to our might. From the cosmopolitan lands of Europe, to the savannahs of Libya, across the sea in Rausulia, to our home in Asia, the black banner of Tamna-Hwan-guk flies proudly. We are the world's last, greatest empire."

 tmn_taiwan_title:0 "Seize Taiwan"
 tmn_taiwan_desc:0 "To the south of Amishi lies another, much larger island with too many names to count. As of the last time we checked, it was in the hands of the Shanyue, a band of Jongwan pirates and raiders. In order to safeguard our shores, we must wrest control of the island from it's current owners. We can put it to much better use, anyways."

