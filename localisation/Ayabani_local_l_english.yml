 ayb_global_trade:0 "Harnessing Global Trade"
 ayb_navy:0 "The Grandest Fleet"
 ayb_japan_nice:0 "Hearts and Minds"
 ayb_japan_nice_desc:0 "I promise, all those times we said the people of Yamatai were devils who deserved to die, we were just talking about the government. I love the Japanese, my best friend is Japanese."
 ayb_khalkha:0 "Capital of the Khalkha"
 ayb_khalkha_desc:0 "Ih Huree has been designated as the permanent capital of the Khalkha tribes"
 ayb_world:0 "The Grandest of Ambitions"
 ayb_world_desc:0 "'When calculated with modern measures, the alleged territory of Hwan-guk spans from the North Pole to the South Pole.'"
