 ceremonial_capital_tamna_desc: "The island of Tamna itself stopped being the official capital in 1116, due to the administrative issues of ruling land in Nihon from such a small island. In spite of this, the island remained the cultural and spiritual center of the Kingdom, and served as a ceremonial capital. Owning the island gives any Tamnan ruler more legitimacy in the eyes of the people."
 japan_revolt_modifier: "The Great Japanese Revolt"
 tmn_devastation: "Post War Devastation"
 tmn_devastation_desc: "The Unification War between the three Kingdoms of Tamna has left much of the land devastated"
 ayb_tamna_unification1: "Unruly Princes"
 ayb_tamna_unification1_desc: "The royal families of the former Kingdoms are proving uncooperative. Since we cannot simply remove them without risking revolt, we must show them that our way is the only true path forward."
 ayb_tamna_unification2: "Corrupt Nobility"
 ayb_tamna_unification2_desc: "The noble class of Tamna has always been rather corrupt. It was one of the leading causes of the collapse of the Old Kingdom. If we are to move forward, we must ensure this fifth column is excised."
 ayb_tamna_unification3: "Oversized Bureaucracy"
 ayb_tamna_unification3_desc: "We have suddenly found ourselves in possession of three Kingdoms' worth of bureaucrats. There is simply too much red tape to handle, and it is causing issues managing the realm."
 ayb_tamna_unification4: "Pacifist Mudang"
 ayb_tamna_unification4_desc: "With the civil war ended and Tamna reunified, many influential Mudang have begun calling for an end to war as a whole. This is a nonsensical idea, of course, because the hated Yamatai-ko remains a threat. Nonetheless, it is spreading among the peasants, and harming recruitment."
 ayb_korea4:0 "4th Kingdom of Tamna"
 ayb_korea4_desc:0 "These lands are ruled by Goryeo's House of Wang as the 4th Kingdom of the United Kingdoms of Tamna"
 ayb_korea5:0 "5th Kingdom of Tamna"
 ayb_korea5_desc:0 "These lands are ruled by Goryeo's House of Wang as the 5th Kingdom of the United Kingdoms of Tamna"
 ayb_mongolia4:0 "4th Kingdom of Tamna"
 ayb_mongolia4_desc:0 "These lands are ruled as the 4th Kingdom of the United Kingdoms of Tamna, with the King of Tamna as the Khan"
 ayb_mongolia5:0 "5th Kingdom of Tamna"
 ayb_mongolia5_desc:0 "These lands are ruled as the 5th Kingdom of the United Kingdoms of Tamna, with the King of Tamna as the Khan"
 ayb_hokkaido_bad:0 "Kuye Resistance"
 ayb_hokkaido_bad_desc:0 "The Kuye are refusing to cooperate with local authorities, and sometimes outright resisting. It will take some time for this to calm down."
 ayb_hokkaido_good:0 "The Quiet North"
 ayb_hokkaido_good_desc:0 "The Kuye tribes have been pacified, and are willing to cooperate with Tamnan authority."
 ayb_colony_siberia:0 "Colonial Frenzy"
 ayb_colony_siberia_desc:0 "The Government has begun sponsoring colonial ventures, encouraging more people to find new lives overseas"
 ayb_manchu:0 "The Conquest of the Amur"
 ayb_mongoliack3:0 "Great Khans of the Steppe"
 ayb_buyeo:0 "Liberators of Buyeo"
 ayb_buyeo_desc:0 "We have liberated Buyeo, and with it the ancestral homeland of many Koreans, from barbarian rule"
 ayb_silk:0 "Silk Road Influx"
 ayb_silk_desc:0 "Our conquest and pacification of the silk road republics has temporarily increased trade through the area"
 ayb_yangtze:0 "Yangtze River Trade"
 ayb_yangtze_desc:0 "Our conquest and pacification of the Yangtze river has temporarily expanded our trade horizons"
 ayb_church:0 "Spreading the Ancestor's Word"
 ayb_herbal_tea:0 "Tamnan Herbal Tea"
 ayb_herbal_tea_desc:0 "Your stress is spiking. Why not have some Tamnan herbal tea?"
 ayb_tianxia:0 "Conquest of the Tianxia"
 ayb_tianxia_desc:0 "The vastness of Jongwa has fallen before us"
 ayb_filipinx:0 "Tamnan Panyupayan Company"
 ayb_filipinx_desc:0 "The experience we have gained from governing the Panyupayan company will help us ensure similar ventures remain profitable"
 ayb_strayan:0 "Ulimaroan Penal Colony"
 ayb_strayan_desc:0 "There are far less criminals in Tamna thanks to the Penal Colony we have established in Ulimaroa"
 ayb_treasure:0 "Influx of Treasure Fleets"
 ayb_calif:0 "Moderate Attention"
 ayb_army_reformgrand:0 "A Reformed Grand Army"
 ayb_army_reformprof:0 "A Reformed Professional Army"
