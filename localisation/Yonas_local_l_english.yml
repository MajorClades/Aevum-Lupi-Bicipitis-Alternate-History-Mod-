#Mission descriptions

#Event
 yonaraja.1.t:0 "Iskandar's Dream"
 yonaraja.1.d:0 "From the Indus to Ganges, our realm stood unrivaled. From mere Yona band, we have wrestled control from many nations of Indus. Those before us such as Mitra, Gupta, Arjuna Samrajya and Prabuddh now a footnote in history.\nYet much remain to be seizes. As Iskandar marched far from Makedon, we must march to the world's edge. The lands beyond remain divided, rich in spoils to be seizes and nations to subjugate. If we are to impress him, we must not rest content and pursue Iskandar’s dream."
 yonaraja.1.a:0 "March."
