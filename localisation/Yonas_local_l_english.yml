#Mission descriptions

#Event
 yonaraja.1.t:0 "Iskandar's Dream"
 yonaraja.1.d:0 "From the Indus to Ganges, our realm stands unrivaled. From a mere Yona band, we have wrestled control of Indus from the many nations that inhabited it. Those before us such as Mitra, Gupta, Arjuna Samrajya and Prabuddh are now a footnote in history.\nYet much remains to be conquered. As Iskandar marched far from Makedon, we must march to the world's edge. The lands beyond remain divided, rich in spoils to be seizes and nations to subjugate. If we are to impress him, we must not rest content and pursue Iskandar’s dream."
 yonaraja.1.a:0 "March."
 INDUS_EMPIRE:0 "Iskandar Rajya"
 INDUS_EMPIRE_ADJ:0 "Indike"
 yonaraja.2.test:0 "Helm of The Host"
 yonaraja.2.desc:0 "As Iskandar led his great host across Asia to Indus, we had done the same this very day. As [Root.Monarch.GetName] rode [Root.Monarch.GetHerHis] stallion to inspects the troops, [Root.Monarch.GetSheHe] spotted three cliques forming around influential figures in [Root.Monarch.GetName]'s' armies. Perhap one of them could be appointed as Second-in-Command."
 yonaraja.2a:0 "Sandra Kotta, Ruler of Aornos"
 yonaraja.2b:0 "Omphis Taxiles, Elite Guardmen of Taxila Academy"
 yonaraja.2c:0 "§RSuspicious Sogdian Man§!"
 yonaraja.3.test:0 "Flickering Light on the Shore"
 yonaraja.3.desc:0 "The Horn of Libya was once a bustling hub of trade, filled to the brim with goods from the land shrouded in waterfall mist. It was said that such Kingdom is guided by fair-skinned folk who led an expendition into far-away land not unlike our Iskandar. Our connection with said Kingdom was cut short when the shore of Libya was set ablaze by the marauding Bantu who had since then purged the land of it's wealth and opulence."
 yonaraja.3a:0 "Secure The Land and Lead Our Own Expendition"
 yonaraja.3b:0 "They May Atone Their Sins by Serving Us"
 yonaraja.4.t:0 "Secret to Yonaka Vitality"
 yonaraja.4.d:0 "The Yonas are known to be race of imposing figure and immeasurable wisdom, but people tend to forget that they live a helluva longer than most. The sights of Elderly legionaire juggernaut still stabbing his enemies the old fashioned ways convinced most to surrender rather than defiantly resists. \nSo then, what's the secret to this longevity? Fighting good and surviving does explain why there are some old soul sticking around, but that hardly explains why they are still fit for the battlefield. The Truth, lies in the staple of every Yonas. Yonaka Lassi (Original name lost to time), was a mix of ancient fermented milk recipes passed from Makedon and Kamboj saffron.  \nThe mix is said to be closely guarded secret of many Yonas patricians, but one generous soul decided to share the family recipe to the barrack barista in honor of every soldier's service to Yonarajya."
 yonaraja.4.a:0 "Delectable and Nourishing!"
 yonaraja.6.t:0 "Theseus's Doctrine"
 yonaraja.6.d:0 "Idk bro I don't feel like writing right now."
 yonaraja.6.a:0 "Land!"
 yonaraja.6.b:0 "Naval!"