 #####EVENTS
 rasulian_native.1.d:0 "supposedly hidden event. if you are seeing this and are not a dev testing my code please report it to the dev team in the Aevum Lupi Biciptis discord. -aurie"
 
 rausulian_native.2.t:0 "A new age in Rausulia"
 rausulian_native.2.d:0 "For a few centuries our people have been living in cohabitation with a strange beast originally brought by and equally strange 'people from over the dawn' but only recently we have truly mastered this creature and its most incredible feature is its speed, which we have harnessed to bring to fastly travel the vast and endless plains. With the influx of 'fire-sticks' from other presumed dawm-men and our speed we will bring the continent to heel!"
 rausulian_native.2.a:0 "Glory to us!"

 rausulian_native.3.t:0 "The Great Mistery"
 rausulian_native.3.d:0 "The Lakota people whorship the Wakan Tanka, a great and misterious spirit they say inhabits the world with its life. As we get used to this drastic change in our lifestyle the ancient rites and ceremonies centred around great mounds seem distant and feel like leashes tying us from the freedom of the vast plains, the way of the Lakota looks much more flexible and thus suited to our new life, tho it would greatly anger the powerful Illiniwek..."
 rausulian_native.3.a:0 "Destiny is our own to make. We shall embrace the spirits of the plains!"
 rausulian_native.3.b:0 "The old rites work for us. We won't abandon Cahokia."