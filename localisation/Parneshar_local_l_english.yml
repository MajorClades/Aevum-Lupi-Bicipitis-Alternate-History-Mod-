#####GOVERMENT
 parn_manich_theocracy_reform:0 "Permanent Elect of Iran"
 parn_manich_theocracy_reform_desc:0 "The itinerant court of the Elect of Iran governs the country and the faithful as one entity to continue Mani's work. The Elect cannot leave Iran but will not be bound to one palace."
 parn_manich_kingdom_reform:0 "Shahdom of Hearers"
 parn_manich_kingdom_reform_desc:0 "Following the Elects of Mani, this Kingdom will stay in the material plane to help others become enlightened."


