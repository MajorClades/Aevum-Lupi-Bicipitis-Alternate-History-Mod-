#####EVENT
 persian.4.test:0 "The Role of the Elects"
 persian.4.desc:0 "The roles of the wandering Elects is one that puzzles the more material folks, those without proper enlightment cannot comprehend the necessity of the Elects to be free to give knowledge and wisdow. But some nobles have made the decision to ensure that an Elect, or more, must stay in our country at all times."
 persian.4a:0 "The Elects must wander and we hear."
 persian.4b:0 "We are Hearers and we must Elect."

 persian.5.test:0 "The Victory in Flames"
 persian.5.desc:0 "With victory in our hearts, we have returned to our capital and found much to repair, in time we will have the city back as it was, but we have to decide where to start first."
 persian.5a:0 "Restore the Palace and the fort."
 persian.5b:0 "Restore the Temples first."
 persian.5c:0 "At least restore the Fort."

