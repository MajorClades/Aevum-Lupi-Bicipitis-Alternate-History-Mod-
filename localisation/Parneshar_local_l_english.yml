#MISSION
 par_walls_of_faith_title:0 "Walls of Faith"
 par_walls_of_faith_desc:0 "The followers of Islam have crossed the border and broken through our first attempt to stop them, they marched along the river to our last city, but the opportunistic Eran has given us time. Time that will be used to bolster our defenses even more."

 par_eastern_expansion_title:0 "Path of Most Resistance"
 par_eastern_expansion_desc:0 "The Empire of Light follows a similar faith as ours, with some heretical rituals, but that means that it could strike against us any time. We must secure our flank if we wish to not finish like Goyman."

 par_peace_in_our_times_title:0 "Peace in our Times"
 par_peace_in_our_times_desc:0 "The time of peace has began, but it will not last long. This land was once a mighty empire and the fragments will not let peace and prosperity get in the way of restoring it."

 par_great_expansion_title:0 "Fulfilling Destiny"
 par_great_expansion_desc:0 "Another mighty empire stands on the shoulders of mountains and valleys, ours. We are the Iranian Empire, but we must follow the teaching of our saviour, Mani, so we must ensure that Babylon falls under our control."

 par_war_in_our_times_title:0 "Times of War"
 par_war_in_our_times_desc:0 "Our armies had to retreat to the now capital, protecting the populace and now it is time to properly regroup and recruit more soldiers."

 par_western_expansion_title:0 "Those Astray"
 par_western_expansion_desc:0 "The people of Persia cannot be governed by old institutions, we must seek to provide the proper governance to this new century that will be needed to ensure a more rapid expansion."

 par_good_advice_title:0 "Good Advice"
 par_good_advice_desc:0 "The court cannot be kept closed to one faith or culture, we must invite the brightest minds we can possibly find."

 par_walls_and_bridges_title:0 "Bridges Not Walls"
 par_walls_and_bridges_desc:0 "The Manicheans are not hostile to the many faiths that sorround them but we need to be actively amicable with some of them to further our stance on the world stage."

 par_time_of_rebirth_title:0 "Rebirth of Reason"
 par_time_of_rebirth_desc:0 "With the breaking of the Bolghars, we have gained more freedom to aquire knowledge that could go against the teachings of Islam, while still maintaining the new discoveries made by the muslim scholars."

 par_advisory_boards_title:0 "Court of Many Minds"
 par_advisory_boards_desc:0 "The court expands and the world does too, more people and more ways of thinking are discovered every day. We should enlist many scholars, perhaps one of them could be the next Prophet."

 par_greater_elect_title:0 "Reform the Electory"
 par_greater_elect_desc:0 "Elects are the main teachers of the Manichean faith, their knowledge and ascetic lifestyle can be hard to achieve, but we could have some scholars have more appropiate ways of studying the faith."
