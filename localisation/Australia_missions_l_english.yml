l_english:
 aust_capital_power_title:0 "Expand Alexia"
 aust_capital_power_desc:0 "The capital of the Australian province is located in a natural harbor, with ships loading and unloading cargo all day. Possible raids from Aktogramm pirates are discouraged by attentive arab sailors, but with the sea relatively secure, we can finally take more care of our backyard. Heathens and criminals roam the hinterlands but they dare not attack a fortified city."

 aust_growth_title:0 "Under, Not Behind"
 aust_growth_desc:0 "We may be the southest province of the Rhoman Empire but we do not skip on our book keeping and our ledgers. The Archon rules for a lifetime then a successor is voted on and chosen, preferably the son of the previous Archon, but the Basileous may hold a veto against the person. With a proper council, the Archon can administer the island properly and reap the rewards accordingly."

