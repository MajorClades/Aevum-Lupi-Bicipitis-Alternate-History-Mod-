 aust_armies_title:0 "The Tall Boys"
 aust_armies_desc:0 "There are no volunteers in the Australian regiments, you are either born into them or someone in Rhomania believes that you are worth forgetting about in the furthest reaches of the Empire. This has created the unfortunate conditions of an army that would rather drown than follow any orders, with the sole exception of the most loyal, and paid, soldiers. In spite of their name, any men can join them, but few survive the first night in the jungle. Those who survive alone in the jungle for a day and a night are already considerated more valuable than most."

