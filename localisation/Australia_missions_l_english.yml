 aust_colonial_expansion_title:0 "The Last Map"
 aust_colonial_expansion_desc:0 "Time and time again, cartographers have tried to make the Australian coastline and interiors, often called Darkest Australia. The map of the entirety of Australia has been done, the work of 9 cartographers combined into one singular tapestry. It will occupy the Archon's Palace main hall so that all can bask in the grand your realm is."

