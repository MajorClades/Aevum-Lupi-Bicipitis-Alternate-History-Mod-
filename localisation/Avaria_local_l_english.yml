l_english:

#####EVENTS

 avaria.1.t:0 "An Ancient Legacy"
 avaria.1.d:0 "[Root.Monarch.GetTitle] [Root.Monarch.GetName] stood before the ruins, [Root.Monarch.GetHerHis] advisors close behind [Root.Monarch.GetHerHim]. Centuries ago, this was the site of the Khan's Ring. The capital of the Avar Khaganate, home of the Khan's treasure. When the Germans invaded, they looted it for everything it was worth and burned it down. A fair response considering what Avar armies did to German cities in Bayan's raids. It remained in Avaria as a memory of past glory until it was seized by the Gepids in 1239. It would briefly be reclaimed in the Avar-Gepid war of 1403, only to be returned to Gepid hands when the Saxon Order intervened. The Ring, which had for so long served as a solemn remind of everything they had lost, now presented the [Root.Monarch.GetTitle] with an opportunity. Conuering Avaria's enemies had reawakened his people's spirit. It had shown the world that they were down, but never out. With the plundered bounty of Pannonia at their backs, what was stopping them from following in the footsteps of their ancestors?\n\nAn attended approached the [Root.Monarch.GetTitle], his expression inquiring on what to do next."
 avaria.1a:0 "Rally the men, and fetch me my horse. We will teach the world to fear us again."
 avaria.1b:0 "The Ring is nostalgic, perhaps, but nothing more. We are not the raiders we once were."

 avaria.2.t:0 "A Matter of Belief"
 avaria.2.d:0 "Religion has always been a touchy subject for the Avars. When we first arrived in Europe, we followed the Pagan ways of our ancestors and prayed to Tengri. Our susbjects, especially the Germans, loathed us for it. When we were defeated by the Bavarians and the Ring was burned, Bayan V was forced to convert to Aldaranism, the Germanic brand of Christianity. As time passed and the Aldaran church weakened, King Enkh seized the opportunity to break from German domination and embraced Lucanianism. Now we once again stand at a crossroads. Avaria is still a land of many faiths, with the captial remaining majority Aldaran and Shamanism remaining strong in the periphiry. It is clear that the dominance of the Lucanian church is coming to an end, with whispers of reform growing louder by the day. The Germans, as well, no longer have a stranglehold on the Aldaran church they once did. The [Root.Monarch.GetTitle] has always determined the religious direction of the Avars, and now is no exception. We need only say the word and the people will follow."
 avaria.2a:0 "I'm not compromising my soul on a maybe. Lucanianism is the only path forward."
 avaria.2b:0 "What has the Pope ever done for us?"
 avaria.2c:0 "Christianity is a foreign impossition. We must honor our ancestors!"
 avaria.2d:0 "Didn't some Rhoman merchants come through last week? I think they had the right idea."
 avaria.2e:0 "Eternal glory to the Pontifex Maximus!"
 avaria.2f:0 "Lucanianism is beyond saving and the Germans are fools."

 avaria.3.t:0 "A Tragic History"
 avaria.3.d:0 "600 years ago, all of Danubia belonged to the Avars. From Markeburen to Kerniso, all swore fealty to the Khagan. This hegemony came to an end in 903, when Khagan Bayan V launched an ill-fated raid into Germania. A catastophic defeat by German forces at the battle of Brunn sparked a Bavarian rebellion, and soon German forces marched upon the Khagan's Ring. Khagan Bayan was forced to convert to Christianity, and the entire Khaganate crumbled.\n\nAs the years went by, Avar power crumbled further in the face of Gepid attacks. The most recent war with the Gepids took place in 1403, in which Saxon intervention pushed us out of our westernmost holdings. Avaria as it exists today is a shadow of what it once was, constantly on the verge of defeat."
 avaria.3a:0 "The future of Avaria is at stake. We cannot fail."

 avaria.4.t:0 "Finishing what we Started"
 avaria.4.d:0 "It was a brief moment of mercy that allowed the Gepids to remain in Pannonia when we first arrived. It was assumed that over time they would grow to accept our rule over the region and become faithful, tribute paying subjects. That proved to be wrong. The Gepids never gave up on resisting Avar rule, and the defeat at Brunn emboldened them to rebel. Now the lands of the Gepids are under our control once more. The hour of vengeance for our centuries of humiliation is at hand."
 avaria.4a:0 "The Gepids will never threaten us again"
 avaria.4b:0 "And risk angering the Saxons? Leave them be"

 avaria.5.t:0 "The Flight of the Gepids"
 avaria.5.d:0 "It started slowly, with a few bands of Gepid travelers crossing into southern Saxony every so often. Young men, mostly. Not combat aged. They spoke of some disaster taking place in their home that they were taking refuge from. It quickly began to pick up as the days went by. Soon it was families, then villages. Now it was entire cities of Gepid refugees. They recounted with horror the arrival of the Avars in Gepidia, how the barbarians drove them out of their villages, cutting down anyone who refused.\n\nThe governor of Surkirche has petitioned the [Root.Monarch.GetTitle] for advice on how to proceed with this refugee crisis."
 avaria.5a:0 "Welcome them with open arms"

 avaria.6.t:0 "The Fate of the Limes"
 avaria.6.d:0 "The Limes of Pannonia were built by the Romans centuries ago, to protect their frontier from barbarian raids. When Roman power declined, the defenders of these fortresses made them their new homes, and the Rimedaxians were born. Centuries spent among ancient forts has given these people a remarkable understanding of defensive tactics that has allowed them to resist foreign incursions. Until now. The Limes have once again fallen to our control, and the question of what to do with our new subjects must be asked. Inquiries into their knowledge have thus far been refused without compensation in the form of autonomy."
 avaria.6a:0 "If they will not share their secrets, then they cannot stay."
 avaria.6b:0 "We will grant them this autonomy."

 avaria.7.t:0 "What to do with Jidava Castle"
 avaria.7.d:0 "Jidava Castle was once the property of the Aelucard clan, a powerful Dacian family that eventually relocated to Gepidia. Following this abandonment, the castle fell into disrepair. Occasionally, it would serve as a base for Windellic bandits or Avar raiders, but beyond that it continued it's silent watch over the Alps. Though the Dacians had plans to reclaim and restore it, their being driven out of the region has left the land under our jurisdiction.\n\nAt present, the fort lies in the hand of a marauding band of Dacian soldiers-turned-bandits. While some in the court advocate for the destruction of the castle to bolster the economy, a mercenary group that recently arrived in our lands has offered an interesting counterproposal. They are offering to drive out the bandits and rule the castle as our vassals."
 avaria.7a:0 "We will take the Wolfpack up on their offer."
 avaria.7b:0 "That castle is an eyesore. Dismantle it and sell the scraps."
 avaria.7c:0 "I don't want to deal with this right now."

 avaria.8.t:0 "An Offer from the East"
 avaria.8.d:0 "I'll think of something later. Basically they want our danubian land in exchange for an alliance."
 avaria.8a:0 "Security in the east is worth twice as much as that land, tell them we accept"
 avaria.8b:0 "They will have to pry that land from my cold dead hands"

 avaria.9.t:0 "The Longobards Accept"
 avaria.9.d:0 "I'll think of something later. Basically they gave us their danubian land in exchange for an alliance."
 avaria.9a:0 "This is the beginning of a beautiful friendship"

 avaria.10.t:0 "The Longobards Refuse"
 avaria.10.d:0 "I'll think of something later. Basically they didn't give us their danubian land in exchange for an alliance."
 avaria.10a:0 "They have made a costly mistake"

 avaria.11.t:0 "The Fate of the Limes"
 avaria.11.d:0 "The Limes of Pannonia were built by the Romans centuries ago, to protect their frontier from barbarian raids. When Roman power declined, the defenders of these fortresses made them their new homes, and the Rimedaxians were born. Centuries spent among ancient forts has given these people a remarkable understanding of defensive tactics that has allowed them to resist foreign incursions. Until now. The Limes have once again fallen to our control, and the question of what to do with our new subjects must be asked. Inquiries into their knowledge have thus far been refused without compensation in the form of autonomy."
 avaria.11a:0 "If they will not share their secrets, then they cannot stay."
 avaria.11b:0 "We will grant them this autonomy."

 avaria.12.t:0 "The Question of the Caliph"
 avaria.12.d:0 "Since our joining of the community of the faithful many years ago, we have risen to become the preeminent Muslim power in Europe. It has not gone unnoticed, however, that the position of Caliph is in disrepair. The decadent Rhoman empire bleeds more and more territory to the Christians with each passing day, and none who could stand to challenge them are any better. With our strength, it would not be out of the question to declare outsevles the rightful Caliphate of Islam."
 avaria.12a:0 "The current Caliph has been chosen by God, and we are his humble servants"
 avaria.12b:0 "We will bring about a Golden Age!"

 avaria.13.t:0 "The Avars Claim the Caliphate"
 avaria.13.d:0 "Generally speaking, Pannonia has garnered little attention in the Rhoman court. Considering the challenges we have had to deal with in recent centuries, the goings on of such an insignificant region proved not to be cause for concern. Apart from the Avars converting to Islam, almost nothing has happened that would be of any importance to us. Today, however, that has changed. Becuase we have been sent word that the Avars, claiming we have failed in our duties to safeguard the Muslim world, have claimed the mantle of Caliph."
 avaria.13a:0 "Who do those miserable barbarians think they are?!"

 avaria.14.t:0 "The Fate of Markeburen"
 avaria.14.d:0 "For many Bavarians, especially those old enough to remember the times when Avar raids scorched Danubia, the possibility of a resurgent Avaria was the worst case scenario. For years, they assured themselves that the Avars were thoroughly defeated and would soon be destroyed. History would prove them wrong, as the entirety of Bavaria lies under Avar control once more. Apart from a few scattered remnants of peasant rebels and former soldiers, there are none left to oppose us. And now, like so many other places before it, the question of what to do must be asked. Bavaria has existed in the Avar conscious for centuries as an eternal enemy, the ones who brought down the Avar Khaganate and doomed us to a slow death as a country. With the tables finally turned, it is up to us to determine how this one sided rivalry is resolved."
 avaria.14a:0 "Blessed are the peacemakers, if I recall"
 avaria.14b:0 "We have to burn down your city. That's just the way it is."

 avaria.15.t:0 "The Vast and Endless Steppe"
 avaria.15.d:0 "Our forays beyond Dacia have proven a success. The peninsula of Krimina and the surrounding coast of the Euxinian sea now lie under [Root.GetAdjective] control. Despite this success, many are unsure what to do with this new land. We are not, after all, barbaric nomads any longer. Any benefits this steppe land could provide are useless to us. To that end, a number of suggestions have been presented before the [Root.Monarch.GetTitle] involving pawning the land off to someone else to manage. Options include the native Suomeyans, the Khazars of Krimina, the Hellenes of the former Metole League, and even the Winds of Antia.\n\nAlternatively, we could just use the land to build more ships."
 avaria.15a:0 "We will give this land a new purpose"
 avaria.15b:0 "The Suomeyans have lived here for generations, they know the land best"
 avaria.15c:0 "We will restore this land to our brothers, the Khazars"
 avaria.15d:0 "The mercantile Hellenes will rule this land in our stead"
 avaria.15e:0 "The Winds will serve as an excellent barrier between us and the Hordes"

 avaria.16.t:0 "The True History of the Avars"
 avaria.16.d:0 "They're Rouran lmao"
 avaria.16a:0 "It's all true, you know"
 avaria.16b:0 "Useful for reputation, maybe, but not much else"

 avaria.17.t:0 "A Tournament in $CAPITAL_CITY$?"
 avaria.17.d:0 "Half Sword"
 avaria.17a:0 "A curious idea, let's try it out"
 avaria.17b:0 "Get this fool out of my sight, please"

 avaria.18.t:0 "A Philosopher for the Modern Era"
 avaria.18.d:0 "Avardam Smith"
 avaria.18a:0 "He is an example to us all"

 avaria.19.t:0 "Annales Cutrigarenses"
 avaria.19.d:0 "Book about the Kutrigurs"
 avaria.19a:0 "Quite an interesting people"

 avaria.20.t:0 ""
 avaria.20.d:0 ""
 avaria.20a:0 ""

 avaria.21.t:0 "Avar Tribes Arrive in the East"
 avaria.21.d:0 "''When I took a look at my life in $CAPITAL_CITY$, all I could find was disappointment. Being sedentary is no way to live! So, my friends and I, we packed our bags and grabbed our horses. And we made our way here. This, right here, this freedom? This is what life is meant to be.''"
 avaria.21a:0 "Such is the Way of the Avars"



##MISSIONs
 avr_legacy_title:0 "An Ancient Legacy"
 avr_legacy_desc:0 "When an Avar takes a step in Pannonia, they are walking over the history of their people. From our first arrival in the region in the 500s to today, the impact we have left on this land cannot be ignored. And now, with the entire basin once again under our control, we have reclaimed that ancient legacy. Now the only question is, what's next?"

 avr_faith_title:0 "A Matter of Belief"
 avr_faith_desc:0 "Equally as important as our survival is our religious beliefs. The Avars have held many throughout the centuries, from the shamanism to our ancestors to various forms of Christianity. If we are to re-establish ourselves, the religious conflict in Avar society must be resolved."

 avr_chained_title:0 "The Chained Khanate"
 avr_chained_desc:0 "For 500 years, the Avars have languished in our corner of Danubia, nothing more than a punching bag for German and Dacian attacks. If we are to survive, that must end. We must rebuild our strength and prepare to break the encirclement."

 avr_revenge_title:0 "Cold Revenge"
 avr_revenge_desc:0 "The Gepids have been our enemy since the moment we arrived in Danubia. It was them who we defeated to establish our Khaganate, them who burned the Khan's Ring, and them who kept us cornered for so long. We will bring this 500 year rivalry to an end once and for all."

 avr_limes_title:0 "Claiming the Limes"
 avr_limes_desc:0 "The ancient Roman limes of Pannonia were formidable defensive structures once upon a time. The people who live in the area, the Rimedaxians, are experts of defensive warfare. They also happen to be squatting on rightful Avar land. "

 avr_tito_title:0 "Ending the Stalemate"
 avr_tito_desc:0 "The east has presented a persistent threat to Avar survival since the Khaganate collapsed. There have been three previous attempts by Avar Kings to conquer the Dacian mountains in an attempt to alleviate some pressure. Each one has been met with failure, as a result of the weather or utter military defeat. We must secure the Alps once and for all, and disperse their people across the realm."

 avr_bread_title:0 "The Breadbasket"
 avr_bread_desc:0 "The Pannonian Kingdom has served as the bulwark of the Holy Italian Empire against threats from Danubia. Despite this valiant, centuries-long service, they are not members of the Empire themselves. They also possess some of the most fertile in Danubia. An army runs on it's stomach, and if the empire will not protect them then we will claim it for ourselves."

 avr_idk_title:0 "Everpresent Issues"
 avr_idk_desc:0 "The Dacians have been the single biggest threat to Avar sovereignty since the collapse of the Khanate. No matter how many wars we fought with the Germans, even when we were pushed to the brink of defeat, the thing on everyone's mind was if the Dacians were going to attack. With our position in Dacia secure and our strength returned, it is time we return the favor. The Dacians will regret menacing us for so many centuries."

 avr_place_title:0 "Our Place in the World"
 avr_place_desc:0 "Spitting in the eye of destiny seems to have actually paid off. For the first time since the 900s, Danubia in it's entirety is under the control of the Avars once again. It is time we take our rightful place as a European power."

 avr_1conomy_title:0 "Rebuilding"
 avr_1conomy_desc:0 "The Avar economy is in a sad state. Years of mismanagement in favor of the army, as well as a generally bad terrain, has left the Avar people poorer than theur neighbors. We must work to fix this."

 avr_2conomy_title:0 "Nowhere but Up"
 avr_2conomy_desc:0 "The worst issues of the economy have been rectified. Now, the next step is to improve upon what we have built."

 avr_steve_title:0 "The Hand that Once Fed"
 avr_steve_desc:0 "Avaria has a long, storied history with our western neighbors. It was the Longobards who invited us to Pannonia, and we allied with them to crush the Gepids. Unfortunately for them, they refused to leave, and they were crushed. It was only in the aftermath of the Bavarian rebellion that the Longobards were able to break free. Now they have become a regional power, and are one of our strongest threats in the west. There are two choices before us. We can either rekindle our old alliance, or finish what our ancestors started."

 avr_mare_title:0 "Back to the Source"
 avr_mare_desc:0 "The conquest of eastern Dacia has opened up the breadth of the steppe to us. While we have no interest in launching any long, protracted campaigns against the Turks, the coast of the Auxinos Sea is of a particular interest to us. Securing it will accomplish a great many things. It will secure our heartland from raids, give our soldiers experience in steppe warfare, and allow us to better compete with Rhomania in trade."

 avr_south_title:0 "Battle for the Bosphorus"
 avr_south_desc:0 "In 626, Khagan Bayan III launched a raid on Illyria. The armies of the Turks were crippled, and the Romans were forced to pay tribute for the next 15 years. With all of Danubia firmly under our control, we can once again turn our focus to the south and restore our control over the region."

 avr_bavaria_title:0 "The Bavarian Menace"
 avr_bavaria_desc:0 "It was not Bayan V's defeat in the battle of Brunn that brought down the Avar Khaganate. Rather, it was the ensuing revolt by the Bavarians that sealed our fate. With Danubia firmly under our control and the Longobard question settled, it is finally time to get our long awaited revenge on the Bavarians."

 avr_3conomy_title:0 "Fields of Gold"
 avr_3conomy_desc:0 "In ancient times, we were known for our dexterous use of Gold. The graves of many a warrior were lined with golden jewelry and adornments. We must reclaim the Danubian gold mines and reclaim our place as the premier goldsmiths of Europe."

 avr_4conomy_title:0 "The Heart of Europe"
 avr_4conomy_desc:0 "It is clear the world is changing. Soon, the feudal manor economies will be exchanged for the growing middle class and individual enterprises. We must adapt our economy to these new realities and take charge by becoming the economic and industrial heartland of europe."

 avr_nerd_title:0 "Embracing Enlightenment"
 avr_nerd_desc:0 "In recent years, philosophers across the world have been making waves with new theories on the fundamental realities of the world and the rights of humanity. We must embrace these theories and understand them, such that we can rule over the people more effectively."

 avr_assr_title:0 "The Avar Revolution"
 avr_assr_desc:0 "Years of abuse by the ruling elite have finally caught up to the Avar ruling class. Thousands now take to the streets across the country, demanding an end to our time-honored traditions and the implementation of new, revolutionary rule. The future of Avaria is once again at stake."



