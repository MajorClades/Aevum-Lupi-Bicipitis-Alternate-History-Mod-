 avr_2conomy_desc:0 "When the holder is place 0_0"

 avr_steve_title:0 "Yearning for the Mines"
 avr_steve_desc:0 "Avaria has a long, storied history with our western neighbors. It was the Longobards who invited us to Pannonia, and we allied with them to crush the Gepids. And the Bavarian rebellion of 905 was the catalyst that brought down the Avar Khaganate. But Bavaria and Longobardy have more than just history. They  have precious metals. The iron of Longobardy and gold of Bavaria will provide an excellent boon for our economy. Revenge on the Bavarians will be nice, too."

 avr_mare_title:0 "Back to the Source"
 avr_mare_desc:0 "The conquest of eastern Dacia has opened up the breadth of the steppe to us. While we have no interest in launching any long, protracted campaigns against the Turks, the coast of the Auxinos Sea is of a particular interest to us. Securing it will accomplish a great many things. It will secure our heartland from raids, give our soldiers experience in steppe warfare, and allow us to better compete with Rhomania in trade."

 avr_south_title:0 "Battle for the Bosphorus"
 avr_south_desc:0 "In 626, Khagan Bayan III launched a raid on Illyria. The armies of the Turks were crippled, and the Romans were forced to pay tribute for the next 15 years. With all of Danubia firmly under our control, we can once again turn our focus to the south and restore our control over the region."



