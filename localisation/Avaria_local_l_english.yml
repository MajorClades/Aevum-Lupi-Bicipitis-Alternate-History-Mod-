 avr_freetrade:0 "The First Global Economy"
 avr_blessed:0 "Blessed Peacemakers"
 avr_blessed_desc:0 "The Avars, in a very uncharacteristic move, have decided not to enact bloody revenge on the Bavarians. The Bavarians, in turn, are grateful for this."
 avr_gold:0 "Avar Goldsmiths"
 avr_mgrr:0 "Sacked City"
 avr_mgrr_desc:0 "This city and the land around it has been sacked by the Avars, rendered nearly useless even all this time after"
 avr_carp:0 "'Guest Workers'"
 avr_castle:0 "Mostly Restored Jidava Castle"
 avr_castle_desc:0 "You can call this the New World Order of running castles, Brother"
 avr_horde:0 "At Home on the Steppe"
 avr_navy:0 "Euxinian Fleet"
 avr_navy_desc:0 "The coast of the Euxinian Sea has allowed us to construct a navy of our own"
