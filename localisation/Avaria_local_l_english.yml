#####MODIFIER
 avr_limes:0 "Repurposed Limes"
 avr_dacia:0 "Harnessing the Dacian Grey"
 avr_dacia_desc:0 "The Dacian Grey is Dacia's primary cattle export. With Dacia under our control, we now have control over their beef industry. We will make sure our soldiers feast on steak every night until this is method is no longer sustainable."
 avr_pannonia:0 "Pannonian Grain"
 avr_pannonia_desc:0 "The fertile farmland of Pannonia lends itself incredibly well to the grain industry. We will use this new farmland to feed the people, discouraging revolt and encouraging hard work."
 avr_sandwich:0 "The Sindwach"
 avr_sandwich_desc:0 "One day, two Avar soldiers entered the mess tent. One got a cut of Dacian Steak, the other a loaf of Pannonian bread. These two soldiers, growing bored, decided to experiment by combining the two foods. The result was a piece of steak between two halves of bread. The soldiers termed this new revolutionary concept a sindwach for some reason. Nobody knows what the name means, but it is spreading across the country like wildfire."
