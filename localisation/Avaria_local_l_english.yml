 avr_chained_title:0 "The Chained Khanate"
 avr_chained_desc:0 "For 500 years, the Avars have languished in our corner of Danubia, nothing more than a punching bag for German and Dacian attacks. If we are to survive, that must end. We must rebuild our strength and prepare to break the encirclement."

 avr_revenge_title:0 "Cold Revenge"
 avr_revenge_desc:0 "The Gepids have been our enemy since the moment we arrived in Danubia. It was them who we defeated to establish our Khaganate, them who burned the Khan's Ring, and them who kept us cornered for so long. We will bring this 500 year rivalry to an end once and for all."

 avr_limes_title:0 "Claiming the Limes"
 avr_limes_desc:0 "When the holder is place 0_0"

 avr_tito_title:0 "Ending the Stalemate"
 avr_tito_desc:0 "The east has presented a persistent threat to Avar survival since the Khaganate collapsed. There have been three previous attempts by Avar Kings to conquer the Dacian mountains in an attempt to alleviate some pressure. Each one has been met with failure, as a result of the weather or utter military defeat. Securing these mountains is of the utmost importance."

 avr_bread_title:0 "The Breadbasket"
 avr_bread_desc:0 "The Pannonian Kingdom has served as the bulwark of the Holy Italian Empire against threats from Danubia. Despite this valiant, centuries-long service, they are not members of the Empire themselves. They also possess some of the most fertile in Danubia. An army runs on it's stomach, and ff the empire will not protect them then we will claim it for ourselves."

 avr_idk_title:0 "i dont know"
 avr_idk_desc:0 "And I don't know what I'm feeling, I don't know why I'm in pain, and these sugar crystals melt I feel my stomach coming up, pupils dilated I'm drowning til I die, in this world you are the only answer for my cries"

