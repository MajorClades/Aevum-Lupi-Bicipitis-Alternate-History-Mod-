#####EVENTS

 avaria.1.t:0 "An Ancient Legacy"
 avaria.1.d:0 "[Root.Monarch.GetTitle] [Root.Monarch.GetName] stood before the ruins, [Root.Monarch.GetHerHis] advisors close behind [Root.Monarch.GetHerHim]. Centuries ago, this was the site of the Khan's Ring. The capital of the Avar Khaganate, home of the Khan's treasure. When the Germans invaded, they looted it for everything it was worth and burned it down. A fair response considering what Avar armies did to German cities in Bayan's raids. It remained in Avaria as a memory of past glory until it was seized by the Gepids in 1239. It would briefly be reclaimed in the Avar-Gepid war of 1403, only to be returned to Gepid hands when the Saxon Order intervened. The Ring, which had for so long served as a solemn remind of everything they had lost, now presented the [Root.Monarch.GetTitle] with an opportunity. Conuering Avaria's enemies had reawakened the spirit of the Avars. It had shown the world that they were down, but certainly not out. With the plundered bounty of Pannonia at their backs, what was stopping them from following in the footsteps of their ancestors?\n\nAn attended approached the [Root.Monarch.GetTitle], his expression inquiring on what to do next."
 avaria.1a:0 "Rally the men, and fetch me my horse. We will teach the world to fear us again."
 avaria.1b:0 "Nostalgic, perhaps, but nothing more. We are not the raiders we once were."

 avaria.2.t:0 "A Matter of Belief"
 avaria.2.d:0 "Religion has always been a touchy subject for the Avars. When we first arrived in Europe, we followed the Pagan ways of our ancestors and prayed to Tengri. Our susbjects, especially the Germans, loathed us for it. When we were defeated by the Bavarians and the Ring was burned, Bayan V was forced to convert to Aldaranism, the Germanic brand of Christianity. As time passed and the Aldaran church weakened, King Enkh seized the opportunity to break from German domination and embraced Lucanianism. Now we once again stand at a crossroads. It is clear that the dominance of the Lucanian church is coming to an end, with whispers of reform growing louder by the day. The Germans, as well, no longer have a stranglehold on the Aldaran church they once did. The [Root.Monarch.GetTitle] has always determined the religious direction of the Avars, and now is no exception. We need only say the word and the people will follow."
 avaria.2a:0 "I'm not compromising my soul on a maybe. Lucanianism is the only path forward."
 avaria.2b:0 "What has the Pope ever done for us?"
 avaria.2c:0 "Christianity is a foreign impossition. We must honor our ancestors!"
 avaria.2d:0 "Didn't some Roman merchants come through last week? I think they had the right idea"
 avaria.2e:0 "Eternal glory to the Pontifex Maximus!"
 avaria.2f:0 "Lucanianism is beyond saving and the Germans are fools."

 avaria.3.t:0 "A Tragic History"
 avaria.3.d:0 "600 years ago, all of Danubia belonged to the Avars. From Markeburen to Kerniso, all swore fealty to the Khagan. This hegemony came to an end in 903, when Khagan Bayan V launched an ill-fated raid into Germania. A catastophic defeat by German forces at the battle of Brunn sparked a Bavarian rebellion, and soon German forces marched upon the Khagan's Ring. Khagan Bayan was forced to convert to Christianity, and the entire Khaganate crumbled.\n\nyou get the picture, this is just a placeholder, we get there when we get there"
 avaria.3a:0 "The future of Avaria is at stake. We cannot fail."

 avaria.4.t:0 "Finishing what we Started"
 avaria.4.d:0 "We beat the crap out of the Gepids when we first got here liek 600 years ago and for some reason we kept them around, we gonna get rid of them this time?"
 avaria.4a:0 "The Gepids will never threaten us again"
 avaria.4b:0 "And risk angering the Saxons?"

 avaria.5.t:0 "The Flight of the Gepids"
 avaria.5.d:0 "The Avars have kicked the Gepids out and now they've moved here"
 avaria.5a:0 "Welcome them with open arms"

 avaria.6.t:0 "The Fate of the Limes"
 avaria.6.d:0 "same as the last one but it's for the Rimedaxians noww"
 avaria.6a:0 "If they will not share, then they cannot stay."
 avaria.6b:0 "They can stay, but they must serve the crown."

