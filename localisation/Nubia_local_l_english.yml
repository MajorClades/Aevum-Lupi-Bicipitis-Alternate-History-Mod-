#####GOVERMENT
 nubian_african_monarchy:0 "Persh Mntero" #red kingdom
 nubian_african_monarchy_desc:0 "A land of various christian denominations under one singular crown of African and Nilotic union, the marriage between the Queens of Nubia and the Grandmasters of the Red Legion."

 nubian_matrilineal_monarchy:0 "Matrilineal Crown of Kush"
 nubian_matrilineal_monarchy_desc:0 "From the ancient times of the Land of Kush, we have entrusted both man and women to lead our country to greatness and we will continue to do so."


#####Mission
 nub_pacify_beja_title:0 "Convert the Beja"
 nub_pacify_beja_desc:0 "The Beja people were loyal to the Tyrant of Kongo but now they are under our control, our efforts to convert them are finally about to pay off."

 nub_southern_attacks_title:0 "Petty Southern Squabbles"
 nub_southern_attacks_desc:0 "The southern tribes keep squabbling among each other or against us, it is time to stop them once and for all. After we could finally secure the land trade routes."

 nub_up_the_nile_title:0 "Up the Nile"
 nub_up_the_nile_desc:0 "The trek up the mountains to the source of the mightiest river in the world is quite difficult but it is good training for our forces."

 nub_admin_diplo_title:0 "The Nile's Wealth"
 nub_admin_diplo_desc:0 "In exchange for the Nile's wealth and indian trade, the westerners share their ideas and knowledge of how to beat them at their own game."

 nub_great_library_title:0 "Great Libraries"
 nub_great_library_desc:0 "The great library of Alexandria has seen fires and wars, but we will secure its knowledge and protect it from any more harm."

 nub_churches_title:0 "New Churches"
 nub_churches_desc:0 "Years of wars and famines have left the land scarred of people and left the faith crumbling, all can be fixed and repaired through purpose and zeal."

 nub_ancient_history_title:0 "Older Than Sand"
 nub_ancient_history_desc:0 "Under the sand lies our history and we will find all that can be remembered."

 nub_ancient_kush_title:0 "Ancient Lines"
 nub_ancient_kush_desc:0 "From the Kingdom of Kush and the old Egyptian Dynasties, treasures and tales shall be secured and our legacy shall be shared with all."

 nub_warfare_title:0 "Warfare of Survival"
 nub_warfare_desc:0 "Years of warfare has hardened our soldiers against even the mightest of Empires."

 nub_winds_of_noun_title:0 "Sails of Nu"
 nub_winds_of_noun_desc:0 "The sea and waves are not our enemies but they will hide our enemie's relicts."

 nub_dam_against_islam_title:0 "Dam Against Islam"
 nub_dam_against_islam_desc:0 "In spite of the threats of the Rhomans from the north and the tyranny of the Kongolese from the south, we shall continue to endure for our faith and our people."

 nub_estate_knowledge_title:0 "Priestly Knowledge"
 nub_estate_knowledge_desc:0 "The priests of the Cross share information with the other christians that arrived with the crusaders, but they require some grease to speak up about it."

 nub_cut_africa_from_asia_title:0 "Fort and Fight"
 nub_cut_africa_from_asia_desc:0 "With the appropiate amount of static defenses and proper strategy, we can defend any dune and secure any victory."

 navy_of_the_nile_title:0 "Navy of the Nile"
 navy_of_the_nile_desc:0 "Our navy had to be built from scrap but our ships are always kept new and ready."

 nub_indian_trade_title:0 "India and Beyond"
 nub_indian_trade_desc:0 "Would it not be easier if the trade from India costed a bit less?"

 nub_egyptian_friendship_title:0 "Crusaders or Friends"
 nub_egyptian_friendship_desc:0 "Egypt lays battered but we can help it be restored to its glory."

 nub_the_old_canals_title:0 "The Old Canals"
 nub_the_old_canals_desc:0 "Old canals connected the two seas on the sides of our lands, hard work and tired workers shall ensure their reconstruction."

 nub_defenders_of_the_canals_title:0 "Defenders of the Canal"
 nub_defenders_of_the_canals_desc:0 "Our economical lifeblood runs through the Canal and we will defend it to the last man."

 nub_coptic_kin_title:0 "Phoenix's Hold"
 nub_coptic_kin_desc:0 "The Rhomans remain a great threat to our survival but red clouds are gathering in the west and we could use the distraction."

 nub_egyptian_story_title:0 "Coptic Restoration"
 nub_egyptian_story_desc:0 "The faithful will remain under oppression until we can defend their land and our laws in our new land."

 nub_tales_of_two_kingdoms_title:0 "Tales of Two Kingdoms"
 nub_tales_of_two_kingdoms_desc:0 "Egypt is finally under our control but the battle is yet to be completed."

 nub_jerusalme_title:0 "Faithful City"
 nub_jerusalme_desc:0 "The city of the God is ours, securing our control through nearby fortresses and mighty armies."
