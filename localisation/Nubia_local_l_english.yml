l_english:
#####EVENTS
 nubic.1.test:0 "The Cross on Memphis"
 nubic.1.desc:0 "The Red Crusaders have taken Memphis and sorrounding cities, their armies are poised to take Jerusalem in the coming months. Our faithful brother are being targeted on accident or on purpose by the Impotians, perhaps we could request to help them find the difference and in the mean time hold some land to secure it against the Rhoman's control."
 nubic.1a:0 "Forward unto Victory!"
 nubic.1b:0 "Forward unto Victory!"
 nubic.1c:0 "Bide our time."

 nubic.2.test:0 "The Southern Cross"
 nubic.2.desc:0 "The Nubians have asked to control some land in Egypt where their faith's kin reside, in exchange they will help fight the Rhomans."
 nubic.2a:0 "Sure."
 nubic.2b:0 "Ew."

 nubic.3.test:0 "Our Reward Your Promise"
 nubic.3.desc:0 "The Nubians demand the land they were promised upon their given help against the Phoenix."
 nubic.3a:0 "They can have it."
 nubic.3b:0 "Our blood, our land."

 nubic.4.test:0 "The Rhoman Yoke"
 nubic.4.desc:0 "THe Rhomans have dealt with the Tyrant's last loyalist with extreme prejudice, but they have used that excuse to also raise the taxes upon what they call heathens. Our faithful brothers under their oppression will get our support in case they would revolt."
 nubic.4a:0 "Arise Faithful!"
 nubic.4b:0 "Lay low."

 nubic.5.test:0 "The Union of Faiths"
 nubic.5.desc:0 "The Egyptian Grandmaster and the most beautiful Nubian Queen could silence any violence between the two kingdoms, but that would require some form of submission by one of the main faiths. An union such as this happened in ancient times, bolstering our singular strenghts into one mighty Kingdom or we could simply stay on our own ways and possibly do without necessary wars."
 nubic.5a:0 "We are bound in Warfare."
 nubic.5b:0 "We are bound in Faith."
 nubic.5c:0 "Our bond unbroken."

 nubic.6.test:0 "Looking for Ancient Legacy"
 nubic.6.desc:0 "The ancient land of Kush remains under the sand and its secrets and treasures can be found still, but it will require many workers and slaves to comb through dunes and old texts or oral tales. A promising place is [2798.GetName], where plenty has been already found."
 nubic.6a:0 "Make it our Capital."
 nubic.6b:0 "Go now."

 nubic.7.test:0 "Of Pyramids and Sands"
 nubic.7.desc:0 "The treasure were found and any would-be looters stopped before they could do any damage. Any other knowledge we could gleam from our ancestors will be put to good use, but for the moment our legacy is secured by the dunes and the sand. Old jewels will adorn the heads of a new dynasty, even if the titles are different."
 nubic.7a:0 "Restore the Line of Kush!"
 nubic.7b:0 "Restore the Wisdow of Kush!"
 nubic.7c:0 "Restore the Kingdom of Kush!"
 nubic.7d:0 "Restore the Faith of Kush!"

 nubic.100.test:0 "Old Wanderers"
 nubic.100.desc:0 "Worshippers of the old Gods are still roaming the sands around the Nile, wanted by none, spared only by the storms. In recent times we require soem scapegoats for our internal problems and this wanderers seem to be easy pickings."
 nubic.100a:0 "We aren't going to find anything."
 nubic.100b:0 "Eradicate them."

#####MODIFIER
 nubian_dam_islam:0 "Fortress Against The Phoenix"
 nubian_dam_islam_temp:0 "Veteran Defenders"
 nub_coptic_resurgence:0 "Resurgence of Miaphysitism"
 nub_looking_for_kush:0 "Archeological Research"
 nub_up_denile:0 "Nilotic Warfare"
 relics_of_old_kush:0 "Relics of Old Kush"
 nub_more_defense:0 "Protectors of Our People"
 nub_less_defense:0 "Bane of Our Enemies"
 nub_gates_of_the_east:0 "Western Gate to the East"
 nub_gates:0 "Forts of the Canal"
 nub_colonization:0 "Our Eastern Adventures"
 nub_egyptian_navy:0 "Navy of the Nile"
 nub_ships:0 "Great Green's Fleet"

